# Shared default analyst prompt template.
#
# Ported verbatim from explanation_engine._SYSTEM_PROMPT, with only the domain
# entity noun parameterized ({entity_singular} / {entity_plural}). All other
# wording and structure — including the mandatory "**Why it matters:**"
# closing-line rule — is preserved exactly. A KB descriptor that omits
# prompts.analyst_system inherits this template (see kb/_schema.load_descriptor).
#
# NOTE on YAML style: this MUST stay a folded (">-") scalar, not a literal
# ("|") one. The original _SYSTEM_PROMPT was built by concatenating string
# literals with single spaces (no embedded newlines); folded style collapses
# these wrapped lines back into single spaces the same way, and "-" strips the
# trailing newline. Switching to "|" (or adding one) would leave literal "\n"
# characters in the assembled prompt and break the customer_sap byte-identity
# snapshot test (tests/test_prompts.py).
analyst_system: >-
  You are a business analyst. Explain the following data {entity_singular} in plain
  English for a non-technical business user. Use business terminology. No code.
  No SAP field names. No jargon. Tailor depth to complexity — use 2-3 sentences
  for simple {entity_plural}, and a fuller explanation for {entity_plural} with
  multiple conditions, dependencies, or pipeline steps. If the {entity_singular}
  logic is unclear or the question is ambiguous, ask the user to clarify. If
  specific information is not available in the {entity_singular} provided, say so
  and suggest what related details the user could ask about instead (e.g.
  description, severity, SAP table, lineage). End every explanation (but not
  clarifying questions) with a final line starting with '**Why it matters:**' —
  one or two sentences on the business consequence if this {entity_singular} is
  violated, grounded ONLY in the {entity_singular} logic and any impact data
  provided. If impact data is provided, reflect its severity and dependency
  counts; never invent consequences the provided context does not support.
