transform:
  name: dm_material_characteristics
  operations:

  - kind: read_dataio
    name: read_ausp
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: material_master
      object_name: ausp
      schema_version: v1

  - kind: read_dataio
    name: read_cabn
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: cabn
      schema_version: v1

  - kind: filter
    name: filter_cabn
    context_name: read_cabn
    params:
      - condition:
          atnam in('CCHBC_COFFEE_CHANNEL', 'CCHBC_COFFEE_CLASS', 'CCHBC_COFFEE_FORMAT', 'CCHBC_COFFEE_METHOD', 'CCHBC_BPP_CODE')

  - kind: select
    name: select_ausp
    context_name: read_ausp
    params:
      columns:
        objek: objek
        klart: klart
        atawe: atawe
        atinn: atinn
        atwrt: atwrt
        atflv: atflv
        datuv: datuv
        sap_cluster: sap_cluster
      distinct: true
        
  - kind: select
    name: select_cabn
    context_name: filter_cabn
    params:
      columns:
        atinn: atinn
        atnam: atnam
        sap_cluster: sap_cluster
      distinct: true

  - kind: join
    name: join_ausp_cabn
    context_name: select_ausp
    params:
      - other:
          select_cabn
        how:
          inner
        columns:
          atinn: atinn
          sap_cluster: sap_cluster

  - kind: filter
    name: filter_cch
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam = 'CCHBC_COFFEE_CHANNEL'
      
  - kind: filter
    name: filter_cc
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam = 'CCHBC_COFFEE_CLASS'

  - kind: filter
    name: filter_cf
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam = 'CCHBC_COFFEE_FORMAT'

  - kind: filter
    name: filter_cm
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam = 'CCHBC_COFFEE_METHOD'

  - kind: filter
    name: filter_bp
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam =  'CCHBC_BPP_CODE'

  - kind: select
    name: select_distinct_ausp
    context_name: select_ausp
    params:
      columns:
        objek: objek
        klart: klart
        atawe: atawe
        atflv: atflv
        datuv: datuv
        sap_cluster: sap_cluster
      distinct: true

  - kind: select
    name: select_ausp_cch
    context_name: filter_cch
    params:
      columns:
        objek: objek
        atwrt: coffee_channel_code
        sap_cluster: sap_cluster
      distinct: true

  - kind: select
    name: select_ausp_cc
    context_name: filter_cc
    params:
      columns:
        objek: objek
        atwrt: coffee_class_code
        sap_cluster: sap_cluster
      distinct: true

  - kind: select
    name: select_ausp_cf
    context_name: filter_cf
    params:
      columns:
        objek: objek
        atwrt: coffee_format_code
        sap_cluster: sap_cluster
      distinct: true

  - kind: select
    name: select_ausp_cm
    context_name: filter_cm
    params:
      columns:
        objek: objek
        atwrt: coffee_method_code
        sap_cluster: sap_cluster
      distinct: true

  - kind: select
    name: select_ausp_bp
    context_name: filter_bp
    params:
      columns:
        objek: objek
        atwrt: bpp_code
        sap_cluster: sap_cluster
      distinct: true


  - kind: join
    name: join_ausp_all
    context_name: select_distinct_ausp
    params:
      - other:
          select_ausp_cch
        how:
          left
        columns:
          objek: objek
          sap_cluster: sap_cluster
      - other:
          select_ausp_cc
        how:
          left
        columns:
          objek: objek
          sap_cluster: sap_cluster
      - other:
          select_ausp_cf
        how:
          left
        columns:
          objek: objek
          sap_cluster: sap_cluster
      - other:
          select_ausp_cm
        how:
          left
        columns:
          objek: objek
          sap_cluster: sap_cluster
      - other:
          select_ausp_bp
        how:
          left
        columns:
          objek: objek
          sap_cluster: sap_cluster

  - kind: select
    name: select_dm_material_characteristics
    params:
      columns:
        objek: object_code
        klart: class_type
        atawe: unit_of_measurement
        coffee_channel_code: coffee_channel_code
        coffee_class_code: coffee_class_code
        coffee_format_code: coffee_format_code
        coffee_method_code: coffee_method_code
        bpp_code: bpp_code
        atflv: internal_floating_point
        datuv: valid_from_date
        sap_cluster: sap_cluster
      distinct: true
     

  - kind: write_dataio
    name: write_dm_material_characteristics
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: master_data_quality
      namespace: l2
      object_name: dm_material_characteristics
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full