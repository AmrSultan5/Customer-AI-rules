{% if dataio.storage_id == "datalake_dev" %}
{% set uc_catalog_env = "dc_datalake_dev_001" %}
{% elif dataio.storage_id == "datalake_prod" %}
{% set uc_catalog_env = "dc_datalake_prod_001" %}
{% else %}
{% set uc_catalog_env = "dc_datalake_default" %}
{% endif %}

transform:
  name: sap_products_universe_product_name_cleanser
  operations:

# Read spu after basic load
# sap_products_universe - spu
  - kind: read_dataio
    name: read_spu
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_ered
      namespace: l2
      object_name: sap_products_universe
      schema_version: v1

#cleansing rules
#convert all characters to lowercase
  - kind: add
    name: add_convert_to_lowercase
    context_name: read_spu
    params:
      - column: product_name_stage
        expression: lower(product_name_raw)

#remove dots from between the letters
  - kind: add
    name: add_spu_remove_dots_letters
    context_name: add_convert_to_lowercase
    params:
      - column: product_name_stage
        expression: regexp_replace(product_name_stage, '(?<=\\p{L})\\.(?=\\p{L}|\\s)|(?<=\\s)\\.(?=\\p{L})', ' ')
        overwrite: true

#remove multiple spaces
  - kind: add
    name: add_spu_remove_multiple_dots
    context_name: add_spu_remove_dots_letters
    params:
      - column: product_name_stage
        expression: regexp_replace(product_name_stage, '\\s+', ' ')
        overwrite: true

#replace tokens
#conf data join
#spu add const value for join
  - kind: add
    name: add_const_1_spu
    context_name: add_spu_remove_multiple_dots
    params:
      - column: const_1_spu
        expression: '''1'''

#read conf data
#add logic to either read from general raw, or to ingest to informatica_dq raw
  - kind: read_local
    name: read_conf_data
    params:
      format: excel
      location: "/Volumes/{{uc_catalog_env}}/locations/datalake_raw/data_quality/product_mapping_ered/configuration_data/0/configuration_data.xlsx"
      options:
        header: true
        pathGlobFilter: configuration_data.xlsx
        sheet_name: spu_product_name_cleanser

  - kind: add
    name: add_const_1_conf_spu_cleanser
    context_name: read_conf_data
    params:
      - column: const_1_conf_spu_cleanser
        expression: '''1'''

  - kind: add
    name: add_stuct_conf_spu_cleanser
    context_name: add_const_1_conf_spu_cleanser
    params:
      - column: stuct_conf_spu_cleanser
        expression: struct(cast(priority as int) as key, source_value as source_val, target_value as target_val)

  - kind: group
    name: group_stuct_conf_spu_cleanser
    context_name: add_stuct_conf_spu_cleanser
    params:
      - aggs:
          stuct_conf_spu_cleanser: collect_list 
        by:
        - const_1_conf_spu_cleanser

  - kind: add
    name: add_sort_stuct_conf_spu_cleanser
    context_name: group_stuct_conf_spu_cleanser
    params:
      - column: collect_list_struct_conf_spu_cleanser_sorted
        expression: array_sort(collect_list_stuct_conf_spu_cleanser)

  - kind: join
    name: join_conf_spu_cleanser
    context_name: add_const_1_spu
    params:
      - other:
          add_sort_stuct_conf_spu_cleanser
        how:
          inner
        columns:
          const_1_spu: const_1_conf_spu_cleanser

  - kind: add
    name: add_spu_conf_lookup_cleanser
    context_name: join_conf_spu_cleanser
    params:
      - column: product_name_stage
        expression: reduce(collect_list_struct_conf_spu_cleanser_sorted, product_name_stage, (acc, x) -> regexp_replace(acc, x.source_val, x.target_val))
        overwrite: true

#remove leading word if it's a number
  - kind: add
    name: add_spu_remove_leading_word_if_number
    context_name: add_spu_conf_lookup_cleanser
    params:
      - column: product_name_stage
        expression: if(regexp_like(product_name_stage, '^\\s*\\d+(\\.\\d+)?[a-zA-Z]*\\b'), regexp_replace(product_name_stage, '^\\s*\\d+(\\.\\d+)?[a-zA-Z]*\\s*', ''), product_name_stage)
        overwrite: true

#remove pack_type from the beginning
  - kind: add
    name: add_spu_remove_pack_type
    context_name: add_spu_remove_leading_word_if_number
    params:
      - column: product_name_stage
        expression: if(startswith(product_name_stage, 'nrgb') or startswith(product_name_stage, pack_type_code), regexp_replace(product_name_stage, '^(nrgb|' || pack_type_code || ')\\s*', ''), product_name_stage)
        overwrite: true

#remove unit_size
  - kind: add
    name: add_spu_remove_unit_size
    context_name: add_spu_remove_pack_type
    params:
      - column: product_name_stage
        expression: regexp_replace(product_name_stage, '\\b(x\\s*\\d+|\\d+\\s*x\\s*\\d+|\\d+\\s*x|\\d+x\\b|\\d+x)', '')
        overwrite: true

#remove country code from the end
  - kind: add
    name: add_spu_remove_country_code
    context_name: add_spu_remove_unit_size
    params:
      - column: product_name_stage
        expression: if(endswith(product_name_stage, country_code_in_product_name), regexp_replace(product_name_stage, concat(country_code_in_product_name, '$'), ''), product_name_stage)
        overwrite: true

#concat with pack_size and sales_unit
  - kind: add
    name: add_pack_size_fixed
    context_name: add_spu_remove_country_code
    params:
      - column: pack_size_fixed
        expression: CASE WHEN pack_size_uom_unified = 'L' THEN concat(regexp_replace(CAST(pack_size_volume_unified * 1000 AS STRING), '\\.0', ''), 'ml') WHEN pack_size_uom_unified = 'KG' THEN concat(regexp_replace(CAST(pack_size_volume_unified * 1000 AS STRING), '\\.0', ''), 'g') WHEN pack_size_uom_unified = 'CL' THEN concat(regexp_replace(CAST(pack_size_volume_unified * 100 AS STRING), '\\.0', ''), 'ml') WHEN pack_size_uom_unified = -1 THEN '' ELSE concat(regexp_replace(CAST(pack_size_volume_unified AS STRING), '\\.0', ''), lower(pack_size_uom_unified)) END

  - kind: add
    name: add_concat_pack_size_sales_unit
    context_name: add_pack_size_fixed
    params:
      - column: product_name_stage
        expression: concat(product_name_stage, ' ', pack_size_fixed, ' ', if(lower(sales_unit_name) != 'other', lower(sales_unit_name), ''))
        overwrite: true

#final cleansing
#remove multiple dots
  - kind: add
    name: add_final_cleansing_1
    context_name: add_concat_pack_size_sales_unit
    params:
      - column: product_name_stage
        expression: regexp_replace(product_name_stage, '(?<=\D)\.+', '')
        overwrite: true

#remove spaces from the front and back
  - kind: add
    name: add_final_cleansing_2
    context_name: add_final_cleansing_1
    params:
      - column: product_name_stage
        expression: ltrim(rtrim(product_name_stage))
        overwrite: true

#remove multiple spaces
  - kind: add
    name: add_final_cleansing_3
    context_name: add_final_cleansing_2
    params:
      - column: product_name_stage
        expression: regexp_replace(product_name_stage, '\\s+', ' ')
        overwrite: true

#remove duplicate words
  - kind: add
    name: add_final_cleansing_4
    context_name: add_final_cleansing_3
    params:
      - column: product_name_stage
        overwrite: true
        expression: ltrim(concat_ws(' ', array_distinct(split(product_name_stage, ' '))))

#final select
  - kind: select
    name: select_final
    context_name: add_final_cleansing_4
    params:
      columns:
        product_code: product_code
        product_name_raw: product_name_raw
        product_name_stage: product_name_cleansed
        country_code: country_code
        brand_name: brand_name
        flavour_name: flavour_name
        pack_size_name: pack_size_name
        pack_size_uom_unified: pack_size_uom_unified
        pack_size_volume_unified: pack_size_volume_unified
        pack_type_code: pack_type_code
        pack_type_name: pack_type_name
        sales_unit_name: sales_unit_name
        sales_unit_bottles: sales_unit_bottles
        sales_unit_cases: sales_unit_cases
        sales_unit_pallets: sales_unit_pallets
        product_hierarchy_name: product_hierarchy_name
        sparkling_level: sparkling_level
        country_code_in_product_name: country_code_in_product_name
        is_abp: is_abp
        is_actively_used: is_actively_used
        is_in_use: is_in_use
        is_promotion: is_promotion
        ean_code: ean_code
        ban_code: ban_code
        product_group_code: product_group_code
        product_group_name: product_group_name
        product_type_code: product_type_code
        creation_date: creation_date
        sell_in_volume_uc_12m: sell_in_volume_uc_12m
        sell_in_volume_uc_24m: sell_in_volume_uc_24m
        sap_cluster: sap_cluster
        sub_brand_name: sub_brand_name
        ean_piece: ean_piece
        ean_pack: ean_pack
        ean_case: ean_case
        base_unit_of_measure: base_unit_of_measure
      distinct: true

  - kind: write_dataio
    name: write_spu_product_name_cleanser
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_ered
      namespace: l2
      object_name: sap_products_universe
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: full
