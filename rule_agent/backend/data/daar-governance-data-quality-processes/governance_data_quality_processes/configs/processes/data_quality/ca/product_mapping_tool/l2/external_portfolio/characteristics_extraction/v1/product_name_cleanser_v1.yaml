transform:
  name: ext_product_name_cleanser
  operations:

###############
# Read data marts
# external_portfolio - ep
  - kind: read_dataio
    name: read_ep
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_tool
      namespace: l2
      object_name: external_portfolio
      schema_version: v1
###############

  {% if vendor_data.country != "all" %}

  - kind: filter
    name: filter_vendor
    params:
      - condition:
          country_code = '''{{vendor_data.country}}''' and ext_source_name = '''{{vendor_data.vendor}}'''

  {% endif %}

  - kind: add
    name: add_ven_1
    params:
      - column: sub_brand_name
        expression: '''no_sub_brand'''
      - column: ext_product_name_src_1
        expression: if(country_code = 'at' and ext_source_name = 'leaflets', regexp_replace(lower(ext_product_code), '-', ' '), ext_product_name_src)
      - column: material_description_cleansed
        expression: if(ext_product_name_translated is null, trim(regexp_replace(lower(ext_product_name_src_1), '[^a-z0-9,.\\-%]+', ' ')), trim(regexp_replace(lower(ext_product_name_translated), '[^a-z0-9,.\\-%]+', ' ')))

  - kind: add
    name: add_ven_2
    params:
      - column: material_description_cleansed
        overwrite: true
        expression: ltrim(concat_ws(' ', array_distinct(split(material_description_cleansed, ' '))))
      - column: material_description_cleansed
        overwrite: true
        expression: regexp_replace(material_description_cleansed, '(\\d)\\s*([.,])\\s*(\\d+)\\s*[lL]', '$1$2$3l')
      - column: material_description_cleansed
        overwrite: true
        expression: regexp_replace(material_description_cleansed, '0\\.(\\d*)\\s*ml', '$1ml')
      - column: material_description_cleansed
        overwrite: true
        expression: regexp_replace(material_description_cleansed, '0\\.(\\d*)\\s*(\\d*)l', '0.$1$2l')
      - column: material_description_cleansed
        overwrite: true
        expression: regexp_replace(material_description_cleansed, '\\s+(\\d+)l', '$1l ')

  # volume extraction
  - kind: governance_data_quality_processes.custom_operations.product_mapping_tool.volume_parse.VolumeParseOperation
    name: ven_extract_volume
    context_name: add_ven_2
    config_kind: governance_data_quality_processes.custom_operation_configs.product_mapping_tool.volume_parse_config.VolumeParseOperationConfig
    params:
      input_value: material_description_cleansed
      output_col_name: material_description_stage

  - kind: add
    name: add_ven_3
    params:
      - column: material_description_stage
        overwrite: true
        expression: regexp_replace(material_description_stage, '\\s+', ' ')
      - column: material_description_stage
        overwrite: true
        expression: regexp_replace(material_description_stage, '\\s*pk|\\s*pack|\\s+er', 'x')
        
  - kind: rename
    name: rename_ven_3
    context_name: add_ven_3
    params:
      - column: material_description_stage_volume
        to: volume_stage

  # sales unit extraction
  - kind: governance_data_quality_processes.custom_operations.product_mapping_tool.sales_unit_parse.SalesUnitParseOperation
    name: ven_extract_sales_unit
    context_name: rename_ven_3
    config_kind: governance_data_quality_processes.custom_operation_configs.product_mapping_tool.sales_unit_parse_config.SalesUnitParseOperationConfig
    params:
      input_value: material_description_stage
      output_col_name: material_description_stage
      
  - kind: add
    name: add_ven_4
    params:
      - column: material_description_stage
        overwrite: true
        expression: regexp_replace(material_description_stage, '\\s+', ' ')
      - column: material_description_stage
        overwrite: true
        expression: regexp_replace(material_description_stage, '0\\.0', '__ZERO__')
        
  - kind: rename
    name: rename_ven_4
    context_name: add_ven_4
    params:
      - column: material_description_stage_sales_unit
        to: sales_unit

  # volume extraction
  - kind: governance_data_quality_processes.custom_operations.product_mapping_tool.volume_parse.VolumeParseOperation
    name: ven_extract_volume_2
    context_name: rename_ven_4
    config_kind: governance_data_quality_processes.custom_operation_configs.product_mapping_tool.volume_parse_config.VolumeParseOperationConfig
    params:
      input_value: material_description_stage
      output_col_name: material_description_stage

  - kind: add
    name: add_ven_5
    params:
      - column: material_description_stage
        overwrite: true
        expression: regexp_replace(material_description_stage, '\\b[a-zA-Z]\\b', '')
      - column: material_description_stage
        overwrite: true
        expression: regexp_replace(material_description_stage, '-?\\d+(?:[.,]\\d+)?', '')
      - column: material_description_stage
        overwrite: true
        expression: regexp_replace(material_description_stage, '__ZERO__', '0.0')
      - column: material_description_stage
        overwrite: true
        expression: regexp_replace(material_description_stage, '[%]+', '')
      - column: material_description_stage
        overwrite: true
        expression: regexp_replace(material_description_stage, '\\s+', ' ')

  - kind: add
    name: add_ven_6
    params:
      - column: package_size
        expression: cast(regexp_extract(volume_stage, '([0-9]*\\.?[0-9]+)', 1) as decimal(10,2))
      - column: package_size_unit
        expression: regexp_extract(volume_stage, '([a-zA-Z]+)', 1)
        
  - kind: add
    name: add_ven_7
    params:
      - column: package_size
        overwrite: true
        expression: if(package_size_unit = 'l' or package_size_unit = 'kg', package_size * 1000, package_size)
      - column: package_size_unit
        overwrite: true
        expression: if(package_size_unit = 'l', 'ml', if(package_size_unit = 'kg', 'g', package_size_unit))
      - column: package_size_description
        expression: concat(regexp_replace(regexp_replace(format_string('%.10f', cast(package_size as double)), '0+$', ''), '\\.$', ''), package_size_unit)
      - column: package_size_description
        overwrite: true
        expression: regexp_replace(package_size_description, 'null', '')
        
  - kind: add
    name: add_ven_final
    params:
      - column: ext_product_name_final
        overwrite: true
        expression: concat_ws(' ', material_description_stage, package_size_description, lower(sales_unit))
      - column: ext_product_name_final
        overwrite: true
        expression: trim(regexp_replace(regexp_replace(ext_product_name_final, '(?<!\\d)\\.(?!\\d)', ' '), '\\s+', ' '))

  - kind: select
    name: select_final
    context_name: add_ven_final
    params:
      columns:
      columns:
        ext_product_code: ext_product_code
        country_code: country_code
        ext_source_name: ext_source_name
        ext_product_name_src: ext_product_name_src
        ext_product_name_translated: ext_product_name_translated
        ext_product_name_final: ext_product_name_final
        ean: ean
        ext_brand_src: ext_brand_src
        ext_brand_pcm: ext_brand_pcm
        ext_brand_pcm_probability: ext_brand_pcm_probability
        ext_brand_final: ext_brand_final
        ext_brand_final_probability: ext_brand_final_probability
        ext_flavour_src: ext_flavour_src
        ext_flavour_pcm: ext_flavour_pcm
        ext_flavour_pcm_probability: ext_flavour_pcm_probability
        ext_flavour_final: ext_flavour_final
        ext_flavour_final_probability: ext_flavour_final_probability
        ext_package_type_src: ext_package_type_src
        ext_package_type_pcm: ext_package_type_pcm
        ext_package_type_pcm_probability: ext_package_type_pcm_probability
        ext_package_type_final: ext_package_type_final
        ext_package_type_final_probability: ext_package_type_final_probability
        ext_package_size_src: ext_package_size_src
        ext_package_size_pcm: ext_package_size_pcm
        ext_package_size_pcm_probability: ext_package_size_pcm_probability
        ext_package_size_final: ext_package_size_final
        ext_package_size_final_probability: ext_package_size_final_probability
        ext_sales_unit_src: ext_sales_unit_src
        ext_sales_unit_pcm: ext_sales_unit_pcm
        ext_sales_unit_pcm_probability: ext_sales_unit_pcm_probability
        ext_sales_unit_final: ext_sales_unit_final
        ext_sales_unit_final_probability: ext_sales_unit_final_probability
        ext_sub_brand_src: ext_sub_brand_src
        ext_sub_brand_pcm: ext_sub_brand_pcm
        ext_sub_brand_pcm_probability: ext_sub_brand_pcm_probability
        ext_sub_brand_final: ext_sub_brand_final
        ext_sub_brand_final_probability: ext_sub_brand_final_probability
        ext_item_category_src: ext_item_category_src
        ext_item_category_final: ext_item_category_final
        ext_retailer: ext_retailer
        sparkling_level: sparkling_level
        load_date: load_date
        in_portfolio_scope_flg: in_portfolio_scope_flg
        product_load_status: product_load_status
        number_of_sap_matches: number_of_sap_matches
        number_of_sap_ban_matches: number_of_sap_ban_matches
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        sum_cfy: sum_cfy
        sum_pfy: sum_pfy
        sum_ppfy: sum_ppfy
        sum_pppfy: sum_pppfy
      distinct: true

  - kind: write_dataio
    name: write_vendor_cleansed
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: product_mapping_tool
      namespace: l2
      object_name: external_portfolio
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full