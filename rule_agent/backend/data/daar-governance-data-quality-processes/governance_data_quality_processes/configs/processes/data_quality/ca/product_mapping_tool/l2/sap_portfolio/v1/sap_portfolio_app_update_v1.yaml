transform:
  name: update_sap_data
  operations:

  - kind: read_local
    name: read_sap_data
    params:
      format: parquet
      location: "{{mnt_path}}data_quality/product_mapping_tool/sap_portfolio/{{vendor_data.country}}_{{vendor_data.vendor}}.parquet"

  - kind: add
    name: add_casts
    context_name: read_sap_data
    params:
       - column: sap_product_code
         expression: cast(sap_product_code as string)
         overwrite: true
       - column: country_code
         expression: cast(country_code as string)
         overwrite: true
       - column: ext_source_name
         expression: cast(ext_source_name as string)
         overwrite: true
       - column: sap_product_name
         expression: cast(sap_product_name as string)
         overwrite: true
       - column: sap_product_name_final
         expression: cast(sap_product_name_final as string)
         overwrite: true
       - column: ban
         expression: cast(ban as string)
         overwrite: true
       - column: ban_name
         expression: cast(ban_name as string)
         overwrite: true
       - column: ban_name_final
         expression: cast(ban_name_final as string)
         overwrite: true
       - column: ean_piece
         expression: cast(ean_piece as string)
         overwrite: true
       - column: ean_pack
         expression: cast(ean_pack as string)
         overwrite: true
       - column: ean_case
         expression: cast(ean_case as string)
         overwrite: true
       - column: brand_key
         expression: cast(brand_key as string)
         overwrite: true
       - column: brand_name
         expression: cast(brand_name as string)
         overwrite: true
       - column: brand_final
         expression: cast(brand_final as string)
         overwrite: true
       - column: flavour_key
         expression: cast(flavour_key as string)
         overwrite: true
       - column: flavour_name
         expression: cast(flavour_name as string)
         overwrite: true
       - column: flavour_final
         expression: cast(flavour_final as string)
         overwrite: true
       - column: package_type_key
         expression: cast(package_type_key as string)
         overwrite: true
       - column: package_type_name
         expression: cast(package_type_name as string)
         overwrite: true
       - column: package_type_final
         expression: cast(package_type_final as string)
         overwrite: true
       - column: package_size_key
         expression: cast(package_size_key as string)
         overwrite: true
       - column: package_size_name
         expression: cast(package_size_name as string)
         overwrite: true
       - column: package_size_final
         expression: cast(package_size_final as string)
         overwrite: true
       - column: item_category_key
         expression: cast(item_category_key as string)
         overwrite: true
       - column: item_category_name
         expression: cast(item_category_name as string)
         overwrite: true
       - column: item_category_final
         expression: cast(item_category_final as string)
         overwrite: true
       - column: sales_unit_key
         expression: cast(sales_unit_key as string)
         overwrite: true
       - column: sales_unit_name
         expression: cast(sales_unit_name as string)
         overwrite: true
       - column: sales_unit_final
         expression: cast(sales_unit_final as string)
         overwrite: true
       - column: single_multi_serve_key
         expression: cast(single_multi_serve_key as string)
         overwrite: true
       - column: single_multi_serve_name
         expression: cast(single_multi_serve_name as string)
         overwrite: true
       - column: single_multi_serve_final
         expression: cast(single_multi_serve_final as string)
         overwrite: true
       - column: sub_brand_key
         expression: cast(sub_brand_key as string)
         overwrite: true
       - column: sub_brand_name
         expression: cast(sub_brand_name as string)
         overwrite: true
       - column: sub_brand_final
         expression: cast(sub_brand_final as string)
         overwrite: true
       - column: country_code_in_product_name
         expression: cast(country_code_in_product_name as string)
         overwrite: true
       - column: sparkling_level
         expression: cast(sparkling_level as string)
         overwrite: true
       - column: load_date
         expression: cast(load_date as timestamp)
         overwrite: true
       - column: number_of_ext_matches
         expression: cast(number_of_ext_matches as int)
         overwrite: true
       - column: in_portfolio_scope_flg
         expression: cast(in_portfolio_scope_flg as int)
         overwrite: true
       - column: product_load_status
         expression: cast('''2''' as int)
         overwrite: true
       - column: in_scope_ban_flg
         expression: cast(in_scope_ban_flg as int)
         overwrite: true
       - column: cfy
         expression: cast(cfy as int)
         overwrite: true
       - column: pfy
         expression: cast(pfy as int)
         overwrite: true
       - column: ppfy
         expression: cast(ppfy as int)
         overwrite: true
       - column: pppfy
         expression: cast(pppfy as int)
         overwrite: true
       - column: sum_cfy
         expression: cast(sum_cfy as decimal(10,4))
         overwrite: true
       - column: sum_pfy
         expression: cast(sum_pfy as decimal(10,4))
         overwrite: true
       - column: sum_ppfy
         expression: cast(sum_ppfy as decimal(10,4))
         overwrite: true
       - column: sum_pppfy
         expression: cast(sum_pppfy as decimal(10,4))
         overwrite: true

  - kind: select
    name: select_final
    params:
      columns:
        sap_product_code: sap_product_code
        country_code: country_code
        ext_source_name: ext_source_name
        sap_product_name: sap_product_name
        sap_product_name_final: sap_product_name_final
        ban: ban
        ban_name: ban_name
        ban_name_final: ban_name_final
        ean_piece: ean_piece
        ean_pack: ean_pack
        ean_case: ean_case
        brand_key: brand_key
        brand_name: brand_name
        brand_final: brand_final
        flavour_key: flavour_key
        flavour_name: flavour_name
        flavour_final: flavour_final
        package_type_key: package_type_key
        package_type_name: package_type_name
        package_type_final: package_type_final
        package_size_key: package_size_key
        package_size_name: package_size_name
        package_size_final: package_size_final
        item_category_key: item_category_key
        item_category_name: item_category_name
        item_category_final: item_category_final
        sales_unit_key: sales_unit_key
        sales_unit_name: sales_unit_name
        sales_unit_final: sales_unit_final
        single_multi_serve_key: single_multi_serve_key
        single_multi_serve_name: single_multi_serve_name
        single_multi_serve_final: single_multi_serve_final
        sub_brand_key: sub_brand_key
        sub_brand_name: sub_brand_name
        sub_brand_final: sub_brand_final
        country_code_in_product_name: country_code_in_product_name
        sparkling_level: sparkling_level
        load_date: load_date
        number_of_ext_matches: number_of_ext_matches
        in_portfolio_scope_flg: in_portfolio_scope_flg
        product_load_status: product_load_status
        in_scope_ban_flg: in_scope_ban_flg
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        sum_cfy: sum_cfy
        sum_pfy: sum_pfy
        sum_ppfy: sum_ppfy
        sum_pppfy: sum_pppfy
      distinct: true     

  - kind: write_dataio
    name: write_sap
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: product_mapping_tool
      namespace: l2
      object_name: sap_portfolio
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full