{% if dataio.storage_id == "datalake_dev" %}
{% set uc_catalog_env = "dc_datalake_dev_001" %}
{% elif dataio.storage_id == "datalake_prod" %}
{% set uc_catalog_env = "dc_datalake_prod_001" %}
{% else %}
{% set uc_catalog_env = "dc_datalake_default" %}
{% endif %}

transform:
  name: PMT_flow
  operations:

########################################################################################################################
# Translate source data (fill-in ext_product_name_translated column)
########################################################################################################################
# nested process - translator
  - kind: nested_process
    name: ext_product_name_translator
    params:
      config_path: "processes/data_quality/ca/product_mapping_tool/l2/external_portfolio/characteristics_extraction/v1/product_name_translator_v1.yaml"
      module: "governance_data_quality_processes.configs"
      jinja_params:
        dataio:
          ad_id: "{{dataio.ad_id}}"
          storage_id: "{{dataio.storage_id}}"
        process_run_id: "{{process_run_id}}"
        vendor_data:
          country: "{{vendor_data.country}}"
          vendor: "{{vendor_data.vendor}}"  

########################################################################################################################
# Cleanse translated data (fill-in ext_product_name_final column)
########################################################################################################################
# nested process - cleanser
