#f_promotion LEAFLET_IT

# Read leaflets_informatica_manual

  - kind: read_dataio
    name: read_leaflets_informatica_manual
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_user_input
      namespace: local
      object_name: leaflets_informatica_manual
      schema_version: v1

  - kind: add
    name: add_final_columns_leaflet_it
    params:
     - column: company_code
       expression: ltrim('0', company_code)
     - column: m_promo_discount
       expression: replace(shopper_discount,'%','')/100
     - column: sell_out_start_date
       expression: date_format(to_date(left(start_sell_out,10),'yyyy-MM-dd'),'yyyyMMdd')
     - column: sell_out_end_date
       expression: date_format(to_date(left(end_sell_out,10),'yyyy-MM-dd'),'yyyyMMdd')
     - column: source
       expression: '''leaflet'''

  - kind: select
    name: select_leaflet_it
    params:
      columns:
        country: country
        cust_planning_level_cmd: cpl_code
        cpl_name: cpl_name
        company_code: company_code
        m_promo_discount: m_promo_discount
        retail_promo_selling_price: m_promo_price
        shopper_mechanic: mechanic_name
        promotion_descrpition: promotion_name
        promotion_id: promotion_code
        sell_out_start_date: sell_out_start_date
        sell_out_end_date: sell_out_end_date
        sku_id: sku_id
        ban_id: ban_id
        source: source
      distinct: true

  - kind: union
    name: union_xtel_leaflet_ro
    context_name: select_xtel
    params:
      allow_missing: false
      by_name: true
      other: select_leaflet_ro

  - kind: union
    name: union_leaflet_ru
    params:
      allow_missing: false
      by_name: true
      other: select_leaflet_ru

  - kind: union
    name: union_leaflet_it
    params:
      allow_missing: false
      by_name: true
      other: select_leaflet_it

  - kind: write_dataio
    name: write_f_promotion
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: promo
      namespace: l2
      object_name: f_promotion
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full