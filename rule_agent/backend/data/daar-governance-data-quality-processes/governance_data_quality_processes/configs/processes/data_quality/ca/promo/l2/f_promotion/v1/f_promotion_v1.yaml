transform:
  name: f_promotion
  operations:

#f_promotion XTEL

# Read promo_mechanics

  - kind: read_dataio
    name: read_promo_mechanics
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_user_input
      namespace: local
      object_name: promo_mechanics
      schema_version: v2

  - kind: add
    name: add_final_columns_xtel
    params:
     - column: country
       expression: if(ltrim('0', company_code)='480', 'ni', country)
     - column: company_code
       expression: ltrim('0', company_code)
     - column: sell_out_start_date
       expression: date_format(to_date(left(start_sell_out_date,10),'yyyy-MM-dd'),'yyyyMMdd')
     - column: sell_out_end_date
       expression: date_format(to_date(left(end_sell_out_date,10),'yyyy-MM-dd'),'yyyyMMdd')
     - column: source
       expression: '''xtel'''

  - kind: select
    name: select_xtel
    params:
      columns:
        country: country
        cust_planning_level_cmd: cpl_code
        cpl_name: cpl_name
        company_code: company_code
        shopper_discount: m_promo_discount
        retail_promo_selling_price: m_promo_price
        shopper_mechanic: mechanic_name
        promotion_descrpition: promotion_name
        promotion_id: promotion_code
        sell_out_start_date: sell_out_start_date
        sell_out_end_date: sell_out_end_date
        sku_id: sku_id
        ban_id: ban_id
        source: source
      distinct: true


#f_promotion LEAFLET_RO

# Read leaflets

  - kind: read_dataio
    name: read_leaflets
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_user_input
      namespace: local
      object_name: leaflets
      schema_version: v2

  - kind: add
    name: add_final_columns_leaflet
    params:
     - column: company_code
       expression: '''580'''
     - column: m_promo_price
       expression: replace(regexp_replace(map_with_vat, '[A-Za-z]+$', ''), ',', '.')
     - column: promotion_name
       expression: 'null'
     - column: promotion_code
       expression: 'null'
     - column: sell_out_start_date
       expression: date_format(to_date(left(period_start,10),'yyyy-MM-dd'),'yyyyMMdd')
     - column: sell_out_end_date
       expression: date_format(to_date(left(period_end,10),'yyyy-MM-dd'),'yyyyMMdd')
     - column: sku_code
       expression: 'null'
     - column: source
       expression: '''leaflet'''


  - kind: select
    name: select_leaflets
    params:
      columns:
        item_full_description: item_full_description
        country: country
        retailer: retailer
        company_code: company_code
        discount: m_promo_discount
        m_promo_price: m_promo_price
        promotion_mechanism_w_o_value: mechanic_name
        promotion_name: promotion_name
        promotion_code: promotion_code
        sell_out_start_date: sell_out_start_date
        sell_out_end_date: sell_out_end_date
        sku_code: sku_code
        source: source
      distinct: true

# Read nielsen_leaflet

  - kind: read_dataio
    name: read_nielsen_leaflet
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_user_input
      namespace: local
      object_name: nielsen_leaflet
      schema_version: v2

  - kind: select
    name: select_nielsen_leaflet
    params:
      columns:
        leaflets_key: leaflets_key
        ban: ban
      distinct: true


