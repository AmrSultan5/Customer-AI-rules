{% if dataio.storage_id == "datalake_dev" %}
{% set uc_catalog_env = "dc_datalake_dev_001" %}
{% elif dataio.storage_id == "datalake_prod" %}
{% set uc_catalog_env = "dc_datalake_prod_001" %}
{% else %}
{% set uc_catalog_env = "dc_datalake_default" %}
{% endif %}

transform:
  name: external_portfolio_basic_load_at_rewe
  operations:

# Read data marts
# curated_ppaa_web_input_at.rewe_v1 - md
  - kind: read_dataio
    name: read_rewe
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_web_input
      namespace: at
      object_name: rewe
      schema_version: v1

  - kind: add
    name: add_np_pm_stats_req
    context_name: read_rewe
    params:
      - column: ext_product_code_md_in
        overwrite: true
        expression: name_single_combined
      - column: in_scope_flg
        overwrite: true
        expression: IF(nielsen_category38 IN ('Water', 'Near Water', 'Energy', 'Water (Fresh)', 'Sports', 'SSD') AND cpl <> 'BIPA', 1, 0)

# nested process - pm_stats
  - kind: nested_process
    name: external_portfolio_basic_load_pm_stats
    params:
      config_path: "processes/data_quality/ca/product_mapping_tool/l2/external_portfolio/base_loads/v1/external_portfolio_basic_load_pm_stats_v1.yaml"
      module: "governance_data_quality_processes.configs"
      jinja_params:
        dataio:
          ad_id: "{{dataio.ad_id}}"
          storage_id: "{{dataio.storage_id}}"
        process_run_id: "{{process_run_id}}"
        vendor_data:
          country: "{{vendor_data.country}}"
          vendor: "{{vendor_data.vendor}}"        
# end of nested process

  - kind: group
    name: group_deduplicate_md
    context_name: filter_np_pm_stats_final
    params:
      - aggs:
          name_single_combined: max
          brand: max
          pack: max
          pack_size: max
          variante: max
          item: max
          in_portfolio_scope_flg: max
          number_of_sap_matches: max
          number_of_sap_ban_matches: max
          in_pm_flg: max
        by:
        - ext_product_code_md

  - kind: add
    name: add_const_1_md
    context_name: group_deduplicate_md
    params:
      - column: const_1_md
        expression: '''1'''
      - column: product_id_md
        expression: coalesce(ext_product_code_md, 0)
        overwrite: true
      - column: ean
        expression: regexp_extract(max_item, '(?i)EAN\\s*[:=-]?\\s*([0-9]{8,14})', 1)
        overwrite: true

# subset of data for following nested process - sell out, mode - inscope -> calculating for products incscope, but not in pm
  - kind: filter
    name: filter_np_sellout_mode_in_scope
    context_name: add_const_1_md
    params:
      - condition:
          max_in_pm_flg = 0

# final product select before nested process - needs to be list of unique ext products identifies by product_id_md and need to be named select_product_base
  - kind: select
    name: select_product_base_inscope
    context_name: filter_np_sellout_mode_in_scope
    params:
      columns:
        product_id_md: product_id_md
        max_name_single_combined: ext_product_name_src
        max_brand: ext_brand_src
        max_variante: ext_flavour_src
        max_pack: ext_package_type_src
        max_pack_size: ext_package_size_src
        ext_product_code_md: ext_product_code_md
        ean: ean
        max_in_portfolio_scope_flg: in_portfolio_scope_flg
        max_number_of_sap_matches: number_of_sap_matches
        max_number_of_sap_ban_matches: number_of_sap_ban_matches
        max_in_pm_flg: in_pm_flg
      distinct: true

# sell out source - curated_ppaa_web_input_at.rewe_v1 - sls
# common for inscope and inpm
  - kind: add
    name: add_const_1_sls
    context_name: read_rewe
    params:
      - column: const_1_sls
        expression: '''1'''
      - column: cfy
        expression: year(current_date())
      - column: pfy
        expression: year(current_date()) - 1
      - column: ppfy
        expression: year(current_date()) - 2
      - column: pppfy
        expression: year(current_date()) - 3
      - column: year_extracted
        expression: year

  - kind: select
    name: select_sell_out_base
    context_name: add_const_1_sls
    params:
      columns:
        name_single_combined: product_id_sls
        total_sales_volume_in_bottles: total_volume_sales
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        year_extracted: year_extracted
      distinct: true

  - kind: group
    name: group_sell_out_base
    context_name: select_sell_out_base
    params:
      - aggs:
          total_volume_sales: sum
        by:
        - product_id_sls
        - year_extracted
        - cfy
        - pfy
        - ppfy
        - pppfy

# cfy
  - kind: filter
    name: filter_sell_out_base_cfy
    context_name: group_sell_out_base
    params:
      - condition:
          year_extracted = cfy

  - kind: select
    name: select_sell_out_base_cfy
    context_name: filter_sell_out_base_cfy
    params:
      columns:
        product_id_sls: product_id_sls_cfy
        #cfy: cfy
        sum_total_volume_sales: sum_total_volume_sales_cfy
      distinct: true

# pfy
  - kind: filter
    name: filter_sell_out_base_pfy
    context_name: group_sell_out_base
    params:
      - condition:
          year_extracted = pfy

  - kind: select
    name: select_sell_out_base_pfy
    context_name: filter_sell_out_base_pfy
    params:
      columns:
        product_id_sls: product_id_sls_pfy
        #pfy: pfy
        sum_total_volume_sales: sum_total_volume_sales_pfy
      distinct: true

# ppfy
  - kind: filter
    name: filter_sell_out_base_ppfy
    context_name: group_sell_out_base
    params:
      - condition:
          year_extracted = ppfy

  - kind: select
    name: select_sell_out_base_ppfy
    context_name: filter_sell_out_base_ppfy
    params:
      columns:
        product_id_sls: product_id_sls_ppfy
        #ppfy: ppfy
        sum_total_volume_sales: sum_total_volume_sales_ppfy
      distinct: true

# pppfy
  - kind: filter
    name: filter_sell_out_base_pppfy
    context_name: group_sell_out_base
    params:
      - condition:
          year_extracted = pppfy

  - kind: select
    name: select_sell_out_base_pppfy
    context_name: filter_sell_out_base_pppfy
    params:
      columns:
        product_id_sls: product_id_sls_pppfy
        #pppfy: pppfy
        sum_total_volume_sales: sum_total_volume_sales_pppfy
      distinct: true

# sequence of joins for flattening of sell out
  - kind: join
    name: join_sls_flatten_sell_out_cfy_pfy
    context_name: select_sell_out_base_cfy
    params:
      - other:
          select_sell_out_base_pfy
        how:
          full_outer
        columns:
          product_id_sls_cfy: product_id_sls_pfy

  - kind: add
    name: add_sls_product_id_after_pfy
    context_name: join_sls_flatten_sell_out_cfy_pfy
    params:
      - column: product_id_sls_after_pfy
        expression: coalesce(product_id_sls_cfy, product_id_sls_pfy)
        overwrite: true

  - kind: join
    name: join_sls_flatten_sell_out_ppfy
    context_name: add_sls_product_id_after_pfy
    params:
      - other:
          select_sell_out_base_ppfy
        how:
          full_outer
        columns:
          product_id_sls_after_pfy: product_id_sls_ppfy

  - kind: add
    name: add_sls_product_id_after_ppfy
    context_name: join_sls_flatten_sell_out_ppfy
    params:
      - column: product_id_sls_after_ppfy
        expression: coalesce(product_id_sls_after_pfy, product_id_sls_ppfy)
        overwrite: true

  - kind: join
    name: join_sls_flatten_sell_out_pppfy
    context_name: add_sls_product_id_after_ppfy
    params:
      - other:
          select_sell_out_base_pppfy
        how:
          full_outer
        columns:
          product_id_sls_after_ppfy: product_id_sls_pppfy

  - kind: add
    name: add_sls_product_id_after_pppfy
    context_name: join_sls_flatten_sell_out_pppfy
    params:
      - column: product_id_sls_after_pppfy
        expression: coalesce(product_id_sls_after_ppfy, product_id_sls_pppfy)
        overwrite: true
      - column: const_1_sls_sell_out_base
        expression: '''1'''

# specific for in scope
  - kind: filter
    name: filter_sls_conf_data_sell_out_inscope
    context_name: add_sls_product_id_after_pppfy
    params:
      - condition:
          (sum_total_volume_sales_cfy is not null AND sum_total_volume_sales_cfy != 0) OR (sum_total_volume_sales_pfy is not null AND sum_total_volume_sales_pfy != 0) OR (sum_total_volume_sales_ppfy is not null AND sum_total_volume_sales_ppfy != 0) OR (sum_total_volume_sales_pppfy is not null AND sum_total_volume_sales_pppfy != 0)
 
  - kind: add
    name: add_fy_after_flattening_inscope
    context_name: filter_sls_conf_data_sell_out_inscope
    params:
      - column: cfy
        expression: year(current_date())
        overwrite: true
      - column: pfy
        expression: year(current_date()) - 1
        overwrite: true
      - column: ppfy
        expression: year(current_date()) - 2
        overwrite: true
      - column: pppfy
        expression: year(current_date()) - 3
        overwrite: true

  - kind: select
    name: select_sell_out_final_inscope
    context_name: add_fy_after_flattening_inscope
    params:
      columns:
        product_id_sls_after_pppfy: product_id_sls_final
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        sum_total_volume_sales_cfy: sum_total_volume_sales_cfy
        sum_total_volume_sales_pfy: sum_total_volume_sales_pfy
        sum_total_volume_sales_ppfy: sum_total_volume_sales_ppfy
        sum_total_volume_sales_pppfy: sum_total_volume_sales_pppfy
      distinct: true

# inner join sell out back to product - inscope
  - kind: join
    name: join_product_sell_out_inscope
    context_name: select_product_base_inscope
    params:
      - other:
          select_sell_out_final_inscope
        how:
          inner
        columns:
          product_id_md: product_id_sls_final
# in scope end

# capture results of np into dataframe, for union later
# np_sellout_mode_in_scope
  - kind: add
    name: add_np_sellout_mode_in_scope
    context_name: join_product_sell_out_inscope
    params:
      - column: const_1_union
        expression: '''1'''

# subset of data for following nested process - sell out, mode - in_pm -> calculating for products in_pm, regardless of scope
  - kind: filter
    name: filter_np_sellout_mode_in_pm
    context_name: add_const_1_md
    params:
      - condition:
          max_in_pm_flg = 1

  - kind: select
    name: select_product_base_inpm
    context_name: filter_np_sellout_mode_in_pm
    params:
      columns:
        product_id_md: product_id_md
        max_name_single_combined: ext_product_name_src
        max_brand: ext_brand_src
        max_variante: ext_flavour_src
        max_pack: ext_package_type_src
        max_pack_size: ext_package_size_src
        ext_product_code_md: ext_product_code_md
        max_in_portfolio_scope_flg: in_portfolio_scope_flg
        ean: ean
        max_number_of_sap_matches: number_of_sap_matches
        max_number_of_sap_ban_matches: number_of_sap_ban_matches
        max_in_pm_flg: in_pm_flg
      distinct: true

# specific for in pm
  - kind: add
    name: add_fy_after_flattening_inpm
    context_name: add_sls_product_id_after_pppfy
    params:
      - column: cfy
        expression: year(current_date())
        overwrite: true
      - column: pfy
        expression: year(current_date()) - 1
        overwrite: true
      - column: ppfy
        expression: year(current_date()) - 2
        overwrite: true
      - column: pppfy
        expression: year(current_date()) - 3
        overwrite: true

  - kind: select
    name: select_sell_out_final_inpm
    context_name: add_fy_after_flattening_inpm
    params:
      columns:
        product_id_sls_after_pppfy: product_id_sls_final
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        sum_total_volume_sales_cfy: sum_total_volume_sales_cfy
        sum_total_volume_sales_pfy: sum_total_volume_sales_pfy
        sum_total_volume_sales_ppfy: sum_total_volume_sales_ppfy
        sum_total_volume_sales_pppfy: sum_total_volume_sales_pppfy
      distinct: true

# left join sell out back to product
  - kind: join
    name: join_product_sell_out_inpm
    context_name: select_product_base_inpm
    params:
      - other:
          select_sell_out_final_inpm
        how:
          left
        columns:
          product_id_md: product_id_sls_final

  - kind: add
    name: add_fy_after_left_join
    context_name: join_product_sell_out_inpm
    params:
      - column: cfy
        expression: year(current_date())
        overwrite: true
      - column: pfy
        expression: year(current_date()) - 1
        overwrite: true
      - column: ppfy
        expression: year(current_date()) - 2
        overwrite: true
      - column: pppfy
        expression: year(current_date()) - 3
        overwrite: true
# in pm end

# capture results of np into dataframe, for union later
# np_sellout_mode_in_pm
  - kind: add
    name: add_np_sellout_mode_in_pm
    context_name: add_fy_after_left_join
    params:
      - column: const_1_union
        expression: '''1'''

  - kind: union
    name: union_np_sellout
    context_name: add_np_sellout_mode_in_pm
    params:
      allow_missing: true
      by_name: true
      other: add_np_sellout_mode_in_scope


  - kind: add
    name: add_sell_out_calc
    context_name: union_np_sellout
    params:
      - column: sum_total_volume_sales_cfy
        expression: cast(sum_total_volume_sales_cfy / 5.678 as decimal(10,4))
        overwrite: true
      - column: sum_total_volume_sales_pfy
        expression: cast(sum_total_volume_sales_pfy / 5.678 as decimal(10,4))
        overwrite: true
      - column: sum_total_volume_sales_ppfy
        expression: cast(sum_total_volume_sales_ppfy / 5.678 as decimal(10,4))
        overwrite: true
      - column: sum_total_volume_sales_pppfy
        expression: cast(sum_total_volume_sales_pppfy / 5.678 as decimal(10,4))
        overwrite: true
      - column: number_of_sap_matches
        expression: cast(number_of_sap_matches as integer)
        overwrite: true
      - column: number_of_sap_ban_matches
        expression: cast(number_of_sap_ban_matches as integer)
        overwrite: true
      - column: ext_package_size_src
        expression: cast(ext_package_size_src as string)
        overwrite: true

#final step
  - kind: add
    name: add_const_values
    context_name: add_sell_out_calc
    params:
      - column: ext_product_code
        overwrite: true
        expression: product_id_md
      # - column: ean
      #   overwrite: true
      #   expression: ext_product_code
      - column: country_code
        overwrite: true
        expression: '''{{vendor_data.country}}''' 
      - column: ext_source_name 
        expression: '''{{vendor_data.vendor}}'''
      - column: ext_product_name_translated
        expression: "cast (null as string)"
      - column: ext_product_name_final
        expression: "cast (null as string)"
      # - column: ext_brand_src
      #   expression: "cast (null as string)"
      - column: ext_brand_pcm
        expression: "cast (null as string)"
      - column: ext_brand_pcm_probability
        expression: "cast (null as decimal(10,4))"
      - column: ext_brand_final
        expression: "cast (null as string)"
      - column: ext_brand_final_probability
        expression: "cast (null as decimal(10,4))"
      # - column: ext_flavour_src
      #   expression: "cast (null as string)"
      - column: ext_flavour_pcm
        expression: "cast (null as string)"
      - column: ext_flavour_pcm_probability
        expression: "cast (null as decimal(10,4))"
      - column: ext_flavour_final
        expression: "cast (null as string)"
      - column: ext_flavour_final_probability
        expression: "cast (null as decimal(10,4))"
      # - column: ext_package_type_src
      #   expression: "cast (null as string)"
      - column: ext_package_type_pcm
        expression: "cast (null as string)"
      - column: ext_package_type_pcm_probability
        expression: "cast (null as decimal(10,4))"
      - column: ext_package_type_final
        expression: "cast (null as string)"
      - column: ext_package_type_final_probability
        expression: "cast (null as decimal(10,4))"
      # - column: ext_package_size_src
      #   expression: "cast (null as string)"
      - column: ext_package_size_pcm
        expression: "cast (null as string)"
      - column: ext_package_size_pcm_probability
        expression: "cast (null as decimal(10,4))"
      - column: ext_package_size_final
        expression: "cast (null as string)"
      - column: ext_package_size_final_probability
        expression: "cast (null as decimal(10,4))"
      - column: ext_sales_unit_src
        expression: "cast (null as string)"
      - column: ext_sales_unit_pcm
        expression: "cast (null as string)"
      - column: ext_sales_unit_pcm_probability
        expression: "cast (null as decimal(10,4))"
      - column: ext_sales_unit_final
        expression: "cast (null as string)"
      - column: ext_sales_unit_final_probability
        expression: "cast (null as decimal(10,4))"
      - column: ext_sub_brand_src
        expression: "cast (null as string)"
      - column: ext_sub_brand_pcm
        expression: "cast (null as string)"
      - column: ext_sub_brand_pcm_probability
        expression: "cast (null as decimal(10,4))"
      - column: ext_sub_brand_final
        expression: "cast (null as string)"
      - column: ext_sub_brand_final_probability
        expression: "cast (null as decimal(10,4))"
      - column: ext_item_category_src
        expression: "cast (null as string)"
      - column: ext_item_category_final
        expression: "cast (null as string)"
      - column: ext_retailer
        expression: "cast (null as string)"
      - column: load_date
        expression: current_timestamp()
      # - column: in_portfolio_scope_flg
      #   expression: "1"
      - column: product_load_status
        expression: "1"
      # - column: number_of_sap_matches
      #   expression: "cast (null as integer)"
      # - column: number_of_sap_ban_matches
      #   expression: "cast (null as integer)"
      # - column: cfy
      #   expression: "cast (null as integer)"
      # - column: pfy
      #   expression: "cast (null as integer)"
      # - column: ppfy
      #   expression: "cast (null as integer)"
      # - column: sum_cfy
      #   expression: "cast (null as decimal(10,4))"
      # - column: sum_pfy
      #   expression: "cast (null as decimal(10,4))"
      # - column: sum_ppfy
      #   expression: "cast (null as decimal(10,4))"

  - kind: select
    name: select_final
    context_name: add_const_values
    params:
      columns:
        ext_product_code: ext_product_code
        country_code: country_code
        ext_source_name: ext_source_name
        ext_product_name_src: ext_product_name_src
        ext_product_name_translated: ext_product_name_translated
        ext_product_name_final: ext_product_name_final
        ean: ean
        ext_brand_src: ext_brand_src
        ext_brand_pcm: ext_brand_pcm
        ext_brand_pcm_probability: ext_brand_pcm_probability
        ext_brand_final: ext_brand_final
        ext_brand_final_probability: ext_brand_final_probability
        ext_flavour_src: ext_flavour_src
        ext_flavour_pcm: ext_flavour_pcm
        ext_flavour_pcm_probability: ext_flavour_pcm_probability
        ext_flavour_final: ext_flavour_final
        ext_flavour_final_probability: ext_flavour_final_probability
        ext_package_type_src: ext_package_type_src
        ext_package_type_pcm: ext_package_type_pcm
        ext_package_type_pcm_probability: ext_package_type_pcm_probability
        ext_package_type_final: ext_package_type_final
        ext_package_type_final_probability: ext_package_type_final_probability
        ext_package_size_src: ext_package_size_src
        ext_package_size_pcm: ext_package_size_pcm
        ext_package_size_pcm_probability: ext_package_size_pcm_probability
        ext_package_size_final: ext_package_size_final
        ext_package_size_final_probability: ext_package_size_final_probability
        ext_sales_unit_src: ext_sales_unit_src
        ext_sales_unit_pcm: ext_sales_unit_pcm
        ext_sales_unit_pcm_probability: ext_sales_unit_pcm_probability
        ext_sales_unit_final: ext_sales_unit_final
        ext_sales_unit_final_probability: ext_sales_unit_final_probability
        ext_sub_brand_src: ext_sub_brand_src
        ext_sub_brand_pcm: ext_sub_brand_pcm
        ext_sub_brand_pcm_probability: ext_sub_brand_pcm_probability
        ext_sub_brand_final: ext_sub_brand_final
        ext_sub_brand_final_probability: ext_sub_brand_final_probability
        ext_item_category_src: ext_item_category_src
        ext_item_category_final: ext_item_category_final
        ext_retailer: ext_retailer
        load_date: load_date
        in_portfolio_scope_flg: in_portfolio_scope_flg
        product_load_status: product_load_status
        number_of_sap_matches: number_of_sap_matches
        number_of_sap_ban_matches: number_of_sap_ban_matches
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        sum_total_volume_sales_cfy: sum_cfy
        sum_total_volume_sales_pfy: sum_pfy
        sum_total_volume_sales_ppfy: sum_ppfy
        sum_total_volume_sales_pppfy: sum_pppfy
      distinct: true

  - kind: write_dataio
    name: write_external_portfolio
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_tool
      namespace: l2
      object_name: external_portfolio
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: full
