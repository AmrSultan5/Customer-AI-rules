transform:
  name: dm_vendor_purchase_org
  operations:

  - kind: read_dataio
    name: read_lfm1
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: vendor
      object_name: lfm1
      schema_version: v1


  - kind: select
    name: select_lfm1
    context_name: read_lfm1
    params:
      columns:
        lifnr: lifnr
        ekorg: ekorg
        sperm: sperm
        loevm: loevm
        erdat: erdat
        sap_cluster: sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_purchase_organization_mapping
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: data_quality
      namespace: master_data_quality
      object_name: purchase_organization_mapping
      schema_version: v1

  - kind: read_dataio
    name: read_cdhdr
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: transactional_data
      object_name: cdhdr
      schema_version: v1

  - kind: filter
    name: filter_cdhdr
    context_name: read_cdhdr
    params:
      - condition: objectclas = 'KRED'

  - kind: group
    name: group_cdhdr
    context_name: filter_cdhdr
    params:
      - aggs:
          udate: max
        by:
        - changenr
        - sap_cluster

  - kind: select
    name: select_cdhdr
    context_name: group_cdhdr
    params:
      columns:
        changenr: changenr
        max_udate: max_udate
        sap_cluster: sap_cluster
      distinct: true
    skip_next: false

  - kind: read_dataio
    name: read_cdpos
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: transactional_data
      object_name: cdpos
      schema_version: v1

  - kind: filter
    name: filter_cdpos_unblock
    context_name: read_cdpos
    params:
      - condition: objectclas = 'KRED' AND chngind = 'U' AND tabname = 'LFM1' and value_old = 'X' and value_new = '' and fname in('LOEVM', 'SPERM')

  - kind: add
    name: add_tabkey_unblock
    context_name: filter_cdpos_unblock
    params:
      - column: trim_tabkey
        expression: 'replace(tabkey, " ", "") as str'

  - kind: select
    name: select_cdpos_unblock
    context_name: add_tabkey_unblock
    params:
      columns:
        changenr: changenr
        trim_tabkey: trim_tabkey
        sap_cluster: sap_cluster
      distinct: true
    skip_next: false

  - kind: join
    name: join_cdhdr_cdpos_unblock
    context_name: select_cdpos_unblock
    params:
      - other:
          select_cdhdr
        how:
          left
        columns:
          changenr: changenr
          sap_cluster: sap_cluster

  - kind: select
    name: select_max_udate_unblock
    context_name: join_cdhdr_cdpos_unblock
    params:
      columns:
        trim_tabkey: trim_tabkey
        max_udate: max_udate_unblock
        sap_cluster: sap_cluster
      distinct: true
    skip_next: false

  - kind: add
    name: add_is_active
    context_name: select_lfm1
    params:
      - column: is_active
        expression: if((sperm = '' or isnull(sperm)) and (loevm = '' or isnull(loevm)), '1', '0') 
      - column: created_on
        expression: date(erdat)
      - column: tabkey
        expression: concat_ws('', '400', lifnr, ekorg)

  - kind: join
    name: join_dm_vendor_purchase_org
    context_name: add_is_active
    params:
      - other:
          select_max_udate_unblock
        how:
          left
        columns:
          tabkey: trim_tabkey
          sap_cluster: sap_cluster
      - other:
          read_purchase_organization_mapping
        how:
          inner
        columns:
          ekorg: purchasing_organization

  - kind: cast
    name: cast_date
    context_name: join_dm_vendor_purchase_org
    params:
      - column: max_udate_unblock
        to: date

  - kind: group
    name: group_dm_vendor_purchase_org
    context_name: cast_date
    params:
      - aggs:
          max_udate_unblock: max
        by:
        - lifnr
        - ekorg
        - country_code
        - loevm
        - sperm
        - created_on
        - is_active
        - sap_cluster

  - kind: select
    name: select_dm_vendor_purchase_org
    params:
      columns:
        lifnr: vendor_code
        ekorg: purchasing_organization
        country_code: country_code
        loevm: deletion_flag
        sperm: purchasing_block
        created_on: created_on
        max_max_udate_unblock: last_unblock_date
        sap_cluster: sap_cluster
        is_active: is_active
      distinct: true

  - kind: write_dataio
    name: write_dm_vendor_purchase_org
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: master_data_quality
      namespace: l2
      object_name: dm_vendor_purchase_org
      process_run_id: "{{process_run_id}}"
      schema_version: v3
      refresh_mode: full