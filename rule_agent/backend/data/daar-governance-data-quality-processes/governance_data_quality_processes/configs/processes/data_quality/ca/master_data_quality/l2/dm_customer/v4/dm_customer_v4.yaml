    params:
      - other:
          select_ausp_crm_143
        how:
          left
        columns:
          ausp_partner_guid: ausp_partner_guid_143
          sap_cluster: ausp_sap_cluster_143
      - other:
          select_ausp_crm_148
        how:
          left
        columns:
          ausp_partner_guid: ausp_partner_guid_148
          sap_cluster: ausp_sap_cluster_148
      - other:
          select_ausp_crm_151
        how:
          left
        columns:
