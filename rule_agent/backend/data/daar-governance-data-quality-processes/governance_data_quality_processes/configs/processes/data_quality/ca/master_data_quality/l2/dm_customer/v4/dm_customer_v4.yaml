transform:
  name: dm_customer
  operations:

  - kind: read_dataio
    name: read_kna1
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: customer
      object_name: kna1
      schema_version: v1


  - kind: select
    name: select_kna1
    params:
      columns:
        kunnr: kna1_kunnr
        aufsd: kna1_aufsd
        land1: kna1_land1
        adrnr: kna1_adrnr
        name1: kna1_name1
        ktokd: kna1_ktokd
        katr1: kna1_katr1
        katr6: kna1_katr6
        katr7: kna1_katr7
        katr4: kna1_katr4
        loevm: kna1_loevm
        stras: kna1_stras
        spras: kna1_spras
        stkzn: kna1_stkzn
        sap_cluster: kna1_sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_knvv
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: customer
      object_name: knvv
      schema_version: v1

  - kind: select
    name: select_knvv
    params:
      columns:
        kunnr: knvv_kunnr
        aufsd: knvv_aufsd
        vkorg: knvv_vkorg
        kvgr4: knvv_kvgr4
        vkbur: knvv_vkbur
        vkgrp: knvv_vkgrp
        vtweg: knvv_vtweg
        spart: knvv_spart
        erdat: knvv_erdat
        zterm: knvv_zterm
        sap_cluster: knvv_sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_cluster_config
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: data_quality
      namespace: master_data_quality
      object_name: d_customer_config_file
      schema_version: v1


  - kind: select
    name: select_cluster_config
    params:
      columns:
        sales_org_code: sales_org
        cluster: cluster
      distinct: true

  - kind: join
    name: join_config_knvv
    context_name: select_knvv
    params:
      - other:
          select_cluster_config
        how:
          inner
        columns:
          knvv_vkorg: sales_org
          knvv_sap_cluster: cluster

  - kind: read_dataio
    name: read_tvast
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: tvast
      schema_version: v1

  - kind: filter
    name: filter_tvast
    params:
      - condition:
          spras = 'E'

  - kind: select
    name: select_tvast
    params:
      columns:
        aufsp: tvast_aufsp
        vtext: tvast_vtext
        sap_cluster: tvast_sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_tvk1t
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: tvk1t
      schema_version: v1

  - kind: filter
    name: filter_tvk1t
    params:
      - condition:
          spras = 'E'

  - kind: select
    name: select_tvk1t
    params:
      columns:
        katr1: tvk1t_katr1
        vtext: tvk1t_vtext
        sap_cluster: tvk1t_sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_tvk6t
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
