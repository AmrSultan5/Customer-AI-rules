  - kind: filter
    name: filter_tvk6t
    params:
      - condition:
          spras = 'E'

  - kind: select
    name: select_tvk6t
    params:
      columns:
        katr6: tvk6t_katr6
        vtext: tvk6t_vtext
        sap_cluster: tvk6t_sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_knb1_erdat
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: customer
      object_name: knb1
      schema_version: v1


  - kind: group
    name: group_knb1_erdat
    params:
      - aggs:
          erdat: max
        by:
        - kunnr
        - sap_cluster


  - kind: select
    name: select_knb1_erdat
    params:
      columns:
        kunnr: knb1_kunnr_erdat
        max_erdat: knb1_erdat_erdat
        sap_cluster: knb1_sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_knb1_bukrs
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: customer
      object_name: knb1
      schema_version: v1


  - kind: select
    name: select_knb1_wo
    params:
      columns:
        kunnr: knb1_kunnr
        bukrs: knb1_bukrs
        erdat: knb1_erdat
        akont: knb1_akont
        sap_cluster: knb1_sap_cluster_wo
      distinct: true


  - kind: join
    name: join_knb1_erdat_bukrs
    context_name: select_knb1_erdat
    params:
      - other:
          select_knb1_wo
        how:
          inner
        columns:
          knb1_kunnr_erdat: knb1_kunnr
          knb1_erdat_erdat: knb1_erdat
          knb1_sap_cluster: knb1_sap_cluster_wo

  - kind: group
    name: group_knb1_bukrs
    params:
      - aggs:
          knb1_bukrs: max
        by:
        - knb1_kunnr
        - knb1_akont
        - knb1_sap_cluster

  - kind: select
    name: select_knb1
    params:
      columns:
        knb1_kunnr: knb1_kunnr
        max_knb1_bukrs: knb1_bukrs
        knb1_akont: knb1_akont
        knb1_sap_cluster: knb1_sap_cluster
      distinct: true


