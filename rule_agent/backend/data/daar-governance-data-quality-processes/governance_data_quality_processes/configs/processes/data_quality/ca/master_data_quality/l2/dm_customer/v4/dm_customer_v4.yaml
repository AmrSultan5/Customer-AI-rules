  - kind: read_dataio
    name: read_ausp
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_crm
      namespace: customer
      object_name: ausp
      schema_version: v1

  - kind: filter
    name: filter_ausp
    params:
      - condition:
          atinn = '143' or atinn = '148' or atinn = '151'


  - kind: select
    name: select_ausp_crm
    params:
      columns:
        partner_guid: ausp_partner_guid
        sap_cluster: sap_cluster


  - kind: group
    name: group_ausp_changed_at
    context_name: filter_ausp
    params:
      - aggs:
          changed_at: max
        by:
        - atinn
        - partner_guid
        - sap_cluster


  - kind: join
    name: join_group_ausp_crm
    context_name: filter_ausp
    params:
      - other:
          group_ausp_changed_at
        how:
          inner
        columns:
          partner_guid: partner_guid
          atinn: atinn
          changed_at: max_changed_at
          sap_cluster: sap_cluster

  - kind: select
    name: select_ausp
    params:
      columns:
        partner_guid: ausp_partner_guid
        atinn: ausp_atinn
        max_changed_at: ausp_changed_at
        atwrt: ausp_atwrt
        sap_cluster: ausp_sap_cluster
      distinct: true


  - kind: filter
    name: filter_ausp_crm_143
    context_name: select_ausp
    params:
      - condition:
          ausp_atinn = '143'

  - kind: select
    name: select_ausp_crm_143
