transform:
  name: dm_vendor_purchase_org
  operations:

  - kind: read_dataio
    name: read_lfm1
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: vendor
      object_name: lfm1
      schema_version: v1


  - kind: select
    name: select_lfm1
    context_name: read_lfm1
    params:
      columns:
        lifnr: lifnr
        ekorg: ekorg
        sperm: sperm
        loevm: loevm
        erdat: erdat
        sap_cluster: sap_cluster
      distinct: true

  - kind: add
    name: add_is_active
    params:
      - column: is_active
        expression: if((sperm = '' or isnull(sperm)) and (loevm = '' or isnull(loevm)), '1', '0') 
      - column: created_on
        expression: date(erdat)

  - kind: select
    name: select_dm_vendor_purchase_org
    params:
      columns:
        lifnr: vendor_code
        ekorg: purchasing_organization
        loevm: deletion_flag
        sperm: purchasing_block
        created_on: created_on
        sap_cluster: sap_cluster
        is_active: is_active
      distinct: true

  - kind: write_dataio
    name: write_dm_vendor_purchase_org
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: master_data_quality
      namespace: l2
      object_name: dm_vendor_purchase_org
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full