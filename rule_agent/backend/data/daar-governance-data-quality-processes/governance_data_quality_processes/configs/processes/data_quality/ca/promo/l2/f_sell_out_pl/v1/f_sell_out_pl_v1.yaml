transform:
  name: f_sell_out_pl
  operations:

# universal_schema
  - kind: read_dataio
    name: read_universal_schema
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: udm
        storage_id: '{{dataio.storage_id}}'
      domain: paat
      namespace: ca
      object_name: universal_schema
      schema_version: v1

  - kind: filter
    name: filter_universal_schema
    params:
      - condition:
          country='pl'

  - kind: add
    name: add_lower_vendor
    params:
     - column: vendor_name_low
       expression: lower(vendor_name)

  - kind: select
    name: select_universal_schema
    params:
      columns:
        vendor_name_low: vendor_name_low
        stable_key_to_ban_id: stable_key_to_ban_id
        product_name_long: product_name_long
        year: year
        week: week
        retailer: retailer
        vendor_name: vendor_name
        promo_flag: promo_flag
        total_volume_sales: total_volume_sales
        total_value_sales: total_value_sales
      distinct: true

# Read cpl_mapping

  - kind: read_dataio
    name: read_cpl_mapping
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: data_quality
      namespace: promo
      object_name: cpl_mapping
      schema_version: v1

  - kind: filter
    name: filter_cpl_mapping
    params:
      - condition:
          country='pl'

  - kind: select
    name: select_cpl_mapping
    params:
      columns:
        retailer: retailer
        cpl_code: cpl_code
        cpl_name: cpl_name
      distinct: true

# Read date_v2

  - kind: read_dataio
    name: read_date
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_user_input
      namespace: local
      object_name: date
      schema_version: v2

  - kind: select
    name: select_date_1
    params:
      columns:
        year: year
        week: week
        date_id: date_id
      distinct: true

  - kind: group
    name: group_date
    params:
      - aggs:
          date_id: min
        by:
        - year
        - week

  - kind: select
    name: select_date
    params:
      columns:
        year: year
        week: week
        min_date_id: date_id
      distinct: true


# product_mapping
  - kind: read_dataio
    name: read_product_mapping
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: informatica_dq
      namespace: product_mapping_tool
      object_name: product_mapping
      schema_version: v1

  - kind: filter
    name: filter_product_mapping
    params:
      - condition:
          country = 'pl'

  - kind: select
    name: select_product_mapping
    params:
      columns:
        vendor_item: vendor_item
        vendor: vendor
        ban: ban
      distinct: true

  - kind: select
    name: select_product_mapping_for_grouping
    params:
      columns:
        vendor_item: vendor_item
        ban: ban
      distinct: true

  - kind: group
    name: group_product_mapping_ban_vendor
    params:
      - aggs:
          ban: count
        by:
        - vendor_item
        
  - kind: filter
    name: filter_product_mapping_wo_duplicates
    params:
      - condition:
          count_ban = 1

  - kind: add
    name: add_lower_vendor
    context_name: select_product_mapping
    params:
     - column: vendor_low
       expression: lower(vendor)

  - kind: join
    name: join_distinct_vendor
    context_name: add_lower_vendor
    params:
      - other:
          filter_product_mapping_wo_duplicates
        how:
          inner
        columns:
          vendor_item: vendor_item


#read sellout_literage

  - kind: read_dataio
    name: read_sellout_literage
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_user_input
      namespace: local
      object_name: sellout_literage
      schema_version: v2

  - kind: filter
    name: filter_sellout_literage
    params:
      - condition:
          company_code = '0563'

  - kind: select
    name: select_sellout_literage
    params:
      columns:
        sellout_literage: sellout_literage
        ban: ban
      distinct: true


#joining sources
  - kind: join
    name: join_so_mp_1
    context_name: select_universal_schema
    params:
      - other:
          join_distinct_vendor
        how:
          left
        columns:
          stable_key_to_ban_id: vendor_item
          vendor_name_low: vendor_low

  - kind: select
    name: select_after_first_join
    params:
      columns:
        vendor_name_low: vendor_name_low
        stable_key_to_ban_id: stable_key_to_ban_id
        product_name_long: product_name_long
        year: year
        week: week
        retailer: retailer
        vendor_name: vendor_name
        promo_flag: promo_flag
        total_volume_sales: total_volume_sales
        total_value_sales: total_value_sales
        vendor_item: vendor_item_1
        ban: ban_1
      distinct: true


  - kind: join
    name: join_so_mp_2
    context_name: select_after_first_join
    params:
      - other:
          join_distinct_vendor
        how:
          left
        columns:
          product_name_long: vendor_item
          vendor_name_low: vendor_low

  - kind: add
    name: add_vendor_item_ban
    params:
     - column: vendor_item
       expression: nvl(vendor_item_1, vendor_item)
       overwrite: true
     - column: ban
       expression: nvl(ban_1, ban)
       overwrite: true

  - kind: select
    name: select_after_join_with_mp
    params:
      columns:
        vendor_name_low: vendor_name_low
        stable_key_to_ban_id: stable_key_to_ban_id
        product_name_long: product_name_long
        year: year
        week: week
        retailer: retailer
        vendor_name: vendor_name
        promo_flag: promo_flag
        total_volume_sales: total_volume_sales
        total_value_sales: total_value_sales
        vendor_item: vendor_item
        ban: ban
      distinct: true

  - kind: join
    name: join_so_mp_cld_lit
    context_name: select_after_join_with_mp
    params:
      - other:
          select_date
        how:
          left
        columns:
          year: year
          week: week
      - other:
          select_sellout_literage
        how:
          left
        columns:
          ban: ban
      - other:
          select_cpl_mapping
        how:
          left
        columns:
          retailer: retailer

  - kind: add
    name: add_final_columns
    params:
      - column: company_code
        expression: '''563'''
      - column: country
        expression: '''pl'''
      - column: currency_code
        expression: '''PLN'''
      - column: date
        expression: date_format(to_date(left(date_id,10),'yyyy-MM-dd'),'yyyyMMdd')
      - column: m_sales_promo_uc
        expression: coalesce(if(vendor_name = 'carrefour',if(promo_flag IS NOT NULL or promo_flag = 1,(total_volume_sales * sellout_literage)/5.678,0),if(promo_flag is not null or promo_flag = 1,(total_volume_sales*1000)/5.678,0)))
      - column: m_sales_promo_value
        expression: coalesce(if(promo_flag IS NOT NULL or promo_flag = 1,total_value_sales,0))
      - column: m_sales_regular_uc
        expression: coalesce(if(vendor_name = 'carrefour',if(promo_flag IS NULL or promo_flag = 0,(total_volume_sales * sellout_literage)/5.678,0),if(promo_flag is null or promo_flag = 0,(total_volume_sales*1000)/5.678,0)))
      - column: m_sales_regular_value
        expression: coalesce(if(promo_flag IS NULL or promo_flag = 0,total_value_sales,0))
      - column: manufacturer_name
        expression: if(vendor_item is not null, 'CCH', null)
      - column: market_code
        expression: "cast(null as string)"
      - column: market_name
        expression: "cast(null as string)"
      - column: shop_code
        expression: "cast(null as string)"
      - column: shop_name
        expression: "cast(null as string)"
      - column: is_current_dataset
        expression: "cast(1 as int)"
      - column: area
        expression: "cast(null as string)"

  - kind: select
    name: select_before_grouping
    params:
      columns:
        ban: ban_code
        company_code: company_code
        country: country
        cpl_code: cpl_code
        cpl_name: cpl_name
        currency_code: currency_code
        date: date
        m_sales_promo_uc: m_sales_promo_uc
        m_sales_promo_value: m_sales_promo_value
        m_sales_regular_uc: m_sales_regular_uc
        m_sales_regular_value: m_sales_regular_value
        manufacturer_name: manufacturer_name
        market_code: market_code
        market_name: market_name
        shop_code: shop_code
        shop_name: shop_name
        vendor_name: vendor_name
        is_current_dataset: is_current_dataset
        area: area
      distinct: true

  - kind: group
    name: group_sum_sales_promo_regular
    params:
      - aggs:
          m_sales_promo_uc: sum
          m_sales_promo_value: sum
          m_sales_regular_uc: sum
          m_sales_regular_value: sum
        by:
        - ban_code
        - company_code
        - country
        - cpl_code
        - cpl_name
        - currency_code
        - date
        - manufacturer_name
        - market_code
        - market_name
        - shop_code
        - shop_name
        - vendor_name
        - is_current_dataset
        - area  

  - kind: add
    name: add_final_columns
    params:
     - column: m_sales_promo_uc
       expression: cast(nvl(sum_m_sales_promo_uc,0) as decimal(24,8))
     - column: m_sales_promo_value
       expression: cast(nvl(sum_m_sales_promo_value,0) as decimal(24,8))
     - column: m_sales_regular_uc
       expression: cast(nvl(sum_m_sales_regular_uc,0) as decimal(24,8))
     - column: m_sales_regular_value
       expression: cast(nvl(sum_m_sales_regular_value,0) as decimal(24,8))
     - column: cpl_code
       expression: "cast(cpl_code as string)"
       overwrite: true

  - kind: select
    name: select_f_sell_out
    params:
      columns:
        ban_code: ban_code
        company_code: company_code
        country: country
        cpl_code: cpl_code
        cpl_name: cpl_name
        currency_code: currency_code
        date: date
        m_sales_promo_uc: m_sales_promo_uc
        m_sales_promo_value: m_sales_promo_value
        m_sales_regular_uc: m_sales_regular_uc
        m_sales_regular_value: m_sales_regular_value
        manufacturer_name: manufacturer_name
        market_code: market_code
        market_name: market_name
        shop_code: shop_code
        shop_name: shop_name
        vendor_name: vendor_name
        is_current_dataset: is_current_dataset
        area: area
      distinct: true

  - kind: write_dataio
    name: write_f_sell_out
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: promo
      namespace: l2
      object_name: f_sell_out
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full