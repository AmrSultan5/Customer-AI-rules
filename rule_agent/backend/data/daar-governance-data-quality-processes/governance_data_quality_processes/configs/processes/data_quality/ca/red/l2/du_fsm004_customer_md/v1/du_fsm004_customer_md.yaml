  - kind: join
    name: join_ca_cust_pi
    context_name: select_scope
    params:
      - other: select_cacus03pi_customer_pi
        how: left
        columns: {"customer_code": "customer"}

  - kind: cast
    name: cast_du_fsm004_customer_md
    params:
      - column: cde_target_doors_code
        to: string

  - kind: add
    name: add_cde_target_doors_code
    params:
      - column: cde_target_doors_code_re
        expression: regexp_replace(cde_target_doors_code, ",", ".")

  - kind: add
    name: add_cde_target_doors_code_reg
    params:
      - column: cde_target_doors_code_regex
        expression: regexp_extract(cde_target_doors_code, '^[00]+[1-9]*', 0)

  - kind: add
    name: add_cde_target_doors_code_leading
    params:
      - column: cde_target_doors_code_leading
        expression: "CASE WHEN (cde_target_doors_code_regex != '0' OR cde_target_doors_code_regex != '' ) THEN CAST(cde_target_doors_code_regex AS INT) ELSE cde_target_doors_code_re END"

  - kind: add
    name: add_cde_target_doors_code_final
    params:
      - column: cde_target_doors_code_final
        expression: "CASE WHEN (cde_target_doors_code_leading == '0' OR cde_target_doors_code_leading == '' OR cde_target_doors_code_leading IS NULL) THEN cde_target_doors_code_re ELSE cde_target_doors_code_leading END"

  - kind: cast
    name: cast_cde_target_doors_code_final_decimal
    params:
      - column: cde_target_doors_code_final
        to: decimal(38,2)

  - kind: add
    name: add_du_fsm004_customer_md
    params:
      - column: report_code
        expression: '"fsm004"'
      - column: report_name
        expression: '"Customer General Master"'
      - column: country_code_add
        expression: lower(country_code)
      - column: customer_description_add
        expression: upper(customer_description)
      - column: sales_org_description_add
        expression: upper(sales_org_description)
      - column: order_block_description_add
        expression: upper(order_block_description)
      - column: cpl_description_add
        expression: upper(cpl_description)
      - column: trade_channel_description_add
        expression: upper(trade_channel_description)
      - column: sub_trade_channel_description_add
        expression: upper(sub_trade_channel_description)
      - column: ccaf_description_add
        expression: upper(ccaf_description)
      - column: bdaa_segment_description_add
        expression: upper(bdaa_segment_description)
      - column: cde_target_doors_description_add
        expression: upper(cde_target_doors_description)
      - column: red_outlet_suppressed_check
        expression: "CASE WHEN order_block_code IN ('C', 'DR', 'E', 'F', 'G', 'R', 'S', 'S1', 'S3', 'S4', 'SP', 'SY', 'TS','U') AND (red_outlet = 'X' OR red_outlet = 'W') THEN '0' ELSE '1' END"
      - column: red_outlet_with_microsegment_check
        expression: "CASE WHEN (red_outlet = 'X' AND ccaf_value IS NOT NULL AND channel IS NOT NULL AND sales_org IS NOT NULL) THEN '1' WHEN (red_outlet = 'X' AND ccaf_value IS NULL AND channel IS NULL AND sales_org IS NULL) THEN '0' ELSE '' END"
      - column: microsegment_with_red_outlet_check
        expression: "CASE WHEN (red_outlet = 'X' AND ccaf_value IS NOT NULL AND channel IS NOT NULL AND sales_org IS NOT NULL) THEN '1' WHEN ((red_outlet != 'X' OR red_outlet IS NULL) AND ccaf_value IS NOT NULL AND channel IS NOT NULL AND sales_org IS NOT NULL) THEN '0' ELSE '' END"
      - column: red_outlet_cde_doors_check
        expression: "CASE WHEN (red_outlet = 'X' AND cde_target_doors_code_final >= 0.1) THEN '1' WHEN (red_outlet = 'X' AND (cde_target_doors_code_final < 0.1 OR cde_target_doors_code_final IS NULL)) THEN '0' ELSE '' END"


  - kind: add
    name: add_du_fsm004_customer_md_flags_null
    params:
      - column: red_outlet_suppressed_check_null
        expression: "CASE WHEN red_outlet_suppressed_check IS NOT NULL THEN red_outlet_suppressed_check ELSE '0' END"
      - column: red_outlet_with_microsegment_check_null
        expression: "CASE WHEN red_outlet_with_microsegment_check IS NOT NULL THEN red_outlet_with_microsegment_check ELSE '0' END"
      - column: microsegment_with_red_outlet_check_null
        expression: "CASE WHEN microsegment_with_red_outlet_check IS NOT NULL THEN microsegment_with_red_outlet_check ELSE '0' END"
      - column: red_outlet_cde_doors_check_null
        expression: "CASE WHEN red_outlet_cde_doors_check IS NOT NULL THEN red_outlet_cde_doors_check ELSE '0' END"

  - kind: cast
    name: cast_cde_target_doors_code_final_string
    params:
      - column: cde_target_doors_code_final
        to: string

