
transform:
  name: du_fsm004_customer_md
  operations:

  ## du_fsm004_customer_md
  - kind: read_local
    name: read_country_mapping
    params:
      location: /mnt/datalake_idq/raw/data_quality/red/country_mapping
      options:
        escape: '"'
        header: true
        mode: DROPMALFORMED
        pathGlobFilter: country_mapping.csv

  - kind: select
    name: select_country_mapping
    context_name: read_country_mapping
    params:
      columns:
        Country_Code: country_code_cm
        sales_organization: sales_organization
        technical_code: technical_code_cm
      distinct: true
    skip_next: false

  - kind: read_dataio
    name: read_ca_0_cus03_customer
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: cch_bw
      namespace: md
      object_name: ca_0_cus03_customer
      schema_version: v1

  - kind: select
    name: select_ca_0_cus03_customer
    context_name: read_ca_0_cus03_customer
    params:
      columns:
        bic_credoutlt: red_outlet
        customer: customer_code
        sales_off: sales_office
        sales_grp: sales_group
        customer_desc: customer_description
        salesorg: sales_org_code
        salesorg_desc: sales_org_description
        bic_csup_cust: order_block_code
        csup_cust_desc: order_block_description
        bic_ccustpllv: cpl_code
        ccustpllv_desc: cpl_description
        bic_ctrade_ch: trade_channel_code
        ctrade_ch_desc: trade_channel_description
        bic_csub_trad: sub_trade_channel_code
        csub_trad_desc: sub_trade_channel_description
        bic_c_ccaf: ccaf_code
        c_ccaf_desc: ccaf_description
        cbdaasgm1: bdaa_segment_code
        cbdaasgm1_desc: bdaa_segment_description
        bic_ccdetgtdr: cde_target_doors_code
        ccdetgtdr_desc: cde_target_doors_description
        bic_cterrid: bp_territory_id
        ccustinc: customer_incentive
        bic_cfiscper: fiscal_period
      distinct: true
    skip_next: false

  - kind: read_dataio
    name: read_cacus03pi_customer_pi
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: cch_bw
      namespace: md
      object_name: cacus03pi_customer_pi
      schema_version: v1

  - kind: select
    name: select_cacus03pi_customer_pi
    context_name: read_cacus03pi_customer_pi
    params:
      columns:
        bic_cbdvempl: bd_employee
        customer: customer

  - kind: read_local
    name: read_zred_mapping
    params:
      location: /mnt/datalake_idq/raw/data_quality/red/zred_mapping
      options:
        escape: '"'
        header: true
        mode: DROPMALFORMED
        pathGlobFilter: zred_mapping.csv

  - kind: add
    name: add_lpad_bdaa_segment
    params:
      - column: bdaa_segment_lpad
        expression: lpad(bdaa_segment, 10, "0")

  - kind: select
    name: select_zred_mapping
    params:
      columns:
        sales_org: sales_org_zm
        red_pos: red_pos_zm
        channel: channel_zm
        sub_channel: sub_channel_zm
        ccaf_value: ccaf_value_zm
        bdaa_segment_lpad: bdaa_segment_zm
        cpl: cpl_zm
      distinct: true
