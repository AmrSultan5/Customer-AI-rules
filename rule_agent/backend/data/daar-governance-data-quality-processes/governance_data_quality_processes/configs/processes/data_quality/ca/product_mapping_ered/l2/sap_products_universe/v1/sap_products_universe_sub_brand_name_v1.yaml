{% if dataio.storage_id == "datalake_dev" %}
{% set uc_catalog_env = "dc_datalake_dev_001" %}
{% elif dataio.storage_id == "datalake_prod" %}
{% set uc_catalog_env = "dc_datalake_prod_001" %}
{% else %}
{% set uc_catalog_env = "dc_datalake_default" %}
{% endif %}

transform:
  name: sap_products_universe_sub_brand_name
  operations:

# Read spu after product name cleansing
# sap_products_universe - spu
  - kind: read_dataio
    name: read_spu
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_ered
      namespace: l2
      object_name: sap_products_universe
      schema_version: v1

#conf data join
#spu add const value for join
  - kind: add
    name: add_const_1_subbrand
    params:
      - column: const_1_subbrand
        expression: '''1'''

#read conf data
  - kind: read_local
    name: read_conf_data
    params:
      format: excel
      location: "/Volumes/{{uc_catalog_env}}/locations/datalake_raw/data_quality/product_mapping_ered/configuration_data/0/configuration_data.xlsx"
      options:
        header: true
        pathGlobFilter: configuration_data.xlsx
        sheet_name: spu_sub_brand

  - kind: add
    name: add_const_1_conf
    context_name: read_conf_data
    params:
      - column: const_1_conf
        expression: '''1'''

  - kind: group
    name: group_arrays_conf
    context_name: add_const_1_conf
    params:
      - aggs:
          input_value: array_agg
          output_value: array_agg
          priority: array_agg
        by:
        - const_1_conf

  - kind: join
    name: join_conf
    context_name: add_const_1_subbrand
    params:
      - other:
          group_arrays_conf
        how:
          inner
        columns:
          const_1_subbrand: const_1_conf

  - kind: add
    name: add_conf_structs
    params:
      - column: input_output_priority_structs
        expression: transform(sequence(0, size(array_agg_input_value) - 1), i -> struct(array_agg_input_value[i] as input_val, array_agg_output_value[i] as output_val, CAST(array_agg_priority[i] AS INT) as prio))

  - kind: add
    name: filter_matching_structs
    context_name: add_conf_structs
    params:
      - column: matching_structs
        expression: filter(input_output_priority_structs, x -> instr(product_name_cleansed, x.input_val) > 0)

  - kind: add
    name: sort_matching_structs
    context_name: filter_matching_structs
    params:
      - column: matching_structs
        expression: array_sort(matching_structs, (left, right) -> case when left.prio < right.prio then -1 when left.prio > right.prio then 1 else 0 end)
        overwrite: true

  - kind: add
    name: extract_lowest_priority_output
    context_name: sort_matching_structs
    params:
      - column: subbrand_tmp
        expression: element_at(transform(slice(matching_structs, 1, 1), x -> x.output_val), 1)
        overwrite: true

  - kind: add
    name: add_subbrand_final
    context_name: extract_lowest_priority_output
    params:
      - column: sub_brand_name
        expression: if(subbrand_tmp is not null and (brand_name = 'Monster-KO' or brand_name = 'ULTRA-KO'), subbrand_tmp, '')
        overwrite: true

#final select
  - kind: select
    name: select_final
    context_name: add_subbrand_final
    params:
      columns:
        product_code: product_code
        product_name_raw: product_name_raw
        product_name_cleansed: product_name_cleansed
        country_code: country_code
        brand_name: brand_name
        flavour_name: flavour_name
        pack_size_name: pack_size_name
        pack_size_uom_unified: pack_size_uom_unified
        pack_size_volume_unified: pack_size_volume_unified
        pack_type_code: pack_type_code
        pack_type_name: pack_type_name
        sales_unit_name: sales_unit_name
        sales_unit_bottles: sales_unit_bottles
        sales_unit_cases: sales_unit_cases
        sales_unit_pallets: sales_unit_pallets
        product_hierarchy_name: product_hierarchy_name
        sparkling_level: sparkling_level
        country_code_in_product_name: country_code_in_product_name
        is_abp: is_abp
        is_actively_used: is_actively_used
        is_in_use: is_in_use
        is_promotion: is_promotion
        ean_code: ean_code
        ban_code: ban_code
        product_group_code: product_group_code
        product_group_name: product_group_name
        product_type_code: product_type_code
        creation_date: creation_date
        sell_in_volume_uc_12m: sell_in_volume_uc_12m
        sell_in_volume_uc_24m: sell_in_volume_uc_24m
        sap_cluster: sap_cluster
        sub_brand_name: sub_brand_name
        ean_piece: ean_piece
        ean_pack: ean_pack
        ean_case: ean_case
        base_unit_of_measure: base_unit_of_measure
      distinct: true

  - kind: write_dataio
    name: write_spu_product_name_cleanser
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_ered
      namespace: l2
      object_name: sap_products_universe
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: full
