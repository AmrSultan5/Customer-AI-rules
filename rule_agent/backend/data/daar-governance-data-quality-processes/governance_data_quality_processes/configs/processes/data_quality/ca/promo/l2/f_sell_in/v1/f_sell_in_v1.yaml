transform:
  name: f_sell_in
  operations:

# Read ca_co004n_profitability_pl

  - kind: read_dataio
    name: read_ca_co004n_profitability_pl
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: cch_bw
      namespace: fm
      object_name: ca_co004n_profitability_pl
      schema_version: v1


  - kind: add
    name: add_ltrim_bic_ccust
    params:
     - column: ltrim_bic_ccust
       expression: ltrim('0', bic_ccust)
     - column: ltrim_comp_code
       expression: ltrim('0', comp_code)
     - column: ltrim_sku
       expression: ltrim('0', sku)

  - kind: select
    name: select_ca_co004n_profitability_pl
    params:
      columns:
        bic_cccweek: bic_cccweek
        ltrim_comp_code: ltrim_comp_code
        ltrim_bic_ccust: ltrim_bic_ccust
        ltrim_sku: ltrim_sku
        volume_uc: volume_uc
        nsr: nsr
      distinct: true

# Read date_v2

  - kind: read_dataio
    name: read_date
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_user_input
      namespace: local
      object_name: date
      schema_version: v2

  - kind: filter
    name: filter_date
    params:
      - condition:
          date_id >= add_months(current_date(), -40)

  - kind: add
    name: add_year_week
    params:
     - column: year_week
       expression: concat(year, week)

  - kind: select
    name: select_date
    params:
      columns:
        year: year
        week: week
        year_week: year_week
        date_id: date_id
      distinct: true

# Read ca_salorg_sales_org

  - kind: read_dataio
    name: read_ca_salorg_sales_org
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: cch_bw
      namespace: md
      object_name: ca_salorg_sales_org
      schema_version: v1

  - kind: filter
    name: filter_ca_salorg_sales_org
    params:
      - condition:
          trim(UPPER(country)) IN('HU','IE','GB','RS','CZ','PL', 'IT', 'RO', 'GR', 'RU')

  - kind: add
    name: add_ltrim_comp_code
    params:
     - column: ltrim_comp_code
       expression: ltrim('0', comp_code)

  - kind: select
    name: select_ca_salorg_sales_org
    params:
      columns:
        ltrim_comp_code: ltrim_comp_code
        country: country
        stat: stat
      distinct: true

