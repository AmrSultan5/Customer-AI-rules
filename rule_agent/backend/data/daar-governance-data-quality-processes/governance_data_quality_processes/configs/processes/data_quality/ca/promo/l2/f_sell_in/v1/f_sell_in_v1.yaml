# JOINS

  - kind: join
    name: join_si_cld_cc_cpl_nac
    context_name: select_ca_co004n_profitability_pl
    params:
      - other:
          select_date
        how:
          inner
        columns:
          bic_cccweek: year_week
      - other:
          select_ca_salorg_sales_org
        how:
          inner
        columns:
          ltrim_comp_code: ltrim_comp_code
      # - other:
      #     select_ca_ccpl01_cpl_master_data
      #   how:
      #     left
      #   columns:
      #     ltrim_bic_ccust: ltrim_bic_ccustpllv
      # - other:
      #     select_it_nano_aree_cpl
      #   how:
      #     left
      #   columns:
      #     ltrim_bic_ccust: cpl_code

 - kind: add
   name: add_target_columns
   params:
     - column: country
       expression: if(ltrim_comp_code='480', 'ni',trim(lower(country)))
     - column: cpl_name
       expression: if(upper(country)='GR', customer_desc, ccustpllv_desc)
     - column: currency_code
       expression: upper(stat)
     - column: area
       expression: if(cpl_code IS NOT NULL, area, 'null')

  - kind: select
    name: select_for_grouping
    params:
      columns:
        ltrim_sku: sku_code
        ltrim_comp_code: company_code
        country: country
        ltrim_bic_ccust: cpl_code
        cpl_name: cpl_name
        currency_code: currency_code
        date_id: date_id
        volume_uc: volume_uc
        nsr: nsr
        area: area
      distinct: true

  - kind: group
    name: group_sum_volumne_nsr
    params:
      - aggs:
          volume_uc: sum
          nsr: sum
          date_id: min
        by:
        - sku_code
        - company_code
        - country
        - cpl_code
        - cpl_name
        - currency_code
        - area

  - kind: select
    name: select_f_sell_in
    params:
      columns:
        sku_code: sku_code
        company_code: company_code
        country: country
        cpl_code: cpl_code
        cpl_name: cpl_name
        currency_code: currency_code
        min_date_id: date
        sum_volume_uc: m_sales_regular_uc
        sum_nsr: m_sales_regular_value
        area: area
      distinct: true

  - kind: write_dataio
    name: write_f_sell_in
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: promo
      namespace: l2
      object_name: f_sell_in
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full
