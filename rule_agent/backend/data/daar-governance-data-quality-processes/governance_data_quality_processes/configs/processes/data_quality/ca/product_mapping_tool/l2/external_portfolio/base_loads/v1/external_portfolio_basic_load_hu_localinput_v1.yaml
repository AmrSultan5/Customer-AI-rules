# SPAR
# # Read data marts
# curated_ppaa_web_input_hu.spar_sellout
  - kind: read_dataio
    name: read_spar_sellout
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_web_input
      namespace: hu
      object_name: spar_sellout
      schema_version: v1

# required transformation for following nested process - pm_stats 
  - kind: add
    name: add_np_pm_stats_req_spar
    context_name: read_spar_sellout
    params:
      - column: ext_product_code_md_in
        overwrite: true
        expression: vendor_item  
      - column: ext_product_name_src
        overwrite: true
        expression: product_description
      - column: ext_brand_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_flavour_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_package_type_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_package_size_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_sales_unit_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_item_category_src
        overwrite: true
        expression: category
      - column: ext_retailer
        overwrite: true
        expression: cpl
      - column: in_scope_flg
        overwrite: true
        expression: IF(supplier = 'CCHBC' AND ((UPPER(product_description) NOT LIKE '%CAPRI%' AND UPPER(product_description) NOT LIKE '%SUN%')
          AND
          (
            UPPER(product_description) LIKE '%APEROL%' OR
            UPPER(product_description) LIKE '%ASTI MARTINI%' OR
            UPPER(product_description) LIKE '%BACARDI%' OR
            UPPER(product_description) LIKE '%BOMBAY%' OR
            UPPER(product_description) LIKE '%BURN%' OR
            UPPER(product_description) LIKE '%CAMPARI%' OR
            UPPER(product_description) LIKE '%CAPPY%' OR
            UPPER(product_description) LIKE '%CINZANO%' OR
            UPPER(product_description) LIKE '%COCA COLA%' OR
            UPPER(product_description) LIKE '%COCA-COLA%' OR
            UPPER(product_description) LIKE '%COCA-COLA LIGHT%' OR
            UPPER(product_description) LIKE '%COCA-COLA ZERO%' OR
            UPPER(product_description) LIKE '%COKE%' OR
            UPPER(product_description) LIKE '%COSTA%' OR
            UPPER(product_description) LIKE '%FANTA%' OR
            UPPER(product_description) LIKE '%FINLANDIA%' OR
            UPPER(product_description) LIKE '%FINLANDIA BOTANICAL%' OR
            UPPER(product_description) LIKE '%FINLANDIA VODKA%' OR
            UPPER(product_description) LIKE '%FUZETEA%' OR
            UPPER(product_description) LIKE '%GENTLEMAN JACK%' OR
            UPPER(product_description) LIKE '%GREY GOOSE%' OR
            UPPER(product_description) LIKE '%GROUSE%' OR
            UPPER(product_description) LIKE '%JACK D%' OR
            UPPER(product_description) LIKE '%JACK DANIEL S TENNESS.%' OR
            UPPER(product_description) LIKE '%JACK DANIELS SINGLE%' OR
            UPPER(product_description) LIKE '%JACK DANIEL�S TENESSY HONEY%' OR
            UPPER(product_description) LIKE '%JACK DANIELS TENNESSEE%' OR
            UPPER(product_description) LIKE '%JACK DANIELS TENNESSEE HONEY%' OR
            UPPER(product_description) LIKE '%KINLEY%' OR
            UPPER(product_description) LIKE '%MARTINI%' OR
            UPPER(product_description) LIKE '%MARTINI ASTI%' OR
            UPPER(product_description) LIKE '%MONSTER%' OR
            UPPER(product_description) LIKE '%NATURAQUA%' OR
            UPPER(product_description) LIKE '%PATRON%' OR
            UPPER(product_description) LIKE '%POWERADE%' OR
            UPPER(product_description) LIKE '%RÖMERQELLE%' OR
            UPPER(product_description) LIKE '%RÉZANGYAL%' OR
            UPPER(product_description) LIKE '%SMARTWATER%' OR
            UPPER(product_description) LIKE '%SPRITE%' OR
            UPPER(product_description) LIKE '%SPRITE ZERO%' OR
            UPPER(product_description) LIKE '%VERGNANO%' OR
            UPPER(product_description) LIKE '%WOODFORD RESERVE%'
            ))
            , 1, 0)

  - kind: group
    name: group_deduplicate_pm_stats_req_spar
    context_name: add_np_pm_stats_req_spar
    params:
      - aggs:
          ext_product_name_src: max
          ext_brand_src: max
          ext_flavour_src: max
          ext_package_type_src: max
          ext_package_size_src: max
          ext_sales_unit_src: max
          ext_item_category_src: max
          ext_retailer: max
          in_scope_flg: max
        by:
        - ext_product_code_md_in

# select for union for following nested process - pm_stats
  - kind: select
    name: select_base_spar
    context_name: group_deduplicate_pm_stats_req_spar
    params:
      columns:
        ext_product_code_md_in: ext_product_code_md_in
        max_ext_product_name_src: ext_product_name_src
        max_ext_brand_src: ext_brand_src
        max_ext_flavour_src: ext_flavour_src
        max_ext_package_type_src: ext_package_type_src
        max_ext_package_size_src: ext_package_size_src
        max_ext_sales_unit_src: ext_sales_unit_src
        max_ext_item_category_src: ext_item_category_src
        max_ext_retailer: ext_retailer
        max_in_scope_flg: in_scope_flg
      distinct: true

# Tesco
# # Read data marts
# curated_ppaa_web_input_hu.tesco_sellout
  - kind: read_dataio
    name: read_tesco_sellout
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_web_input
      namespace: hu
      object_name: tesco_sellout
      schema_version: v1

# required transformation for following nested process - pm_stats 
  - kind: add
    name: add_np_pm_stats_req_tesco
    context_name: read_tesco_sellout
    params:
      - column: ext_product_code_md_in
        overwrite: true
        expression: vendor_item  
      - column: ext_product_name_src
        overwrite: true
        expression: product_description
      - column: ext_brand_src
        overwrite: true
        expression: brand
      - column: ext_flavour_src
        overwrite: true
        expression: flavour
      - column: ext_package_type_src
        overwrite: true
        expression: package_type
      - column: ext_package_size_src
        overwrite: true
        expression: pack_size
      - column: ext_sales_unit_src
        overwrite: true
        expression: item_pack
      - column: ext_item_category_src
        overwrite: true
        expression: category
      - column: ext_retailer
        overwrite: true
        expression: cpl
      - column: in_scope_flg
        overwrite: true
        expression: IF((UPPER(product_description) NOT LIKE '%CAPRI%' AND UPPER(product_description) NOT LIKE '%SUN%')
          AND
          (
            UPPER(product_description) LIKE '%BURN%' OR
            UPPER(product_description) LIKE '%CAPPY%' OR
            UPPER(product_description) LIKE '%CAPPY P. %' OR
            UPPER(product_description) LIKE '%CAPPY PULPY%' OR
            UPPER(product_description) LIKE '%CC %' OR
            UPPER(product_description) LIKE '%CHERRY CO%' OR
            UPPER(product_description) LIKE '%COCA COLA%' OR
            UPPER(product_description) LIKE '%COCA LIGHT%' OR
            UPPER(product_description) LIKE '%COCA Z.%' OR
            UPPER(product_description) LIKE '%COLA Z%' OR
            UPPER(product_description) LIKE '%COCA ZERO%' OR
            UPPER(product_description) LIKE '%COCA ZZ%' OR
            UPPER(product_description) LIKE '%COCA-COLA%' OR
            UPPER(product_description) LIKE '%COCA-COLA LIGHT%' OR
            UPPER(product_description) LIKE '%COKE LIGHT%' OR
            UPPER(product_description) LIKE '%COKE ZERO%' OR
            UPPER(product_description) LIKE '%FANTA%' OR
            UPPER(product_description) LIKE '%FUZE TEA%' OR
            UPPER(product_description) LIKE '%FUZETEA%' OR
            UPPER(product_description) LIKE '%KIN TONI%' OR
            UPPER(product_description) LIKE '%KINLEY%' OR
            UPPER(product_description) LIKE '%MONSTER%' OR
            UPPER(product_description) LIKE '%NAQ%' OR
            UPPER(product_description) LIKE '%NATURA.%' OR
            UPPER(product_description) LIKE '%NATURAQUA%' OR
            (UPPER(product_description) LIKE '%NQ%' AND UPPER(product_description) NOT LIKE '%FUNKY FOREST%') OR
            UPPER(product_description) LIKE '%POWERADE%' OR
            UPPER(product_description) LIKE '%SMARTWATER%' OR
            UPPER(product_description) LIKE '%SPRITE%' OR
            UPPER(product_description) LIKE '%SPRITE ZERO%'
            )
            , 1, 0)

  - kind: group
    name: group_deduplicate_pm_stats_req_tesco
    context_name: add_np_pm_stats_req_tesco
    params:
      - aggs:
          ext_product_name_src: max
          ext_brand_src: max
          ext_flavour_src: max
          ext_package_type_src: max
          ext_package_size_src: max
          ext_sales_unit_src: max
          ext_item_category_src: max
          ext_retailer: max
          in_scope_flg: max
        by:
        - ext_product_code_md_in

# select for union for following nested process - pm_stats
  - kind: select
    name: select_base_tesco
    context_name: group_deduplicate_pm_stats_req_tesco
    params:
      columns:
        ext_product_code_md_in: ext_product_code_md_in
        max_ext_product_name_src: ext_product_name_src
        max_ext_brand_src: ext_brand_src
        max_ext_flavour_src: ext_flavour_src
        max_ext_package_type_src: ext_package_type_src
        max_ext_package_size_src: ext_package_size_src
        max_ext_sales_unit_src: ext_sales_unit_src
        max_ext_item_category_src: ext_item_category_src
        max_ext_retailer: ext_retailer
        max_in_scope_flg: in_scope_flg
      distinct: true

# base for np - pm_stats
  - kind: union
    name: union_base_for_np_pm_stats_1
    context_name: select_base_cba_coopstar
    params:
      allow_missing: true
      by_name: true
      other: select_base_spar

  - kind: union
    name: union_base_for_np_pm_stats_2
    context_name: union_base_for_np_pm_stats_1
    params:
      allow_missing: true
      by_name: true
      other: select_base_tesco

  - kind: add
    name: add_np_pm_stats_req
    context_name: union_base_for_np_pm_stats_2
    params:
      - column: const_1_np_pm_stats
        expression: '''1'''

# nested process - pm_stats
  - kind: nested_process
    name: external_portfolio_basic_load_pm_stats
    params:
      config_path: "processes/data_quality/ca/product_mapping_tool/l2/external_portfolio/base_loads/v1/external_portfolio_basic_load_pm_stats_v1.yaml"
      module: "governance_data_quality_processes.configs"
      jinja_params:
        dataio:
          ad_id: "{{dataio.ad_id}}"
          storage_id: "{{dataio.storage_id}}"
        process_run_id: "{{process_run_id}}"
        vendor_data:
