{% if dataio.storage_id == "datalake_dev" %}
{% set uc_catalog_env = "dc_datalake_dev_001" %}
{% elif dataio.storage_id == "datalake_prod" %}
{% set uc_catalog_env = "dc_datalake_prod_001" %}
{% else %}
{% set uc_catalog_env = "dc_datalake_default" %}
{% endif %}

{% set unv_schema_level = "" %}
{% set unv_schema_level_value = "product_id" %}
{% set np_sellout_mode = "" %}
{% set np_sellout_mode_1 = "in_scope" %}
{% set np_sellout_mode_2 = "in_pm" %}

transform:
  name: external_portfolio_basic_load_hu_localinput
  operations:

# Gathering products by retailer
# CBA and Coopstar treated as 1 retailer - because of duplicated values in vendor_item/product_id/stable_key_to_ban_id on the level of ext_source_name/vendor/vendor_name
# CBA 
# # Read data marts
# curated_ppaa_web_input_hu.cba_sellout
  - kind: read_dataio
    name: read_cba_sellout
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_web_input
      namespace: hu
      object_name: cba_sellout
      schema_version: v1

# Coopstar 
# # Read data marts
# curated_ppaa_web_input_hu.coopstar_sellout
  - kind: read_dataio
    name: read_coopstar_sellout
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_web_input
      namespace: hu
      object_name: coopstar_sellout
      schema_version: v1

# union CBA and Coopstar
  - kind: union
    name: union_cba_coopstar
    context_name: read_cba_sellout
    params:
      allow_missing: true
      by_name: true
      other: read_coopstar_sellout

# required transformation for following nested process - pm_stats 
  - kind: add
    name: add_np_pm_stats_req_cba_coopstar
    context_name: union_cba_coopstar
    params:
      - column: ext_product_code_md_in
        overwrite: true
        expression: vendor_item  
      - column: ext_product_name_src
        overwrite: true
        expression: product_description
      - column: ext_brand_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_flavour_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_package_type_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_package_size_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_sales_unit_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_item_category_src
        overwrite: true
        expression: "cast (null as string)"
      - column: ext_retailer
        overwrite: true
        expression: '''CBA_Coopstar'''
      - column: in_scope_flg
        overwrite: true
        expression: IF((UPPER(product_description) NOT LIKE '%CAPRI%' AND UPPER(product_description) NOT LIKE '%SUN%')
          AND
          (
            (UPPER(product_description) LIKE '%BURN%' AND UPPER(product_description) NOT LIKE '%FAT BURN%') OR
            UPPER(product_description) LIKE '%CAPPY%' OR
            UPPER(product_description) LIKE '%COCA COLA%' OR
            UPPER(product_description) LIKE '%COCA COLA LIGHT%' OR
            UPPER(product_description) LIKE '%COCA COLA ZERO%' OR
            UPPER(product_description) LIKE '%COCA COLA ZERO KOFFEINMENTES%' OR
            UPPER(product_description) LIKE '%FANTA%' OR
            UPPER(product_description) LIKE '%FANTA ZERO%' OR
            UPPER(product_description) LIKE '%FUZE TEA%' OR
            UPPER(product_description) LIKE '%FUZETEA%' OR
            UPPER(product_description) LIKE '%GLACEAU SMARTWATER%' OR
            UPPER(product_description) LIKE '%KINLEY%' OR
            UPPER(product_description) LIKE '%MONSTER%' OR
            UPPER(product_description) LIKE '%NATURAQUA%' OR
            UPPER(product_description) LIKE '%POWERADE%' OR
            UPPER(product_description) LIKE '%ROEMERQUELLE%' OR
            UPPER(product_description) LIKE '%SPRIT%' OR
            UPPER(product_description) LIKE '%SPRITE%' OR
            UPPER(product_description) LIKE '%SPRITE ZERO%'
            )
            , 1, 0)

# select for union for following nested process - pm_stats
  - kind: select
    name: select_base_cba_coopstar
    context_name: add_np_pm_stats_req_cba_coopstar
    params:
      columns:
        ext_product_code_md_in: ext_product_code_md_in
        ext_product_name_src: ext_product_name_src
        ext_brand_src: ext_brand_src
        ext_flavour_src: ext_flavour_src
        ext_package_type_src: ext_package_type_src
        ext_package_size_src: ext_package_size_src
        ext_sales_unit_src: ext_sales_unit_src
        ext_item_category_src: ext_item_category_src
        ext_retailer: ext_retailer
        in_scope_flg: in_scope_flg
      distinct: true

