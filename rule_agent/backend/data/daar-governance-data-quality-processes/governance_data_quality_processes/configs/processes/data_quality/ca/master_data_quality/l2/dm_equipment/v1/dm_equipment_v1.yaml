transform:
  name: dm_equipment
  operations:

# Read IHPA

  - kind: read_dataio
    name: read_ihpa
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: transactional_data
      object_name: ihpa
      schema_version: v1

  - kind: filter
    name: filter_ohpa
    context_name: read_ihpa
    params:
      - condition:
          obtyp ='IEQ' AND kzloesch != 'X'

  - kind: add
    name: add_substr
    context_name: filter_ohpa
    params:
      - column: ihpa_objnr_substr
        expression: substring(objnr,3)

  - kind: select
    name: select_ihpa
    context_name: add_substr
    params:
      columns:
        ihpa_objnr_substr: equipment_number
        parnr: customer_code
        parvw: partner_function
        sap_cluster: sap_cluster

  - kind: write_dataio
    name: write_dm_equipment
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: master_data_quality
      namespace: l2
      object_name: dm_equipment
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full
