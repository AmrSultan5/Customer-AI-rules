  - kind: add
    name: add_package_size_standardized_to_gram_ml
    params:
      - column: package_size_standardized_to_gram_ml
        expression: "CASE WHEN pack_size_uom_unified ='L' THEN 1000 *(pack_size_volume_unified) WHEN pack_size_uom_unified ='KG' THEN 1000 *(pack_size_volume_unified) WHEN pack_size_uom_unified ='G' THEN pack_size_volume_unified WHEN pack_size_uom_unified ='ML' THEN pack_size_volume_unified ELSE pack_size_volume_unified END"

  - kind: cast
    name: cast_package_size_standardized_to_gram_ml
    params:
      - column: package_size_standardized_to_gram_ml
        to: integer

  - kind: add
    name: add_material_name_filters
    params:
      - column: material_name_filter
        expression: "NVL(makt_maktx_E, '')"
      - column: material_name_native_lang_filter
        expression: "NVL(makt_maktx_t001, '')"

  - kind: add
    name: add_total_sales_unit_rule
    params:
      - column: total_sales_unit
        expression: "CASE 
                      WHEN tv5_bezei IS NULL OR tv5_bezei = '' THEN '-1'
                      WHEN regexp(tv5_bezei, '[0-9]') THEN reduce(transform(split(tv5_bezei, '[+]'), x -> reduce(transform(split(x, '[xX]'), y -> cast(y as int)),1,(m, n) -> coalesce(m, 1) * n)),0,(p, q) -> p + q) 
                      ELSE '1' 
                    END"

  - kind: add
    name: add_material_description
    params:
      - column: material_description_weight_flag
        expression: "CASE WHEN (mara_matkl = '1003012' AND   material_name_filter LIKE '% .0%' ) THEN  regexp_extract(material_name_filter,'([0-9]+(?:[.,][0-9]+)?)', 0)  WHEN (mara_matkl = '1003012' AND  ( material_name_filter LIKE '% .%' OR material_name_filter LIKE '% ,%' )) THEN  CONCAT('0.',regexp_extract(material_name_filter,'([0-9]+(?:[.,][0-9]+)?)', 0)) * 100 WHEN  (mara_matkl = '1003012' AND  regexp(material_name_filter, '((.*?)[0-9]+[.,][0-9]+(.*?))') ) THEN regexp_extract(material_name_filter,'([0-9]+[.,][0-9]+)', 0)  WHEN (mara_matkl = '1003012' AND   material_name_filter LIKE '%GR%' ) THEN regexp_extract(material_name_filter,'([0-9]+(?:[.,][0-9]+)?)', 0) WHEN (mara_matkl = '1003012' AND   (material_name_filter LIKE '% G%' OR material_name_filter LIKE '%G%') ) THEN regexp_extract(material_name_filter,'([0-9]+(?:[.,][0-9]+)?)', 0) ELSE material_name_filter END"
      - column: material_description_uom
        expression: "CASE WHEN mara_matkl = '1003012' THEN 'G' ELSE '-1' END"
      - column: material_substitution_flag
        expression: "CASE WHEN matnr_sub IS NOT NULL OR matnr_sub != '' THEN '1' ELSE '0' END"

  - kind: add
    name: add_material_description
    params:
      - column: material_description_weight
        expression: "CASE WHEN (mara_matkl = '1003012' AND   material_description_weight_flag LIKE '0%' ) THEN CAST(CONCAT('0.', material_description_weight_flag) AS float) * 1000  ELSE CAST(material_description_weight_flag AS float)  END"

  - kind: add
    name: add_bpp_bp_code
    params:
      - column: bpp_bp_code
        expression: if(klart_au = '001' AND objek_au_bpp IS NOT NULL AND objek_au_bpp != '', LEFT(atwrt_au,4), '')

  - kind: add
    name: add_bbn
    params:
      - column: bbn
        expression: if(klart_au = '001' AND objek_au_bbn IS NOT NULL AND objek_au_bbn != '', atwrt_au, '')

  - kind: cast
