transform:
  name: dm_material
  operations:

  - kind: read_dataio
    name: read_sls
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: cch_bw
      namespace: mtc
      object_name: ca_fsm003_sales_direct_indirect
      schema_version: v2

  - kind: filter
    name: filter_sls
    context_name: read_sls
    params:
      - condition:
          calday > last_day(add_months(to_date(current_date()), -13)) AND calday <= last_day(add_months(to_date(current_date()), -1))  

  - kind: add
    name: add_sls
    context_name: filter_sls
    params:
      - column: sum_9400
        expression: fieldnm013 + kisdlq
      - column: sum_not_9400
        expression: fieldnm013 + fieldnm017        
              

  - kind: group
    name: group_sls
    context_name: add_sls
    params:
      - aggs:
          sum_9400: sum
          sum_not_9400: sum
        by:
        - material
        - salesorg

  - kind: add
    name: add_sls_flag
    context_name: group_sls
    params:
      - column: is_active_sales
        expression: "CASE WHEN salesorg = '9400' AND sum_sum_9400 >= 0 THEN '1' WHEN salesorg != '9400' AND sum_sum_not_9400 >= 0 THEN '1' ELSE '0' END"

  - kind: select
    name: select_sls
    params:
      columns:
        material: material
        salesorg: salesorg
        is_active_sales: is_active_sales

  - kind: read_dataio
    name: read_som
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: data_quality
      namespace: master_data_quality
      object_name: sales_org_mapping
      schema_version: v1

  - kind: select
    name: select_som
    context_name: read_som
    params:
      columns:
        sales_org_code: som_sales_org_code
        country_code: som_country_code
        sap_cluster: som_sap_cluster            

