  - kind: add
    name: add_pakc_size
    params:
      - column: pack_size_uom_unified
        expression: "CASE WHEN tv4_bezei LIKE '%2,4%' THEN 'G' WHEN (LOWER(tv4_bezei) LIKE '%kilogram%' OR tv4_bezei LIKE '%KG%') THEN 'KG' WHEN LOWER(tv4_bezei) LIKE '%gr%' THEN 'G' WHEN ((LOWER(tv4_bezei) LIKE '%litre%' OR LOWER(tv4_bezei) LIKE '%liter%') AND (tv4_bezei LIKE '0.%')) THEN 'ML' WHEN (LOWER(tv4_bezei) LIKE '%litre%' OR LOWER(tv4_bezei) LIKE '%liter%') THEN 'L' ELSE 'UNKNOWN' END"
      - column: pack_size_volume_unified
        expression: "CASE WHEN tv4_bezei LIKE '%2,4%' THEN '2.4' WHEN (LOWER(tv4_bezei) LIKE '%kilogram%' OR tv4_bezei LIKE '%KG%') THEN regexp_extract(tv4_bezei, '[0-9]+(?:[.][0-9]+)?', 0) WHEN LOWER(tv4_bezei) LIKE '%gr%' THEN regexp_extract(tv4_bezei, '[0-9]+(?:[.][0-9]+)?', 0) WHEN ((LOWER(tv4_bezei) LIKE '%litre%' OR LOWER(tv4_bezei) LIKE '%liter%') AND (tv4_bezei LIKE '0.%')) THEN 1000*(regexp_extract(tv4_bezei, '[0-9]+(?:[.][0-9]+)?', 0)) WHEN (LOWER(tv4_bezei) LIKE '%litre%' OR LOWER(tv4_bezei) LIKE '%liter%') THEN regexp_extract(tv4_bezei, '[0-9]+(?:[.][0-9]+)?', 0) ELSE 'UNKNOWN' END"
      - column: product_hierarchy_level_3_code
        expression: "CASE WHEN (length(mvke_prodh) >= 7) THEN substring(mvke_prodh,1,7) ELSE '' END"
      - column: product_hierarchy_level_4_code
        expression: "CASE WHEN (length(mvke_prodh) >= 11) THEN substring(mvke_prodh,1,11) ELSE '' END"
      - column: product_hierarchy_level_5_code
        expression: "CASE WHEN (length(mvke_prodh) = 15) THEN mvke_prodh ELSE '' END"

  - kind: select
    name: select_t179t_l3
    context_name: select_t179t
    params:
      columns:
        tt_prodh: product_hierarchy_l3_code
        tt_vtext: product_hierarchy_l3_name
        tt_sap_cluster: l3_sap_cluster
      distinct: true

