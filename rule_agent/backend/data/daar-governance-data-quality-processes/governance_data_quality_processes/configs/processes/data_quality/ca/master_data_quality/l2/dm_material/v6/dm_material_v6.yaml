# AUSP
  - kind: read_dataio
    name: read_ausp
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: material_master
      object_name: ausp
      schema_version: v1

  - kind: filter
    name: filter_ausp_bpp
    context_name: read_ausp
    params:
      - condition:
          (atinn = '829' AND sap_cluster = 'CL1') OR (atinn = '868' AND sap_cluster = 'CL2')

  - kind: group
    name: group_ausp_bpp
    context_name: filter_ausp_bpp
    params:
      - aggs:
          atzhl: max
        by:
        - objek
        - atinn
        - klart
        - sap_cluster

  - kind: select
    name: select_ausp_bpp
    context_name: group_ausp_bpp
    params:
      columns:
        objek: objek_bpp
        atinn: atinn_bpp
        klart: klart_bpp
        max_atzhl: max_atzhl_bpp
        sap_cluster: sap_cluster_bpp
      distinct: true 

  - kind: filter
    name: filter_ausp_bbn
    context_name: read_ausp
    params:
      - condition:
          (atinn = '1142' AND sap_cluster = 'CL1') OR (atinn = '1107' AND sap_cluster = 'CL2')

  - kind: group
    name: group_ausp_bbn
    context_name: filter_ausp_bbn
    params:
      - aggs:
          atzhl: max
        by:
        - objek
        - atinn
        - klart
        - sap_cluster

  - kind: select
    name: select_ausp_bbn
    context_name: group_ausp_bbn
    params:
      columns:
        objek: objek_bbn
        atinn: atinn_bbn
        klart: klart_bbn
        max_atzhl: max_atzhl_bbn
        sap_cluster: sap_cluster_bbn
      distinct: true 

  - kind: join
    name: join_ausp_self
    context_name: read_ausp
    params:
      - other:
          select_ausp_bpp
        how:
          left
        columns:
          objek: objek_bpp
          atinn: atinn_bpp
          klart: klart_bpp
          atzhl: max_atzhl_bpp
          sap_cluster: sap_cluster_bpp
      - other:
          select_ausp_bbn
        how:
          left
        columns:
          objek: objek_bbn
          atinn: atinn_bbn
          klart: klart_bbn
          atzhl: max_atzhl_bbn
          sap_cluster: sap_cluster_bbn

  - kind: filter
    name: filter_distinct_ausp
    context_name: join_ausp_self
    params:
      - condition:
          max_atzhl_bpp IS NOT NULL OR max_atzhl_bbn IS NOT NULL

  - kind: select
    name: select_ausp
    context_name: filter_distinct_ausp
    params:
      columns:
        objek: objek_au
        objek_bpp: objek_au_bpp
        objek_bbn: objek_au_bbn
        atinn: atinn_au
        atwrt: atwrt_au
        atflv: atflv_au
        # atnam: atnam
        klart: klart_au
        sap_cluster: sap_cluster_au

  - kind: add
    name: add_objek_right
    context_name: select_ausp
    params:
      - column: objek_right
        expression: "'000000000000000000' || RIGHT(objek_au, 18)"
      - column: left_atwrt_au
        expression: LEFT(atwrt_au, 4)

# Final_ join

  - kind: join
    name: join_finall
    context_name: select_mara
    params:
      - other:
          select_makt_E
        how:
          left
        columns:
          mara_matnr: makt_matnr_E
          mara_sap_cluster: makt_sap_cluster_E
      - other:
          select_t023t
        how:
          left
        columns:
          mara_matkl: t23_matkl
          mara_sap_cluster: t23_sap_cluster
      - other:
          select_mvke
        how:
          left
        columns:
          mara_matnr: mvke_matnr
          mara_sap_cluster: mvke_sap_cluster
      - other:
          select_tvm1t
        how:
          left
        columns:
          mvke_mvgr1: tv1_mvgr1
          mvke_sap_cluster: tv1_sap_cluster
      - other:
          select_tvm2t
        how:
          left
        columns:
          mvke_mvgr2: tv2_mvgr2
          mvke_sap_cluster: tv2_sap_cluster
      - other:
          select_tvm3t
        how:
          left
        columns:
          mvke_mvgr3: tv3_mvgr3
          mvke_sap_cluster: tv3_sap_cluster
      - other:
          select_tvm4t
        how:
          left
        columns:
          mvke_mvgr4: tv4_mvgr4
          mvke_sap_cluster: tv4_sap_cluster
      - other:
          select_tvm5t
        how:
          left
        columns:
          mvke_mvgr5: tv5_mvgr5
          mvke_sap_cluster: tv5_sap_cluster
      - other:
          select_zmd_brand_attr
        how:
          left
        columns:
          mvke_mvgr1: zba_mvgr1
          mvke_sap_cluster: zba_sap_cluster
      - other:
