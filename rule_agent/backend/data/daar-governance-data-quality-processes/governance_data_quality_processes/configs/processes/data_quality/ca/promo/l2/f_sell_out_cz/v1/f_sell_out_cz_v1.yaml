transform:
  name: f_sell_out_it
  operations:

  - kind: read_dataio
    name: read_universal_schema
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: udm
        storage_id: '{{dataio.storage_id}}'
      domain: paat
      namespace: ca
      object_name: universal_schema
      schema_version: v1


  - kind: filter
    name: filter_universal_schema
    params:
      - condition:
          country='cz'

  - kind: add
    name: add_lower_vendor
    params:
     - column: vendor_name_low
       expression: lower(vendor_name)

  - kind: select
    name: select_universal_schema
    params:
      columns:
        vendor_name_low: vendor_name_low
        product_name: product_name
        product_id: product_id
        retailer: retailer
        year: year
        week: week
        total_volume_sales: total_volume_sales
        total_value_sales: total_value_sales
        vendor_name: vendor_name
      distinct: true

  - kind: read_dataio
    name: read_product_mapping
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: informatica_dq
      namespace: product_mapping_tool
      object_name: product_mapping
      schema_version: v1

  - kind: filter
    name: filter_product_mapping
    params:
      - condition:
          country = 'cz'

  - kind: select
    name: select_product_mapping
    params:
      columns:
        vendor_item: vendor_item
        vendor: vendor
        ban: ban
      distinct: true

  - kind: select
    name: select_product_mapping_for_grouping
    params:
      columns:
        vendor_item: vendor_item
        ban: ban
      distinct: true

  - kind: group
    name: group_product_mapping_ban_vendor
    params:
      - aggs:
          ban: count
        by:
        - vendor_item
        
  - kind: filter
    name: filter_mp_duplicates
    params:
      - condition:
          count_ban = 1

  - kind: add
    name: add_lower_vendor
    context_name: select_product_mapping
    params:
     - column: vendor_name_low
       expression: lower(vendor)

  - kind: join
    name: join_distinct_vendor
    context_name: add_lower_vendor
    params:
      - other:
          filter_mp_duplicates
        how:
          inner
        columns:
          vendor_item: vendor_item

  - kind: read_dataio
    name: read_cz_sellout
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: nielsen
      namespace: cz
      object_name: cz_sellout
      schema_version: v1

  - kind: select
    name: select_cz_sellout
    params:
      columns:
        tag: tag
        manufacturer: manufacturer
      distinct: true

  - kind: read_dataio
    name: read_date
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: ppaa_user_input
      namespace: local
      object_name: date
      schema_version: v2

  - kind: group
    name: group_date_id
    params:
      - aggs:
          date_id: min
        by:
        - year
        - week


  - kind: select
    name: select_date
    params:
      columns:
        year: year
        week: week
        min_date_id: min_date_id
      distinct: true

  - kind: read_dataio
    name: read_cpl_mapping
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: data_quality
      namespace: promo
      object_name: cpl_mapping
      schema_version: v1

  - kind: select
    name: select_cpl_mapping
    params:
      columns:
        retailer: retailer
        cpl_code: cpl_code
        cpl_name: cpl_name
      distinct: true

  - kind: join
    name: join_so_mp_sellout_cld_sellout_cpl
    context_name: select_universal_schema
    params:
      - other:
          join_distinct_vendor
        how:
          left
        columns:
          vendor_name_low: vendor_name_low
      - other:
          select_cz_sellout
        how:
          left
        columns:
          product_id: tag
      - other:
          select_date
        how:
          left
        columns:
          year: year
          week: week
      - other:
          select_cpl_mapping
        how:
          left
        columns:
          retailer: retailer

  - kind: add
    name: add_grouping_calculations
    params:
     - column: m_sales_regular_uc
       expression: (total_volume_sales * 1000) / 5.678
     - column: m_sales_regular_value
       expression: total_value_sales * 1000

  - kind: group
    name: group_sales
    params:
      - aggs:
          m_sales_regular_uc: sum
          m_sales_regular_value: sum
        by:
        - ban
        - min_date_id
        - cpl_code
        - cpl_name
        - manufacturer
        - vendor_name

  - kind: add
    name: add_final_columns
    params:
     - column: company_code
       expression: '''530'''
     - column: country
       expression: '''cz'''
     - column: cpl_code
       expression: "cast(cpl_code as string)"
       overwrite: true
     - column: currency_code
       expression: '''CZK'''
     - column: date
       expression: date_format(min_date_id,'yyyyMMdd')
     - column: m_sales_promo_uc
       expression: "cast(null as decimal(24,8))"
     - column: m_sales_promo_value
       expression: "cast(null as decimal(24,8))"
     - column: m_sales_regular_uc
       expression: "cast(sum_m_sales_regular_uc as decimal(24,8))"
     - column: m_sales_regular_value
       expression: "cast(sum_m_sales_regular_value as decimal(24,8))"
     - column: manufacturer_name
       expression: if(manufacturer = 'COCA-COLA HBC', 'CCH', manufacturer)
     - column: market_code
       expression: "cast(null as string)"
     - column: market_name
       expression: "cast(null as string)"
     - column: shop_code
       expression: "cast(null as string)"
     - column: shop_name
       expression: "cast(null as string)"
     - column: is_current_dataset
       expression: '1'
     - column: area
       expression: "cast(null as string)"

  - kind: select
    name: select_f_sell_out
    params:
      columns:
        ban: ban_code
        company_code: company_code
        country: country
        cpl_code: cpl_code
        cpl_name: cpl_name
        currency_code: currency_code
        date: date
        m_sales_promo_uc: m_sales_promo_uc
        m_sales_promo_value: m_sales_promo_value
        m_sales_regular_uc: m_sales_regular_uc
        m_sales_regular_value: m_sales_regular_value
        manufacturer: manufacturer_name
        market_code: market_code
        market_name: market_name
        shop_code: shop_code
        shop_name: shop_name
        vendor_name: vendor_name
        is_current_dataset: is_current_dataset
        area: area
      distinct: true

  - kind: write_dataio
    name: write_f_sell_out
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: promo
      namespace: l2
      object_name: f_sell_out
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full