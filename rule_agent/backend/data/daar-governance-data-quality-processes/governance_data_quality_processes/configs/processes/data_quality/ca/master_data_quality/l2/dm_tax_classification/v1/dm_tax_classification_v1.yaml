transform:
  name: dm_tax_classification
  operations:
  - kind: read_dataio
    name: read_knvi
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: customer
      object_name: knvi
      schema_version: v1

  - kind: select
    name: select_knvi
    params:
      columns:
        kunnr: customer_code
        aland: tax_land
        tatyp: tax_type
        taxkd: tax_classification
        sap_cluster: sap_cluster
      distinct: true

  - kind: write_dataio
    name: write_dm_tax_classification
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: master_data_quality
      namespace: l2
      object_name: dm_tax_classification
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full
