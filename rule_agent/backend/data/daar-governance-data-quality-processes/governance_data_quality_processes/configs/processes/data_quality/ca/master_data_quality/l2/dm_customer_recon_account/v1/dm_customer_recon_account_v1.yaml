transform:
  name: dm_customer_recon_account
  operations:
  - kind: read_dataio
    name: read_knb1
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: customer
      object_name: knb1
      schema_version: v1

  - kind: filter
    name: filter_knb1
    params:
      - condition:
          bukrs not in('0403', '0550')

  - kind: select
    name: select_knb1
    params:
      columns:
        kunnr: customer_code
        bukrs: company_code
        akont: reconciliation_account
        sap_cluster: sap_cluster
      distinct: true

  - kind: write_dataio
    name: dm_customer_recon_account
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: master_data_quality
      namespace: l2
      object_name: dm_customer_recon_account
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full
