transform:
  name: dm_customer_partner
  operations:

#read knvp
  - kind: read_dataio
    name: read_knvp
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: customer
      object_name: knvp
      schema_version: v1

  - kind: select
    name: select_knvp
    params:
      columns:
        kunnr: kunnr
        parvw: parvw
        kunn2: kunn2
        vkorg: vkorg
        spart: spart
        vtweg: vtweg
        sap_cluster: sap_cluster
      distinct: true

#read tpart
  - kind: read_dataio
    name: read_tpart
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: tpart
      schema_version: v1

  - kind: filter
    name: filter_tpart
    params:
      - condition:
          spras = 'E'

  - kind: select
    name: select_tpart
    params:
      columns:
        parvw: parvw
        vtext: vtext
        sap_cluster: sap_cluster

# Cluster_Config - CC
  - kind: read_dataio
    name: read_cluster_config
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: data_quality
      namespace: data_control_center
      object_name: cluster_config
      schema_version: v2

  - kind: filter
    name: filter_cluster_config
    params:
      - condition:
          flag = 'DM_sales_org'

  - kind: select
    name: select_cluster_config
    params:
      columns:
        sales_org: sales_org_cc
        cluster: cluster_cc
      distinct: true

# read partner_function_code_mapping
  - kind: read_dataio
    name: read_partner_function_code_mapping
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: data_quality
      namespace: master_data_quality
      object_name: partner_function_code_mapping
      schema_version: v1

  - kind: join
    name: join_knvp_tpart_cluster_config_partner_fun_code_mapp
    context_name: select_knvp
    params:
      - other:
          select_tpart
        how:
          left
        columns:
          parvw: parvw
          sap_cluster: sap_cluster
      - other:
          select_cluster_config
        how:
          inner
        columns:
          vkorg: sales_org_cc
          sap_cluster: cluster_cc
      - other:
          read_partner_function_code_mapping
        how:
          left
        columns:
          parvw: partner_function_code

  - kind: select
    name: select_dm_customer_partner
    params:
      columns:
        kunnr: customer_code
        parvw: partner_function_code
        vtext: partner_function_name
        partner_function_code_converted: partner_function_code_converted
        kunn2: partner_code
        vtweg: division_code
        spart: distribution_channel_code
        sap_cluster: sap_cluster
      distinct: true

  - kind: write_dataio
    name: write_dm_customer_partner
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: master_data_quality
      namespace: l2
      object_name: dm_customer_partner
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: full