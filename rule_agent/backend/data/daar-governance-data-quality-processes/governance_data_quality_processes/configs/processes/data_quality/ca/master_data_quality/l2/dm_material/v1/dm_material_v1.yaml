    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: tvm2t
      schema_version: v1

  - kind: filter
