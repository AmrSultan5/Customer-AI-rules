    context_name: filter_tvm2t
    params:
      columns:
        mvgr2: tv2_mvgr2
        bezei: tv2_bezei
        sap_cluster: tv2_sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_tvm3t
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: tvm3t
      schema_version: v1

  - kind: filter
    name: filter_tvm3t
    params:
      - condition:
          spras = 'E'

  - kind: select
    name: select_tvm3t
    context_name: filter_tvm3t
    params:
      columns:
        mvgr3: tv3_mvgr3
        bezei: tv3_bezei
        sap_cluster: tv3_sap_cluster
