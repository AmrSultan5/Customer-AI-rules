      object_name: tvm1t
      schema_version: v1

  - kind: filter
    name: filter_tvm1t
    params:
      - condition:
          spras = 'E'

  - kind: select
    name: select_tvm1t
    context_name: filter_tvm1t
    params:
      columns:
        mvgr1: tv1_mvgr1
        bezei: tv1_bezei
        sap_cluster: tv1_sap_cluster
      distinct: true

  - kind: read_dataio
