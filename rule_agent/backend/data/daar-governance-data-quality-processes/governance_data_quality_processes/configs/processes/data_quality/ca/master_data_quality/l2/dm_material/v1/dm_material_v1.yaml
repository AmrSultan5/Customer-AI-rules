  - kind: read_dataio
    name: read_t023t
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: t023t
      schema_version: v1

  - kind: filter
    name: filter_t023t
    params:
      - condition:
          spras = 'E'

  - kind: select
    name: select_t023t
    context_name: filter_t023t
    params:
      columns:
        matkl: t23_matkl
        wgbez: t23_wgbez
        sap_cluster: t23_sap_cluster
      distinct: true


  - kind: read_dataio
    name: read_zmd_brand_attr
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: zmd_brand_attr
      schema_version: v1

  - kind: select
    name: select_zmd_brand_attr
    params:
      columns:
        mvgr1: zba_mvgr1
        bezei: zba_bezei
        trademark: zba_trademark
        brandowner: zba_brandowner
        tcccindic: zba_tcccindic
        lightindic: zba_lightindic
        sap_cluster: zba_sap_cluster
      distinct: true

#Read t006a

  - kind: read_dataio
    name: read_t006a
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: t006a
      schema_version: v1

  - kind: filter
    name: filter_t006a
    params:
      - condition:
          spras = 'E'

  - kind: select
    name: select_t006a
    context_name: filter_t006a
    params:
      columns:
        msehl: t006a_msehl
        msehi: t006a_msehi
        spras: t006a_spras
        sap_cluster: t006a_sap_cluster
      distinct: true

#Read tvko

  - kind: read_dataio
    name: read_tvko
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: tvko
      schema_version: v1

  - kind: select
    name: select_tvko
    context_name: read_tvko
    params:
      columns:
        vkorg: tvko_vkorg
        bukrs: tvko_bukrs
        sap_cluster: tvko_sap_cluster
      distinct: true

#Read t001

  - kind: read_dataio
    name: read_t001
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: t001
      schema_version: v1

  - kind: select
    name: select_t001
    context_name: read_t001
    params:
      columns:
        bukrs: t001_bukrs
        spras: t001_spras
        sap_cluster: t001_sap_cluster
      distinct: true

#Read packkp

  - kind: read_dataio
    name: read_packkp
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: packkp
      schema_version: v1

  - kind: select
    name: select_packkp
    context_name: read_packkp
    params:
      columns:
        packnr: packkp_packnr
        packtyp: packkp_packtyp
        lot_numitmlay: packkp_lot_numitmlay
        sap_cluster: packkp_sap_cluster
      distinct: true 

#Read kondp

  - kind: read_dataio
    name: read_kondp
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: transactional_data
      object_name: kondp
      schema_version: v1

  - kind: select
    name: select_kondp
    context_name: read_kondp
    params:
      columns:
        knumh: kondp_knumh
        packnr: kondp_packnr
        sap_cluster: kondp_sap_cluster
      distinct: true 

#Read kotp499

  - kind: read_dataio
    name: read_kotp499
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: transactional_data
      object_name: kotp499
      schema_version: v1

  - kind: filter
    name: filter_kotp499
    params:
      - condition:
          datbi= '9999-12-31 00:00:00.0000000'

  - kind: select
    name: select_kotp499
    context_name: filter_kotp499
    params:
      columns:
        datbi: kotp499_datbi
        knumh: kotp499_knumh
        rmatp: kotp499_rmatp
        sap_cluster: kotp499_sap_cluster
      distinct: true

#Read sapsll_maritc

  - kind: read_dataio
    name: read_sapsll_maritc
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: material_master
      object_name: sapsll_maritc
      schema_version: v1

  - kind: group
    name: group_sapsll_maritc_ccngn
    params:
      - aggs:
          ccngn: max
        by:
        - matnr
        - sap_cluster

  - kind: select
    name: select_sapsll_maritc
    params:
      columns:
        matnr: sapsll_maritc_matnr
        max_ccngn: sapsll_maritc_ccngn
        sap_cluster: sapsll_maritc_sap_cluster
      distinct: true 

# Final_ join

  - kind: join
    name: join_finall
    context_name: select_mara
    params:
      - other:
          select_makt
        how:
          left
        columns:
          mara_matnr: makt_matnr
          mara_sap_cluster: makt_sap_cluster
      - other:
          select_t023t
        how:
          left
        columns:
          mara_matkl: t23_matkl
          mara_sap_cluster: t23_sap_cluster
      - other:
          select_mvke
        how:
          left
        columns:
          mara_matnr: mvke_matnr
          mara_sap_cluster: mvke_sap_cluster
      - other:
          select_tvm1t
        how:
          left
        columns:
          mvke_mvgr1: tv1_mvgr1
          mvke_sap_cluster: tv1_sap_cluster
      - other:
          select_tvm2t
        how:
          left
        columns:
          mvke_mvgr2: tv2_mvgr2
          mvke_sap_cluster: tv2_sap_cluster
      - other:
          select_tvm3t
        how:
          left
        columns:
          mvke_mvgr3: tv3_mvgr3
          mvke_sap_cluster: tv3_sap_cluster
      - other:
          select_tvm4t
        how:
          left
        columns:
          mvke_mvgr4: tv4_mvgr4
          mvke_sap_cluster: tv4_sap_cluster
      - other:
          select_tvm5t
        how:
          left
        columns:
          mvke_mvgr5: tv5_mvgr5
          mvke_sap_cluster: tv5_sap_cluster
      - other:
          select_zmd_brand_attr
        how:
          left
        columns:
          mvke_mvgr1: zba_mvgr1
          mvke_sap_cluster: zba_sap_cluster
      - other:
          select_t006a
        how:
          left
        columns:
          mara_meins: t006a_msehi
          mara_sap_cluster: t006a_sap_cluster
      - other:
          select_tvko
        how:
          left
        columns:
          mvke_vkorg: tvko_vkorg
          mvke_sap_cluster: tvko_sap_cluster
      - other:
          select_t001
        how:
          left
        columns:
          tvko_bukrs: t001_bukrs
          tvko_sap_cluster: t001_sap_cluster
      - other:
          select_sapsll_maritc
        how:
          left
        columns:
          mara_matnr: sapsll_maritc_matnr
          mara_sap_cluster: sapsll_maritc_sap_cluster
      - other:
          select_kotp499
        how:
          left
        columns:
          mara_rmatp: kotp499_rmatp
          mara_sap_cluster: kotp499_sap_cluster
      - other:
          select_kondp
        how:
          left
        columns:
          kotp499_knumh: kondp_knumh
          kotp499_sap_cluster: kondp_sap_cluster
      - other:
          select_packkp
        how:
          left
        columns:
          kondp_packnr: packkp_packnr
          kondp_sap_cluster: packkp_sap_cluster
      - other:
          select_t179t
        how:
          left
        columns:
          mvke_prodh: tt_prodh
          mvke_sap_cluster: tt_sap_cluster
          

  - kind: add
    name: add_pakc_size
    params:
      - column: pack_size_uom_unified
        expression: "CASE WHEN tv4_bezei LIKE '%2,4%' THEN 'G' WHEN (tv4_bezei LIKE '%Kilogram%' OR tv4_bezei LIKE '%KG%') THEN 'KG' WHEN tv4_bezei LIKE '%Gr%' THEN 'G' WHEN ((tv4_bezei LIKE '%Litre%' OR tv4_bezei LIKE '%Liter%') AND (tv4_bezei LIKE '0.%')) THEN 'ML' WHEN (tv4_bezei LIKE '%Litre%' OR tv4_bezei LIKE '%Liter%') THEN 'L' ELSE 'UNKNOWN' END"
      - column: pack_size_volume_unified
        expression: "CASE WHEN tv4_bezei LIKE '%2,4%' THEN '2.4' WHEN (tv4_bezei LIKE '%Kilogram%' OR tv4_bezei LIKE '%KG%') THEN regexp_extract(tv4_bezei, '[0-9]+(?:[.][0-9]+)?', 0) WHEN tv4_bezei LIKE '%Gr%' THEN regexp_extract(tv4_bezei, '[0-9]+(?:[.][0-9]+)?', 0) WHEN ((tv4_bezei LIKE '%Litre%' OR tv4_bezei LIKE '%Liter%') AND (tv4_bezei LIKE '0.%')) THEN 1000*(regexp_extract(tv4_bezei, '[0-9]+(?:[.][0-9]+)?', 0)) WHEN (tv4_bezei LIKE '%Litre%' OR tv4_bezei LIKE '%Liter%') THEN regexp_extract(tv4_bezei, '[0-9]+(?:[.][0-9]+)?', 0) ELSE 'UNKNOWN' END"
      - column: product_hierarchy_level_3_code
        expression: "CASE WHEN (length(mvke_prodh) >= 7) THEN substring(mvke_prodh,1,7) ELSE '' END"
      - column: product_hierarchy_level_4_code
        expression: "CASE WHEN (length(mvke_prodh) >= 11) THEN substring(mvke_prodh,1,11) ELSE '' END"
      - column: product_hierarchy_level_5_code
        expression: "CASE WHEN (length(mvke_prodh) = 15) THEN mvke_prodh ELSE '' END"

  - kind: select
    name: select_t179t_l3
    context_name: select_t179t
    params:
      columns:
        tt_prodh: product_hierarchy_l3_code
        tt_vtext: product_hierarchy_l3_name
        tt_sap_cluster: l3_sap_cluster
      distinct: true

  - kind: select
    name: select_t179t_l4
    context_name: select_t179t
    params:
      columns:
        tt_prodh: product_hierarchy_l4_code
        tt_vtext: product_hierarchy_l4_name
        tt_sap_cluster: l4_sap_cluster
      distinct: true

  - kind: select
    name: select_t179t_l5
    context_name: select_t179t
    params:
      columns:
        tt_prodh: product_hierarchy_l5_code
        tt_vtext: product_hierarchy_l5_name
        tt_sap_cluster: l5_sap_cluster
      distinct: true

  - kind: join
    name: join_dm_product_sales_organization
    context_name: add_pakc_size
    params:
      - other:
          select_t179t_l3
        how:
          left
        columns:
          product_hierarchy_level_3_code: product_hierarchy_l3_code
          mvke_sap_cluster: l3_sap_cluster
      - other:
          select_t179t_l4
        how:
          left
        columns:
          product_hierarchy_level_4_code: product_hierarchy_l4_code
          mvke_sap_cluster: l4_sap_cluster
      - other:
          select_t179t_l5
        how:
          left
        columns:
          product_hierarchy_level_5_code: product_hierarchy_l5_code
          mvke_sap_cluster: l5_sap_cluster

  - kind: add
    name: add_package_size_standardized_to_gram_ml
    params:
      - column: package_size_standardized_to_gram_ml
        expression: "CASE WHEN pack_size_uom_unified ='L' THEN 1000 *(pack_size_volume_unified) WHEN pack_size_uom_unified ='KG' THEN 1000 *(pack_size_volume_unified) WHEN pack_size_uom_unified ='G' THEN pack_size_volume_unified WHEN pack_size_uom_unified ='ML' THEN pack_size_volume_unified ELSE pack_size_volume_unified END"

  - kind: cast
    name: cast_package_size_standardized_to_gram_ml
    params:
      - column: package_size_standardized_to_gram_ml
        to: integer

  - kind: add
    name: add_material_name_filters
    params:
      - column: material_name_filter
        expression: "CASE WHEN makt_spras = 'E' THEN makt_maktx ELSE '' END"
      - column: material_name_native_lang_filter
        expression: "CASE WHEN makt_spras = t001_spras THEN makt_maktx ELSE '' END"

  - kind: add
    name: add_total_sales_unit_rule
    params:
      - column: total_sales_unit
        expression: "CASE WHEN regexp(tv5_bezei, '[0-9]') THEN reduce(transform(split(tv5_bezei, '[+]'), x -> reduce(transform(split(x, '[xX]'), y -> cast(y as int)),1,(m, n) -> coalesce(m, 1) * n)),0,(p, q) -> p + q) ELSE tv5_bezei END"

  - kind: select
    name: select_finall
    params:
      columns:
        mara_matnr: material_code
        material_name_filter: material_name
        material_name_native_lang_filter: material_name_native_lang
        mara_mtart: material_type_code
        mara_matkl: material_group_code
        t23_wgbez: material_group_name
        mvke_matnr: material_code_mvke
        mvke_vkorg: sales_organization
        mvke_vtweg: distribution_channel
        mara_wrkst: basic_material_code
        mara_ersda: creation_date
        sapsll_maritc_ccngn: external_identification_of_data
        mvke_prodh: product_hierarchy
        tt_vtext: product_hierarchy_name
        product_hierarchy_level_3_code: product_hierarchy_level_3_code
        product_hierarchy_l3_name: product_hierarchy_level_3_name
        product_hierarchy_level_4_code: product_hierarchy_level_4_code
        product_hierarchy_l4_name: product_hierarchy_level_4_name
        product_hierarchy_level_5_code: product_hierarchy_level_5_code
        product_hierarchy_l5_name: product_hierarchy_level_5_name
        mvke_mvgr1: brand_code
        tv1_bezei: brand_description
        mvke_mvgr2: flavour_code
        tv2_bezei: flavour_description
        mvke_mvgr3: package_type_code
        tv3_bezei: package_type_name
        mvke_mvgr4: package_size_code
        tv4_bezei: package_size_name
        mvke_mvgr5: sales_unit_code
        tv5_bezei: sales_unit_name
        pack_size_uom_unified: pack_size_uom_unified
        pack_size_volume_unified: pack_size_volume_unified
        package_size_standardized_to_gram_ml: package_size_standardized_to_gram_ml
        mara_meins: unit_of_measure_code
        t006a_msehl: unit_of_measure_name
        mvke_kondm: material_pricing_group
        mvke_zz_kondm: ss_sm_flag
        mara_ean11: ean
        mara_sap_cluster: sap_cluster
        total_sales_unit: total_sales_units
        mara_mtpos_mara: general_item_category_group_code
        mara_rmatp: reference_material_for_packed_materials
        mara_brgew: gross_weight
        mara_ntgew: net_weight
        mara_gewei: weight_unit
        mara_raube: storage_condition_code
        mara_mhdhb: total_shelf_life
        mara_mhdrz: remaining_shelf_life
        packkp_packnr: packing_object_number
        packkp_packtyp: packing_object_type
        packkp_lot_numitmlay: quantity_per_layer
      distinct: true


  - kind: write_dataio
    name: write_dm_material
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: master_data_quality
      namespace: l2
      object_name: dm_material
      process_run_id: "{{process_run_id}}"
      schema_version: v1
      refresh_mode: full