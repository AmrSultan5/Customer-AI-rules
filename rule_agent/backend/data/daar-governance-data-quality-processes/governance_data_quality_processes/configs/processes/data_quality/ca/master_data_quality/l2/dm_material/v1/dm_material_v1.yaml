transform:
  name: dm_material
  operations:

  - kind: read_dataio
    name: read_mara
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: material_master
      object_name: mara
      schema_version: v1

  - kind: select
    name: select_mara
    params:
      columns:
        matnr: mara_matnr
        ean11: mara_ean11
        matkl: mara_matkl
        meins: mara_meins
        mtart: mara_mtart
        wrkst: mara_wrkst
        ersda: mara_ersda
        mtpos_mara: mara_mtpos_mara
        rmatp: mara_rmatp
        brgew: mara_brgew
        ntgew: mara_ntgew
        gewei: mara_gewei
        raube: mara_raube
        mhdhb: mara_mhdhb
        mhdrz: mara_mhdrz
        rmatp: mara_rmatp
        sap_cluster: mara_sap_cluster

  - kind: read_dataio
    name: read_makt
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: material_master
      object_name: makt
      schema_version: v1

  - kind: filter
    name: filter_makt
    params:
      - condition:
          spras = 'E'

  - kind: select
    name: select_makt
    context_name: filter_makt
    params:
      columns:
        matnr: makt_matnr
        maktx: makt_maktx
        spras: makt_spras
        sap_cluster: makt_sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_mvke
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: material_master
      object_name: mvke
      schema_version: v1

  - kind: select
    name: select_mvke
    params:
      columns:
        matnr: mvke_matnr
        vkorg: mvke_vkorg
        kondm: mvke_kondm
        mvgr1: mvke_mvgr1
        mvgr2: mvke_mvgr2
        mvgr3: mvke_mvgr3
        mvgr4: mvke_mvgr4
        mvgr5: mvke_mvgr5
        prodh: mvke_prodh
        vtweg: mvke_vtweg
        zz_kondm: mvke_zz_kondm
        sap_cluster: mvke_sap_cluster
      distinct: true

  - kind: read_dataio
    name: read_tvm1t
