  - kind: read_dataio
    name: read_tvm5t
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: tvm5t
      schema_version: v1

  - kind: filter
    name: filter_tvm5t
    params:
      - condition:
          spras = 'E'

  - kind: select
