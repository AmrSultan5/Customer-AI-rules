transform:
  name: dm_material_characteristics
  operations:

  - kind: read_dataio
    name: read_ausp
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: material_master
      object_name: ausp
      schema_version: v1

  - kind: read_dataio
    name: read_cabn
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: sap_s4hana
      namespace: reference_data
      object_name: cabn
      schema_version: v1

  - kind: select
    name: select_ausp_pre
    context_name: read_ausp
    params:
      columns:
        objek: objek
        atzhl: atzhl
        klart: klart_au
        atawe: atawe
        atinn: atinn_au
        atwrt: atwrt
        atflv: atflv
        datuv: datuv_au
        sap_cluster: sap_cluster
      distinct: true

  - kind: group
    name: group_atzhl
    params:
      - aggs:
          atzhl: max
        by:
        - objek
        - klart_au
        - atinn_au
        - sap_cluster

  - kind: join
    name: join_ausp_max_atzhl
    context_name: select_ausp_pre
    params:
      - other:
          group_atzhl
        how:
          inner
        columns:
          objek: objek
          klart_au: klart_au
          atzhl: max_atzhl
          atinn_au: atinn_au
          sap_cluster: sap_cluster

  - kind: select
    name: select_ausp
    params:
      columns:
        objek: objek
        max_atzhl: atzhl
        klart_au: klart_au
        atawe: atawe
        atinn_au: atinn_au
        atwrt: atwrt
        atflv: atflv
        datuv_au: datuv_au
        sap_cluster: sap_cluster
      distinct: true

  - kind: select
    name: select_cabn
    context_name: read_cabn
    params:
      columns:
        atinn: atinn
        atnam: atnam
        sap_cluster: sap_cluster
      distinct: true

  - kind: join
    name: join_ausp_cabn
    context_name: select_ausp
    params:
      - other:
          select_cabn
        how:
          inner
        columns:
          atinn_au: atinn
          sap_cluster: sap_cluster


  - kind: filter
    name: filter_cch
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam = 'CCHBC_COFFEE_CHANNEL'
      
  - kind: filter
    name: filter_cc
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam = 'CCHBC_COFFEE_CLASS'

  - kind: filter
    name: filter_cf
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam = 'CCHBC_COFFEE_FORMAT'

  - kind: filter
    name: filter_cm
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam = 'CCHBC_COFFEE_METHOD'

  - kind: filter
    name: filter_bp
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam =  'CCHBC_BPP_CODE'


  - kind: filter
    name: filter_colour
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_COLOUR_NW', 'SPR_MM_COLOUR')  

  - kind: filter
    name: filter_core_material
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_CORE_MATERIAL', 'SPR_MM_CORE_MATERIAL', 'SPR_MM_CORE_MATERIAL_FG')  


  - kind: filter
    name: filter_plant_pet
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_PLANT_PET', 'SPR_MM_PLANT_PET')  


  - kind: filter
    name: filter_preform_additive
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_PREFORM_ADDITIVE', 'SPR_MM_PREFORM_ADDITIVE')          

  - kind: filter
    name: filter_resin_recycle_type
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_RESIN_RECYCLE_TYPE', 'SPR_MM_RESIN_RECYCLE_TYPE')       


  - kind: filter
    name: filter_rpet_chips
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_RPET_CHIPS', 'SPR_MM_RPET_CHIPS')       


  - kind: filter
    name: filter_rpet_flake
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_RPET_FLAKE', 'SPR_MM_RPET_FLAKE')       

  - kind: filter
    name: filter_rpet_meltin
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_RPET_MELTIN', 'SPR_MM_RPET_MELTIN')       

  - kind: filter
    name: filter_shape
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_SHAPE', 'SPR_MM_SHAPE')       


  - kind: filter
    name: filter_virgin
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_VIRGIN', 'SPR_MM_VIRGIN')       


  - kind: filter
    name: filter_weight
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_WEIGHT_NEW', 'SPR_MM_WEIGHT', 'SPR_MM_WEIGHT_E')       


  - kind: filter
    name: filter_rm_qty
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('SPR_MM_RM_QTY_E', 'SPR_MM_RM_QTY')       

  - kind: filter
    name: filter_recycle_content
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_RECYCLE_CONTENT_NEW', 'SPR_MM_RECYCLE_CONTENT', 'SPR_MM_RECYCLE_CONTENT_E')       

  - kind: filter
    name: filter_co2
    context_name: join_ausp_cabn
    params:
      - condition:
          atnam IN('CPC_MM_CO2', 'SPR_MM_CO2','SPR_MM_CO2_E')       

###
  - kind: select
    name: select_distinct_ausp
    context_name: join_ausp_cabn
    params:
      columns:
        objek: objek
        klart_au: klart_au
        datuv_au: datuv
        sap_cluster: sap_cluster
      distinct: true


  - kind: select
    name: select_ausp_cch
    context_name: filter_cch
    params:
      columns:
        objek: objek
        atwrt: coffee_channel_code
        klart_au: klart_au
        sap_cluster: sap_cluster
      distinct: true

  - kind: select
    name: select_ausp_cc
    context_name: filter_cc
    params:
      columns:
        objek: objek
        atwrt: coffee_class_code
        klart_au: klart_au
        sap_cluster: sap_cluster
      distinct: true


  - kind: select
    name: select_ausp_cf
    context_name: filter_cf
    params:
      columns:
        objek: objek
        atwrt: coffee_format_code
        klart_au: klart_au
        sap_cluster: sap_cluster
      distinct: true


  - kind: select
    name: select_ausp_cm
    context_name: filter_cm
    params:
      columns:
        objek: objek
        atwrt: coffee_method_code
        klart_au: klart_au
        sap_cluster: sap_cluster
      distinct: true

  - kind: select
    name: select_ausp_bp
    context_name: filter_bp
    params:
      columns:
        objek: objek
        atwrt: bpp_code
        klart_au: klart_au
        sap_cluster: sap_cluster
      distinct: true


