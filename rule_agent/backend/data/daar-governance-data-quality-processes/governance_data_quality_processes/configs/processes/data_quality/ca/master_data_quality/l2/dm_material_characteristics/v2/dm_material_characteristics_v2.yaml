  - kind: cast
    name: cast_outputs
    params:
      - column: co2
        to: float
      - column: recycle_content
        to: float
      - column: rm_qty
        to: float
      - column: weight
        to: float


  - kind: select
    name: select_dm_material_characteristics
    params:
      columns:
        objek: object_code
        klart_au: class_type
        coffee_channel_code: coffee_channel_code
        coffee_class_code: coffee_class_code
        coffee_format_code: coffee_format_code
        coffee_method_code: coffee_method_code
        bpp_code: bpp_code
        datuv: valid_from_date
        colour: colour
        core_material: core_material
        plant_pet: plant_pet
        preform_additive: preform_additive
        resin_recycle_type: resin_recycle_type
        rpet_chips: rpet_chips
        rpet_flake: rpet_flake
        rpet_meltin: rpet_meltin
        shape: shape
        virgin: virgin
        weight: weight
        rm_qty: rm_qty
        recycle_content: recycle_content
        co2: co2
        sap_cluster: sap_cluster
      distinct: true

  - kind: write_dataio
    name: write_dm_material_characteristics
    params:
      dataio:
        ad_id: "{{dataio.ad_id}}"
        layer: application
        storage_id: "{{dataio.storage_id}}"
      application_name: data_quality
      country: ca
      module: master_data_quality
      namespace: l2
      object_name: dm_material_characteristics
      process_run_id: "{{process_run_id}}"
      schema_version: v2
      refresh_mode: full