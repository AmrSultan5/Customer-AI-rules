# ## join


  - kind: join
    name: join_ausp_all
    context_name: select_distinct_ausp
    params:
      - other:
          select_ausp_cch
        how:
          left
        columns:
          objek: objek
          klart_au: klart_au
          sap_cluster: sap_cluster
      - other:
          select_ausp_cc
        how:
          left
        columns:
          objek: objek
          klart_au: klart_au
          sap_cluster: sap_cluster
      - other:
          select_ausp_cf
        how:
          left
        columns:
          objek: objek
          klart_au: klart_au
          sap_cluster: sap_cluster
      - other:
          select_ausp_cm
        how:
