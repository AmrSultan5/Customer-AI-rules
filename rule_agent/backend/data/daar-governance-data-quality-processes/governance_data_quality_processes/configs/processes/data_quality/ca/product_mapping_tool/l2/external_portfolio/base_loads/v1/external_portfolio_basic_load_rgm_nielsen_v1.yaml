{% if dataio.storage_id == "datalake_dev" %}
{% set uc_catalog_env = "dc_datalake_dev_001" %}
{% elif dataio.storage_id == "datalake_prod" %}
{% set uc_catalog_env = "dc_datalake_prod_001" %}
{% else %}
{% set uc_catalog_env = "dc_datalake_default" %}
{% endif %}

transform:
  name: external_portfolio_basic_load_rgm_nielsen
  operations:

# nested process - reload rgm_md
  - kind: nested_process
    name: rgm_md_reload
    params:
      config_path: "processes/data_quality/ca/product_mapping_tool/l2/rgm_md/v1/rgm_md_v1.yaml"
      module: "governance_data_quality_processes.configs"
      jinja_params:
        dataio:
          ad_id: "{{dataio.ad_id}}"
          storage_id: "{{dataio.storage_id}}"
        process_run_id: "{{process_run_id}}"
        country:
          name: "{{vendor_data.country}}"       
# end of nested process

# Read data marts
# application_data_quality_ca_product_mapping_tool_l2.rgm_md - md
  - kind: read_dataio
    name: read_rgm_md
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_tool
      namespace: l2
      object_name: rgm_md
      schema_version: v1

  - kind: filter
    name: filter_rgm_md
    context_name: read_rgm_md
    params:
      - condition:
          lower(country) = '''{{vendor_data.country}}''' 

  - kind: add
    name: add_const_1_rgm_md
    context_name: filter_rgm_md
    params:
      - column: const_1_rgm_md
        expression: '''1'''

# configuration data - ep_rgm_filters
# for determining which filter is eligible for respective country
  - kind: read_local
    name: read_conf_data_ep_rgm_filters
    params:
      format: excel
      location: "/Volumes/{{uc_catalog_env}}/locations/datalake_raw/data_quality/product_mapping_tool/configuration_data/0/configuration_data.xlsx"
      options:
        header: true
        pathGlobFilter: configuration_data.xlsx
        sheet_name: ep_rgm_filters

  - kind: filter
    name: filter_conf_data_ep_rgm_filters
    context_name: read_conf_data_ep_rgm_filters
    params:
      - condition:
          country = '''{{vendor_data.country}}''' and ext_source_name = '''{{vendor_data.vendor}}'''

# configuration data - ep_rgm_included_brand_owners
# final output - brand owners to be included and filter eligibility flag
  - kind: filter
    name: filter_conf_data_ep_rgm_filters_brand_owner_inclusion
    context_name: filter_conf_data_ep_rgm_filters
    params:
      - condition:
          filter_name = 'brand_owner_inclusion'

  - kind: add
    name: add_const_1_conf_data_ep_rgm_filters_brand_owner_inclusion
    context_name: filter_conf_data_ep_rgm_filters_brand_owner_inclusion
    params:
      - column: const_1_conf_data_ep_rgm_filters_brand_owner_inclusion
        expression: '''1'''

  - kind: read_local
    name: read_conf_data_ep_rgm_included_brand_owners
    params:
      format: excel
      location: "/Volumes/{{uc_catalog_env}}/locations/datalake_raw/data_quality/product_mapping_tool/configuration_data/0/configuration_data.xlsx"
      options:
        header: true
        pathGlobFilter: configuration_data.xlsx
        sheet_name: ep_rgm_included_brand_owners

  - kind: filter
    name: filter_conf_data_ep_rgm_included_brand_owners
    context_name: read_conf_data_ep_rgm_included_brand_owners
    params:
      - condition:
          country = '''{{vendor_data.country}}''' and ext_source_name = '''{{vendor_data.vendor}}'''

  - kind: add
    name: add_const_1_conf_data_ep_rgm_included_brand_owners
    context_name: filter_conf_data_ep_rgm_included_brand_owners
    params:
      - column: const_1_conf_data_ep_rgm_included_brand_owners
        expression: '''1'''

  - kind: group
    name: group_arrays_conf_data_ep_rgm_included_brand_owners
    context_name: add_const_1_conf_data_ep_rgm_included_brand_owners
    params:
      - aggs:
          included_brand_owner: array_agg
        by:
        - const_1_conf_data_ep_rgm_included_brand_owners

  - kind: join
    name: join_conf_data_ep_rgm_included_brand_owners
    context_name: add_const_1_conf_data_ep_rgm_filters_brand_owner_inclusion
    params:
      - other:
          group_arrays_conf_data_ep_rgm_included_brand_owners
        how:
          fullouter
        columns:
          const_1_conf_data_ep_rgm_filters_brand_owner_inclusion: const_1_conf_data_ep_rgm_included_brand_owners

  - kind: select
    name: select_conf_data_ep_rgm_included_brand_owners
    context_name: join_conf_data_ep_rgm_included_brand_owners
    params:
      columns:
        const_1_conf_data_ep_rgm_filters_brand_owner_inclusion: const_1_conf_data_ep_rgm_filters_brand_owner_inclusion
        filter_flag: filter_flag_brand_owner_inclusion
        array_agg_included_brand_owner: array_agg_included_brand_owner
      distinct: true

# join conf data - rgm_md
  - kind: join
    name: join_rgm_md_conf_data
    context_name: add_const_1_rgm_md
    params:
      - other:
          select_conf_data_ep_rgm_included_brand_owners
        how:
          inner
        columns:
          const_1_rgm_md: const_1_conf_data_ep_rgm_filters_brand_owner_inclusion

  - kind: add
    name: add_np_pm_stats_req
    context_name: join_rgm_md_conf_data
    params:
      - column: ext_product_code_md_in
        overwrite: true
        expression: vendor_item
      - column: in_scope_flg
        overwrite: true
        expression: IF(IF(filter_flag_brand_owner_inclusion = 1 AND array_contains(array_agg_included_brand_owner, brand_owner), 1, 0) + IF(filter_flag_brand_owner_inclusion = 0, 1, 0) + IF(vendor_item not in ('NA', 'N/D'), 1, 0) > 1, 1, 0)

# nested process - pm_stats
  - kind: nested_process
    name: external_portfolio_basic_load_pm_stats
    params:
      config_path: "processes/data_quality/ca/product_mapping_tool/l2/external_portfolio/base_loads/v1/external_portfolio_basic_load_pm_stats_v1.yaml"
      module: "governance_data_quality_processes.configs"
      jinja_params:
        dataio:
          ad_id: "{{dataio.ad_id}}"
          storage_id: "{{dataio.storage_id}}"
        process_run_id: "{{process_run_id}}"
        vendor_data:
          country: "{{vendor_data.country}}"
          vendor: "{{vendor_data.vendor}}"        
# end of nested process

  - kind: add
    name: add_const_1_md
    context_name: filter_np_pm_stats_final
    params:
      - column: const_1_md
        expression: '''1'''
      - column: product_id
        expression: coalesce(product_tag, 0)
        overwrite: true

# subset of data for following nested process - sell out, mode - inscope -> calculating for products incscope, but not in pm
  - kind: filter
    name: filter_np_sellout_mode_in_scope
    context_name: add_const_1_md
    params:
      - condition:
          in_pm_flg = 0

# final product select before nested process - sell out - needs to be list of unique ext products identifies by product_id_md and need to be named select_product_base
  - kind: select
    name: select_product_base_inscope
    context_name: filter_np_sellout_mode_in_scope
    params:
      columns:
        product_id: product_id_md
        ext_product_code_md: ext_product_code_md
        vendor_long_description: vendor_long_description
        brand_owner: brand_owner
        vendor_brand: vendor_brand
        vendor_package_type: vendor_package_type
        vendor_package_size: vendor_package_size
        vendor_units_per_package: vendor_units_per_package
        vendor_flavour: vendor_flavour
        application: application
        vendor: vendor
        country: country
        in_portfolio_scope_flg: in_portfolio_scope_flg
        number_of_sap_matches: number_of_sap_matches
        number_of_sap_ban_matches: number_of_sap_ban_matches
        in_pm_flg: in_pm_flg
      distinct: true

# sell out block
# common for inscope and inpm
# configuration data - ep_rgm_inluded_market_tags
# final output - market tags to be included and filter eligibility flag
  - kind: filter
    name: filter_conf_data_ep_rgm_filters_market_tag_inclusion
    context_name: filter_conf_data_ep_rgm_filters
    params:
      - condition:
          filter_name = 'market_tag_inclusion'

  - kind: add
    name: add_const_1_conf_data_ep_rgm_filters_market_tag_inclusion
    context_name: filter_conf_data_ep_rgm_filters_market_tag_inclusion
    params:
      - column: const_1_conf_data_ep_rgm_filters_market_tag_inclusion
        expression: '''1'''

  - kind: read_local
    name: read_conf_data_ep_rgm_inluded_market_tags
    params:
      format: excel
      location: "/Volumes/{{uc_catalog_env}}/locations/datalake_raw/data_quality/product_mapping_tool/configuration_data/0/configuration_data.xlsx"
      options:
        header: true
        pathGlobFilter: configuration_data.xlsx
        sheet_name: ep_rgm_inluded_market_tags

  - kind: filter
    name: filter_conf_data_ep_rgm_inluded_market_tags
    context_name: read_conf_data_ep_rgm_inluded_market_tags
    params:
      - condition:
          country = '''{{vendor_data.country}}''' and ext_source_name = '''{{vendor_data.vendor}}'''

  - kind: add
    name: add_const_1_conf_data_ep_rgm_inluded_market_tags
    context_name: filter_conf_data_ep_rgm_inluded_market_tags
    params:
      - column: const_1_conf_data_ep_rgm_inluded_market_tags
        expression: '''1'''

  - kind: group
    name: group_arrays_conf_data_ep_rgm_inluded_market_tags
    context_name: add_const_1_conf_data_ep_rgm_inluded_market_tags
    params:
      - aggs:
          included_market_tag: array_agg
        by:
        - const_1_conf_data_ep_rgm_inluded_market_tags

  - kind: join
    name: join_conf_data_ep_rgm_inluded_market_tags
    context_name: add_const_1_conf_data_ep_rgm_filters_market_tag_inclusion
    params:
      - other:
          group_arrays_conf_data_ep_rgm_inluded_market_tags
        how:
          fullouter
        columns:
          const_1_conf_data_ep_rgm_filters_market_tag_inclusion: const_1_conf_data_ep_rgm_inluded_market_tags

  - kind: select
    name: select_conf_data_ep_rgm_inluded_market_tags
    context_name: join_conf_data_ep_rgm_inluded_market_tags
    params:
      columns:
        const_1_conf_data_ep_rgm_filters_market_tag_inclusion: const_1_conf_data_ep_rgm_filters_market_tag_inclusion
        filter_flag: filter_flag_market_tag_inclusion
        array_agg_included_market_tag: array_agg_included_market_tag
      distinct: true

# nested process - reload rgm_td
  - kind: nested_process
    name: rgm_td_reload
    params:
      config_path: "processes/data_quality/ca/product_mapping_tool/l2/rgm_td/v1/rgm_td_v1.yaml"
      module: "governance_data_quality_processes.configs"
      jinja_params:
        dataio:
          ad_id: "{{dataio.ad_id}}"
          storage_id: "{{dataio.storage_id}}"
        process_run_id: "{{process_run_id}}"
        country:
          name: "{{vendor_data.country}}"       
# end of nested process

# sell out source -  application_data_quality_ca_product_mapping_tool_l2.rgm_td_v1 - sls
  - kind: read_dataio
    name: read_rgm_td
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_tool
      namespace: l2
      object_name: rgm_td
      schema_version: v1

  - kind: filter
    name: filter_rgm_td
    context_name: read_rgm_td
    params:
      - condition:
          lower(country) = '''{{vendor_data.country}}''' 

  - kind: add
    name: add_const_1_sls
    context_name: filter_rgm_td
    params:
      - column: const_1_sls
        expression: '''1'''
      - column: cfy
        expression: year(current_date())
      - column: pfy
        expression: year(current_date()) - 1
      - column: ppfy
        expression: year(current_date()) - 2
      - column: pppfy
        expression: year(current_date()) - 3
      - column: year_extracted
        expression: year

# join conf data
  - kind: join
    name: join_sls_conf_data
    context_name: add_const_1_sls
    params:
      - other:
          select_conf_data_ep_rgm_inluded_market_tags
        how:
          inner
        columns:
          const_1_sls: const_1_conf_data_ep_rgm_filters_market_tag_inclusion

  - kind: filter
    name: filter_sls_conf_data
    context_name: join_sls_conf_data
    params:
      - condition:
          IF(filter_flag_market_tag_inclusion = 1, array_contains(array_agg_included_market_tag, market_tag), TRUE) 

# sell out calc on source
  - kind: select
    name: select_sell_out_base
    context_name: filter_sls_conf_data
    params:
      columns:
        product_tag: product_id_sls
        volume_in_uc: total_volume_sales
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        year_extracted: year_extracted
      distinct: true

  - kind: group
    name: group_sell_out_base
    context_name: select_sell_out_base
    params:
      - aggs:
          total_volume_sales: sum
        by:
        - product_id_sls
        - year_extracted
        - cfy
        - pfy
        - ppfy
        - pppfy

# cfy
  - kind: filter
    name: filter_sell_out_base_cfy
    context_name: group_sell_out_base
    params:
      - condition:
          year_extracted = cfy

  - kind: select
    name: select_sell_out_base_cfy
    context_name: filter_sell_out_base_cfy
    params:
      columns:
        product_id_sls: product_id_sls_cfy
        #cfy: cfy
        sum_total_volume_sales: sum_total_volume_sales_cfy
      distinct: true

# pfy
  - kind: filter
    name: filter_sell_out_base_pfy
    context_name: group_sell_out_base
    params:
      - condition:
          year_extracted = pfy

  - kind: select
    name: select_sell_out_base_pfy
    context_name: filter_sell_out_base_pfy
    params:
      columns:
        product_id_sls: product_id_sls_pfy
        #pfy: pfy
        sum_total_volume_sales: sum_total_volume_sales_pfy
      distinct: true

# ppfy
  - kind: filter
    name: filter_sell_out_base_ppfy
    context_name: group_sell_out_base
    params:
      - condition:
          year_extracted = ppfy

  - kind: select
    name: select_sell_out_base_ppfy
    context_name: filter_sell_out_base_ppfy
    params:
      columns:
        product_id_sls: product_id_sls_ppfy
        #ppfy: ppfy
        sum_total_volume_sales: sum_total_volume_sales_ppfy
      distinct: true

# pppfy
  - kind: filter
    name: filter_sell_out_base_pppfy
    context_name: group_sell_out_base
    params:
      - condition:
          year_extracted = pppfy

  - kind: select
    name: select_sell_out_base_pppfy
    context_name: filter_sell_out_base_pppfy
    params:
      columns:
        product_id_sls: product_id_sls_pppfy
        #pppfy: pppfy
        sum_total_volume_sales: sum_total_volume_sales_pppfy
      distinct: true

# sequence of joins for flattening of sell out
  - kind: join
    name: join_sls_flatten_sell_out_cfy_pfy
    context_name: select_sell_out_base_cfy
    params:
      - other:
          select_sell_out_base_pfy
        how:
          full_outer
        columns:
          product_id_sls_cfy: product_id_sls_pfy

  - kind: add
    name: add_sls_product_id_after_pfy
    context_name: join_sls_flatten_sell_out_cfy_pfy
    params:
      - column: product_id_sls_after_pfy
        expression: coalesce(product_id_sls_cfy, product_id_sls_pfy)
        overwrite: true

  - kind: join
    name: join_sls_flatten_sell_out_ppfy
    context_name: add_sls_product_id_after_pfy
    params:
      - other:
          select_sell_out_base_ppfy
        how:
          full_outer
        columns:
          product_id_sls_after_pfy: product_id_sls_ppfy

  - kind: add
    name: add_sls_product_id_after_ppfy
    context_name: join_sls_flatten_sell_out_ppfy
    params:
      - column: product_id_sls_after_ppfy
        expression: coalesce(product_id_sls_after_pfy, product_id_sls_ppfy)
        overwrite: true

  - kind: join
    name: join_sls_flatten_sell_out_pppfy
    context_name: add_sls_product_id_after_ppfy
    params:
      - other:
          select_sell_out_base_pppfy
        how:
          full_outer
        columns:
          product_id_sls_after_ppfy: product_id_sls_pppfy

  - kind: add
    name: add_sls_product_id_after_pppfy
    context_name: join_sls_flatten_sell_out_pppfy
    params:
      - column: product_id_sls_after_pppfy
        expression: coalesce(product_id_sls_after_ppfy, product_id_sls_pppfy)
        overwrite: true
      - column: const_1_sls_sell_out_base
        expression: '''1'''

# specific for in scope
  - kind: filter
    name: filter_sls_conf_data_sell_out_inscope
    context_name: add_sls_product_id_after_pppfy
    params:
      - condition:
          (sum_total_volume_sales_cfy is not null AND sum_total_volume_sales_cfy != 0) OR (sum_total_volume_sales_pfy is not null AND sum_total_volume_sales_pfy != 0) OR (sum_total_volume_sales_ppfy is not null AND sum_total_volume_sales_ppfy != 0) OR (sum_total_volume_sales_pppfy is not null AND sum_total_volume_sales_pppfy != 0)
 
  - kind: add
    name: add_fy_after_flattening_inscope
    context_name: filter_sls_conf_data_sell_out_inscope
    params:
      - column: cfy
        expression: year(current_date())
        overwrite: true
      - column: pfy
        expression: year(current_date()) - 1
        overwrite: true
      - column: ppfy
        expression: year(current_date()) - 2
        overwrite: true
      - column: pppfy
        expression: year(current_date()) - 3
        overwrite: true

  - kind: select
    name: select_sell_out_final_inscope
    context_name: add_fy_after_flattening_inscope
    params:
      columns:
        product_id_sls_after_pppfy: product_id_sls_final
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        sum_total_volume_sales_cfy: sum_total_volume_sales_cfy
        sum_total_volume_sales_pfy: sum_total_volume_sales_pfy
        sum_total_volume_sales_ppfy: sum_total_volume_sales_ppfy
        sum_total_volume_sales_pppfy: sum_total_volume_sales_pppfy
      distinct: true

# inner join sell out back to product - inscope
  - kind: join
    name: join_product_sell_out_inscope
    context_name: select_product_base_inscope
    params:
      - other:
          select_sell_out_final_inscope
        how:
          inner
        columns:
          product_id_md: product_id_sls_final
# in scope end

# capture results of np into dataframe, for union later
# np_sellout_mode_in_scope
  - kind: add
    name: add_np_sellout_mode_in_scope
    context_name: join_product_sell_out_inscope
    params:
      - column: const_1_union
        expression: '''1'''

# subset of data for following nested process - sell out, mode - in_pm -> calculating for products in_pm, regardless of scope
  - kind: filter
    name: filter_np_sellout_mode_in_pm
    context_name: add_const_1_md
    params:
      - condition:
          in_pm_flg = 1

# final product select before nested process - sell out - needs to be list of unique ext products identifies by product_id_md and need to be named select_product_base
  - kind: select
    name: select_product_base_inpm
    context_name: filter_np_sellout_mode_in_pm
    params:
      columns:
        product_id: product_id_md
        ext_product_code_md: ext_product_code_md
        vendor_long_description: vendor_long_description
        brand_owner: brand_owner
        vendor_brand: vendor_brand
        vendor_package_type: vendor_package_type
        vendor_package_size: vendor_package_size
        vendor_units_per_package: vendor_units_per_package
        vendor_flavour: vendor_flavour
        application: application
        vendor: vendor
        country: country
        in_portfolio_scope_flg: in_portfolio_scope_flg
        number_of_sap_matches: number_of_sap_matches
        number_of_sap_ban_matches: number_of_sap_ban_matches
        in_pm_flg: in_pm_flg
      distinct: true

# specific for in pm
  - kind: add
    name: add_fy_after_flattening_inpm
    context_name: add_sls_product_id_after_pppfy
    params:
      - column: cfy
        expression: year(current_date())
        overwrite: true
      - column: pfy
        expression: year(current_date()) - 1
        overwrite: true
      - column: ppfy
        expression: year(current_date()) - 2
        overwrite: true
      - column: pppfy
        expression: year(current_date()) - 3
        overwrite: true

  - kind: select
    name: select_sell_out_final_inpm
    context_name: add_fy_after_flattening_inpm
    params:
      columns:
        product_id_sls_after_pppfy: product_id_sls_final
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        sum_total_volume_sales_cfy: sum_total_volume_sales_cfy
        sum_total_volume_sales_pfy: sum_total_volume_sales_pfy
        sum_total_volume_sales_ppfy: sum_total_volume_sales_ppfy
        sum_total_volume_sales_pppfy: sum_total_volume_sales_pppfy
      distinct: true

# left join sell out back to product
  - kind: join
    name: join_product_sell_out_inpm
    context_name: select_product_base_inpm
    params:
      - other:
          select_sell_out_final_inpm
        how:
          left
        columns:
          product_id_md: product_id_sls_final

  - kind: add
    name: add_fy_after_left_join
    context_name: join_product_sell_out_inpm
    params:
      - column: cfy
        expression: year(current_date())
        overwrite: true
      - column: pfy
        expression: year(current_date()) - 1
        overwrite: true
      - column: ppfy
        expression: year(current_date()) - 2
        overwrite: true
      - column: pppfy
        expression: year(current_date()) - 3
        overwrite: true
      - column: country
        expression: '''{{vendor_data.country}}''' 
        overwrite: true
# in pm end

# capture results of np into dataframe, for union later
# np_sellout_mode_in_pm
  - kind: add
    name: add_np_sellout_mode_in_pm
    context_name: add_fy_after_left_join
    params:
      - column: const_1_union
        expression: '''1'''

  - kind: union
    name: union_np_sellout
    context_name: add_np_sellout_mode_in_pm
    params:
      allow_missing: true
      by_name: true
      other: add_np_sellout_mode_in_scope

# final transformations specific for rgm
# grouping to grain level
  - kind: group
    name: group_to_grain_level
    context_name: union_np_sellout
    params:
      - aggs:
          vendor_long_description: max
          vendor_brand: max
          vendor_package_type: max
          vendor_package_size: max
          vendor_units_per_package: max
          vendor_flavour: max
          in_portfolio_scope_flg: max
          number_of_sap_matches: max
          number_of_sap_ban_matches: max
          cfy: max
          pfy: max
          ppfy: max
          pppfy: max
          sum_total_volume_sales_cfy: sum
          sum_total_volume_sales_pfy: sum
          sum_total_volume_sales_ppfy: sum
          sum_total_volume_sales_pppfy: sum
        by:
        - ext_product_code_md
        - vendor
        - country

  - kind: select
    name: select_group_to_grain_level
    context_name: group_to_grain_level
    params:
      columns:
        ext_product_code_md: ext_product_code
        country: country
        max_vendor_long_description: ext_product_name_src
        max_vendor_brand: ext_brand_src
        max_vendor_flavour: ext_flavour_src
        max_vendor_package_type: ext_package_type_src
        max_vendor_package_size: ext_package_size_src
        max_vendor_units_per_package: ext_sales_unit_src
        max_in_portfolio_scope_flg: in_portfolio_scope_flg
        max_number_of_sap_matches: number_of_sap_matches
        max_number_of_sap_ban_matches: number_of_sap_ban_matches
        max_cfy: cfy
        max_pfy: pfy
        max_ppfy: ppfy
        max_pppfy: pppfy
        sum_sum_total_volume_sales_cfy: sum_total_volume_sales_cfy
        sum_sum_total_volume_sales_pfy: sum_total_volume_sales_pfy
        sum_sum_total_volume_sales_ppfy: sum_total_volume_sales_ppfy
        sum_sum_total_volume_sales_pppfy: sum_total_volume_sales_pppfy
      distinct: true

  - kind: add
    name: add_sell_out_calc
    context_name: select_group_to_grain_level
    params:
      - column: sum_total_volume_sales_cfy
        expression: cast(sum_total_volume_sales_cfy as decimal(10,4))
        overwrite: true
      - column: sum_total_volume_sales_pfy
        expression: cast(sum_total_volume_sales_pfy as decimal(10,4))
        overwrite: true
      - column: sum_total_volume_sales_ppfy
        expression: cast(sum_total_volume_sales_ppfy as decimal(10,4))
        overwrite: true
      - column: sum_total_volume_sales_pppfy
        expression: cast(sum_total_volume_sales_pppfy as decimal(10,4))
        overwrite: true
      - column: number_of_sap_matches
        expression: cast(number_of_sap_matches as integer)
        overwrite: true
      - column: number_of_sap_ban_matches
        expression: cast(number_of_sap_ban_matches as integer)
        overwrite: true

# configuration data - ep_rgm_ean_availability
  - kind: read_local
    name: read_conf_data_ep_rgm_ean_availability
    params:
      format: excel
      location: "/Volumes/{{uc_catalog_env}}/locations/datalake_raw/data_quality/product_mapping_tool/configuration_data/0/configuration_data.xlsx"
      options:
        header: true
        pathGlobFilter: configuration_data.xlsx
        sheet_name: ep_rgm_ean_availability

  - kind: add
    name: transformations_conf_data_ep_rgm_ean_availability
    context_name: read_conf_data_ep_rgm_ean_availability
    params:
      - column: country_code
        expression: lower(country_code)
        overwrite: true

  - kind: filter
    name: filter_conf_data_ep_rgm_ean_availability
    context_name: transformations_conf_data_ep_rgm_ean_availability
    params:
      - condition:
          lower(country_code) = '''{{vendor_data.country}}''' 

  - kind: join
    name: join_conf_data_ep_rgm_ean_availability
    context_name: add_sell_out_calc
    params:
      - other:
          filter_conf_data_ep_rgm_ean_availability
        how:
          left
        columns:
          country: country_code

#final step
