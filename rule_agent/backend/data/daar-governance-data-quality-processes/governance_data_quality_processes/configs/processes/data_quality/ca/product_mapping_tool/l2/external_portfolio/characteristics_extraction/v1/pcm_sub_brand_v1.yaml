{% if dataio.storage_id == "datalake_dev" %}
{% set uc_catalog_env = "dc_datalake_dev_001" %}
{% set uc_catalog_ml_env = "dc_adb-dg-dataquality-dev-001" %}
{% elif dataio.storage_id == "datalake_prod" %}
{% set uc_catalog_env = "dc_datalake_prod_001" %}
{% set uc_catalog_ml_env = "dc_adb-dg-dataquality-prod-001" %}
{% else %}
{% set uc_catalog_env = "dc_datalake_default" %}
{% set uc_catalog_ml_env = "dc_datalake_default" %}
{% endif %}

transform:
  name: PCM_sub_brand
  operations:

########################################################################################################################
# Read-in data
########################################################################################################################
  - kind: read_dataio
    name: read_ep
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_tool
      namespace: l2
      object_name: external_portfolio
      schema_version: v1

  {% if vendor_data.country != "all" %}

  - kind: filter
    name: filter_vendor
    params:
      - condition:
          country_code = '''{{vendor_data.country}}''' and ext_source_name = '''{{vendor_data.vendor}}'''

  {% endif %}

  - kind: drop
    name: drop_process_run_id
    params:
      - column: process_run_id

  - kind: filter
    name: filter_null_product_name
    context_name: drop_process_run_id
    params:
      - condition:
          ext_product_name_src is null or ext_product_name_src = ''

  - kind: filter
    name: filter_not_null_product_name
    context_name: drop_process_run_id
    params:
      - condition:
          ext_product_name_src is not null and ext_product_name_src != ''
          
#conf data join
#spu add const value fpr join
  - kind: add
    name: add_const_1_subbrand
    params:
      - column: const_1_subbrand
        expression: '''1'''

#read conf data
  - kind: read_local
    name: read_conf_data
    params:
      format: excel
      location: "/Volumes/{{uc_catalog_env}}/locations/datalake_raw/data_quality/product_mapping_tool/configuration_data/0/configuration_data.xlsx"
      options:
        header: true
        pathGlobFilter: configuration_data.xlsx
        sheet_name: ep_sub_brand

  - kind: add
    name: add_const_1_conf
    context_name: read_conf_data
    params:
      - column: const_1_conf
        expression: '''1'''

  - kind: group
    name: group_arrays_conf
    context_name: add_const_1_conf
    params:
      - aggs:
          input_value: array_agg
          output_value: array_agg
          priority: array_agg
        by:
        - const_1_conf

  - kind: join
    name: join_conf
    context_name: add_const_1_subbrand
    params:
      - other:
          group_arrays_conf
        how:
          inner
        columns:
          const_1_subbrand: const_1_conf

  - kind: add
    name: add_conf_structs
    params:
      - column: input_output_priority_structs
        expression: transform(sequence(0, size(array_agg_input_value) - 1), i -> struct(array_agg_input_value[i] as input_val, array_agg_output_value[i] as output_val, CAST(array_agg_priority[i] AS INT) as prio))

  - kind: add
    name: filter_matching_structs
    context_name: add_conf_structs
    params:
      - column: matching_structs
        expression: filter(input_output_priority_structs, x -> instr(ext_product_name_final, x.input_val) > 0)

  - kind: add
    name: sort_matching_structs
    context_name: filter_matching_structs
    params:
      - column: matching_structs
        expression: array_sort(matching_structs, (left, right) -> case when left.prio < right.prio then -1 when left.prio > right.prio then 1 else 0 end)
        overwrite: true

  - kind: add
    name: extract_lowest_priority_output
    context_name: sort_matching_structs
    params:
      - column: subbrand_tmp
        expression: element_at(transform(slice(matching_structs, 1, 1), x -> x.output_val), 1)
        overwrite: true

  - kind: add
    name: add_subbrand_final
    context_name: extract_lowest_priority_output
    params:
      - column: ext_sub_brand_pcm
        expression: if(subbrand_tmp is not null and (lower(ext_brand_pcm) = 'monster-ko' or lower(ext_brand_pcm) = 'ultra-ko'), subbrand_tmp, '')
        overwrite: true 
      - column: ext_sub_brand_pcm_probability
        overwrite: true
        expression: "cast (if(ext_sub_brand_pcm is null or ext_sub_brand_pcm = '', null, 1) as decimal(10,4))"  

  - kind: select
    name: select_final
    context_name: add_subbrand_final
    params:
      columns:
      columns:
        ext_product_code: ext_product_code
        country_code: country_code
        ext_source_name: ext_source_name
        ext_product_name_src: ext_product_name_src
        ext_product_name_translated: ext_product_name_translated
        ext_product_name_final: ext_product_name_final
        ean: ean
        ext_brand_src: ext_brand_src
        ext_brand_pcm: ext_brand_pcm
        ext_brand_pcm_probability: ext_brand_pcm_probability
        ext_brand_final: ext_brand_final
        ext_brand_final_probability: ext_brand_final_probability
        ext_flavour_src: ext_flavour_src
        ext_flavour_pcm: ext_flavour_pcm
        ext_flavour_pcm_probability: ext_flavour_pcm_probability
        ext_flavour_final: ext_flavour_final
        ext_flavour_final_probability: ext_flavour_final_probability
        ext_package_type_src: ext_package_type_src
        ext_package_type_pcm: ext_package_type_pcm
        ext_package_type_pcm_probability: ext_package_type_pcm_probability
        ext_package_type_final: ext_package_type_final
        ext_package_type_final_probability: ext_package_type_final_probability
        ext_package_size_src: ext_package_size_src
        ext_package_size_pcm: ext_package_size_pcm
        ext_package_size_pcm_probability: ext_package_size_pcm_probability
        ext_package_size_final: ext_package_size_final
        ext_package_size_final_probability: ext_package_size_final_probability
        ext_sales_unit_src: ext_sales_unit_src
        ext_sales_unit_pcm: ext_sales_unit_pcm
        ext_sales_unit_pcm_probability: ext_sales_unit_pcm_probability
        ext_sales_unit_final: ext_sales_unit_final
        ext_sales_unit_final_probability: ext_sales_unit_final_probability
        ext_sub_brand_src: ext_sub_brand_src
        ext_sub_brand_pcm: ext_sub_brand_pcm
        ext_sub_brand_pcm_probability: ext_sub_brand_pcm_probability
        ext_sub_brand_final: ext_sub_brand_final
        ext_sub_brand_final_probability: ext_sub_brand_final_probability
        ext_item_category_src: ext_item_category_src
        ext_item_category_final: ext_item_category_final
        ext_retailer: ext_retailer
        sparkling_level: sparkling_level
        load_date: load_date
        in_portfolio_scope_flg: in_portfolio_scope_flg
        product_load_status: product_load_status
        number_of_sap_matches: number_of_sap_matches
        number_of_sap_ban_matches: number_of_sap_ban_matches
        cfy: cfy
        pfy: pfy
        ppfy: ppfy
        pppfy: pppfy
        sum_cfy: sum_cfy
        sum_pfy: sum_pfy
        sum_ppfy: sum_ppfy
        sum_pppfy: sum_pppfy
      distinct: true
      
  - kind: union
    name: union_final
    context_name: select_final
    params:
      allow_missing: false
      by_name: true
      other: filter_null_product_name

  - kind: write_dataio
    name: write_ext_portfolio
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality
      country: ca
      module: product_mapping_tool
      namespace: l2
      object_name: external_portfolio
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: full
