transform:
  name: dm_employee_talent
  operations:
  - kind: read_dataio
    name: read_talent
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: talent
      schema_version: v1

  - kind: add
    name: add_cols
    context_name: read_talent
    params:
      - column: object_type
        expression: '"Employee"'

  - kind: cast
    name: cast_cols
    context_name: add_cols
    params:
      - column: object_type
        to: string
      - column: global_id
        to: string
      - column: line_manager
        to: string
      - column: workforce_segment
        to: string
      - column: performance_date
        to: date
      - column: performance_rating
        to: string

  - kind: select
    name: select_talent_columns
    context_name: cast_cols
    params:
      columns:
        object_type: object_type
        global_id: global_id
        line_manager: line_manager
        workforce_segment: workforce_segment
        performance_date: performance_date
        performance_rating: performance_rating
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_talent
    context_name: select_talent_columns
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_talent
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: partition