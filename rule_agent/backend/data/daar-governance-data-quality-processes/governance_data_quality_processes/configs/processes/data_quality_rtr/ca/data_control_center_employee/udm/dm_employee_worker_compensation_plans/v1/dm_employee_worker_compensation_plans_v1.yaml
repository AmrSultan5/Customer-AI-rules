transform:
  name: dm_employee_worker_compensation_plans
  operations:

  - kind: read_dataio
    name: read_worker
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: worker
      schema_version: v1

  - kind: filter
    name: filter_employee
    context_name: read_worker
    params:
      - condition:
          employee_group != 'CUSTOM_ORG_EGS_HIERARCHY_3_INACTIVE'

  - kind: select
    name: select_period_salary_plan_id
    context_name: filter_employee
    params:
      columns:
        employee_id: employee_id
        prd_salary_plan: plan_value
      distinct: true

  - kind: add
    name: add_period_salary_plan_id
    context_name: select_period_salary_plan_id
    params:
      - column: plan_name
        expression: '"period_salary_plan_id"'

  - kind: select
    name: select_calculated_plan_id
    context_name: filter_employee
    params:
      columns:
        employee_id: employee_id
        calculated_plan: plan_value
      distinct: true

  - kind: add
    name: add_calculated_plan_id
    context_name: select_calculated_plan_id
    params:
      - column: plan_name
        expression: '"calculated_plan_id"'

  - kind: select
    name: select_allowance_plan_id
    context_name: filter_employee
    params:
      columns:
        employee_id: employee_id
        allowance_plan: plan_value
      distinct: true

  - kind: add
    name: add_allowance_plan_id
    context_name: select_allowance_plan_id
    params:
      - column: plan_name
        expression: '"allowance_plan_id"'

  - kind: select
    name: select_insurance_plan
    context_name: filter_employee
    params:
      columns:
        employee_id: employee_id
        insurance_plan: plan_value
      distinct: true

  - kind: add
    name: add_insurance_plan
    context_name: select_insurance_plan
    params:
      - column: plan_name
        expression: '"insurance_plan_id"'

  - kind: select
    name: select_additional_benefit_plan
    context_name: filter_employee
    params:
      columns:
        employee_id: employee_id
        add_benefit_plan: plan_value
      distinct: true

  - kind: add
    name: add_additional_benefit_plan
    context_name: select_additional_benefit_plan
    params:
      - column: plan_name
        expression: '"additional_benefit_plan_id"'

  - kind: select
    name: select_healthcare_plan
    context_name: filter_employee
    params:
      columns:
        employee_id: employee_id
        health_care_plan: plan_value
      distinct: true

  - kind: add
    name: add_healthcare_plan
    context_name: select_healthcare_plan
    params:
      - column: plan_name
        expression: '"healthcare_plan_id"'

  - kind: select
    name: select_bonus_plan
    context_name: filter_employee
    params:
      columns:
        employee_id: employee_id
        bonus_plan: plan_value
      distinct: true

  - kind: add
    name: add_bonus_plan
    context_name: select_bonus_plan
    params:
      - column: plan_name
        expression: '"bonus_plan_id"'

  - kind: select
    name: select_retirement_plan
    context_name: filter_employee
    params:
      columns:
        employee_id: employee_id
        retirement_plan: plan_value
      distinct: true

  - kind: add
    name: add_retirement_plan
    context_name: select_retirement_plan
    params:
      - column: plan_name
        expression: '"retirement_plan_id"'

  - kind: select
    name: select_dependents
    context_name: filter_employee
    params:
      columns:
        employee_id: employee_id
        dependents: plan_value
      distinct: true

  - kind: add
    name: add_dependents
    context_name: select_dependents
    params:
      - column: plan_name
        expression: '"dependents"'

  - kind: union
    name: union_data
    context_name: add_period_salary_plan_id
    params:
      allow_missing: false
      by_name: true
      other: add_calculated_plan_id

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_allowance_plan_id
      
  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_insurance_plan
      
  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_additional_benefit_plan

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_healthcare_plan

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_bonus_plan

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_retirement_plan

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_dependents

  - kind: add
    name: add_object_type
    params:
      - column: object_type
        expression: '"Employee"'

  - kind: cast
    name: cast_to_string
    context_name: add_object_type
    params:
      - column: employee_id
        to: string

  - kind: select
    name: select_final
    context_name: cast_to_string
    params:
      columns:
        object_type: object_type
        employee_id: employee_id
        plan_name: plan_name
        plan_value: plan_value
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_worker_compensation_plans
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_worker_compensation_plans
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: full