transform:
  name: dm_employee_cost_center_hierarchy
  operations:
  - kind: read_dataio
    name: read_cost_center_hierarchy
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: cost_centers_hierarchy
      schema_version: v1

  - kind: add
    name: add_cols
    context_name: read_cost_center_hierarchy
    params:
      - column: object_type
        expression: '"Employee"'

  - kind: cast
    name: cast_cols
    context_name: add_cols
    params:
      - column: object_type
        to: string
      - column: controlling_area_hierarchy
        to: string
      - column: controlling_area_hierarchy_ref_id
        to: string
      - column: cost_center_code
        to: string
      - column: cost_center_gn_hierarchy
        to: string
      - column: cost_center_gn_hierarchy_ref_id
        to: string
      - column: cost_center_name
        to: string
      - column: cost_center_ref_id
        to: string
      - column: hierarchic_parents
        to: string
      - column: personnel_area_id
        to: string
      - column: personnel_area_name
        to: string

  - kind: select
    name: select_cost_center_hierarchy_columns
    context_name: cast_cols
    params:
      columns:
        object_type: object_type
        controlling_area_hierarchy: controlling_area_hierarchy
        controlling_area_hierarchy_ref_id: controlling_area_hierarchy_ref_id
        cost_center_code: cost_center_code
        cost_center_gn_hierarchy: cost_center_gn_hierarchy
        cost_center_gn_hierarchy_ref_id: cost_center_gn_hierarchy_ref_id
        cost_center_name: cost_center_name
        cost_center_ref_id: cost_center_ref_id
        hierarchic_parents: hierarchic_parents
        personnel_area_id: personnel_area_id
        personnel_area_name: personnel_area_name
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_cost_center_hierarchy
    context_name: select_cost_center_hierarchy_columns
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_cost_center_hierarchy
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: partition