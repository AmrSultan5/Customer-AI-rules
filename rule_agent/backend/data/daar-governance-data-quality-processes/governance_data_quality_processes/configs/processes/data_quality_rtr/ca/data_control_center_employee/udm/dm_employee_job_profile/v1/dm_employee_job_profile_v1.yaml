transform:
  name: dm_employee_job_profile
  operations:
  - kind: read_dataio
    name: read_job_profile
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: job_profile
      schema_version: v1

  - kind: add
    name: add_cols
    context_name: read_job_profile
    params:
      - column: object_type
        expression: '"Employee"'

  - kind: cast
    name: cast_cols
    context_name: add_cols
    params:
      - column: object_type
        to: string
      - column: job_families_on_job_profile
        to: string
      - column: job_family_groups_for_job_profile
        to: string
      - column: job_profile
        to: string
      - column: management_level
        to: string
      - column: reference_id
        to: string
      - column: created_effective_date
        to: timestamp
        to_format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
      - column: job_classification
        to: string
      - column: job_classification_big_bet
        to: integer
      - column: job_classification_frontline
        to: integer
      - column: job_classification_sgjn
        to: integer
      - column: job_classification_is_dolphin_segment
        to: integer
      - column: last_functionally_updated
        to: timestamp
        to_format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
      - column: omada_substring_frontline
        to: string
      - column: reference_id1
        to: string

  - kind: select
    name: select_job_profile_columns
    context_name: cast_cols
    params:
      columns:
        object_type: object_type
        job_families_on_job_profile: job_families_on_job_profile
        job_family_groups_for_job_profile: job_family_groups_for_job_profile
        job_profile: job_profile
        management_level: management_level
        reference_id: reference_id
        created_effective_date: created_effective_date
        job_classification: job_classification
        job_classification_big_bet: job_classification_big_bet
        job_classification_frontline: job_classification_frontline
        job_classification_sgjn: job_classification_sgjn
        job_classification_is_dolphin_segment: job_classification_is_dolphin_segment
        last_functionally_updated: last_functionally_updated
        omada_substring_frontline: omada_substring_frontline
        reference_id1: reference_id1
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_job_profile
    context_name: select_job_profile_columns
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_job_profile
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: partition