transform:
  name: employee_organisation_conformity
  operations:

# Read data marts

  - kind: read_dataio
    name: read_dm_employee_organisation
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_organisation
      schema_version: v1

  - kind: read_local
    name: read_dict_department
    params:
      format: excel
      location: {{storage_account}}/locations/rtr_documents/data_control_center/dcc_employee_reference_tables.xlsx
      options:
        header: true
        pathGlobFilter: dcc_employee_reference_tables.xlsx
        sheet_name: dict_department

  - kind: select
    name: select_dict_department
    context_name: read_dict_department
    params:
      columns:
        department_name: department_name_dd
        sub_department_name: sub_department_name_dd
      distinct: true

  - kind: join
    name: join_deo_dd
    context_name: read_dm_employee_organisation
    params:
      - other:
          select_dict_department
        how:
          left
        columns:
          sub_department_name: sub_department_name_dd

##### RULES
#RECONF_1.1
  - kind: select
    name: select_dm_employee_organisation_1_1
    context_name: read_dm_employee_organisation
    params:
      columns:
        supervisory_organisation_name: supervisory_organisation_name
        supervisory_organisation_id: supervisory_organisation_id
      distinct: true

  - kind: group
    name: group_1_1
    context_name: select_dm_employee_organisation_1_1
    params:
      - aggs:
          supervisory_organisation_name: count
        by:
        - supervisory_organisation_id

  - kind: join
    name: join_self_1_1
    context_name: read_dm_employee_organisation
    params:
      - other:
          group_1_1
        how:
          left
        columns:
          supervisory_organisation_id: supervisory_organisation_id

  - kind: add
    name: add_reconf_1_1
    context_name: join_self_1_1
    params:
      - column: rule_code
        expression: "'RECONF_1.1'"
      - column: check_status
        expression: if(supervisory_organisation_name = 'CCHBC GROUP ()', '',
                    if(upper_supervisory_organisation_id IS NULL OR upper_supervisory_organisation_id = '' OR count_supervisory_organisation_name > 1 , '0', '1'))
      - column: object_id
        expression: supervisory_organisation_id
      - column: detailed_message
        expression: ''''''

  - kind: select
    name: select_reconf_1_1_final
    context_name: add_reconf_1_1
    params:
      columns:
        rule_code: rule_code
        object_id: object_id
        check_status: check_status
        supervisory_organisation_id: value_checked
        country_id: country_code
        location_id: location_code
        detailed_message: detailed_message
      distinct: true

# RECONF_16.3
  - kind: add
    name: add_reconf_16_3
    context_name: join_deo_dd
    params:
      - column: rule_code
        expression: "'RECONF_16.3'"
      - column: check_status
        expression: IF(sub_department_name IS NULL OR sub_department_name = '', '', 
                       IF(sub_department_name_dd IS NULL OR sub_department_name_dd = '', '0', '1'))
      - column: object_id
        expression: supervisory_organisation_id
      - column: detailed_message
        expression: ''''''

  - kind: select
    name: select_reconf_16_3_final
    context_name: add_reconf_16_3
    params:
      columns:
        rule_code: rule_code
        object_id: object_id
        check_status: check_status
        sub_department_name: value_checked
        country_id: country_code
        location_id: location_code
        detailed_message: detailed_message
      distinct: true

  - kind: union
    name: union_organisation_conformity
    context_name: select_reconf_1_1_final
    params:
      allow_missing: false
      by_name: true
      other: select_reconf_16_3_final

  - kind: add
    name: add_final
    params:
      - column: check_date
        expression: current_timestamp()

  - kind: select
    name: select_final
    params:
      columns:
        rule_code: rule_code
        object_id: object_id
        check_status: check_status
        value_checked: value_checked
        check_date: check_date
        country_code: country_code
        location_code: location_code
        detailed_message: detailed_message
      distinct: true  

  - kind: write_dataio
    name: write_employee_organisation_conformity
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: employee_organisation_conformity
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: full