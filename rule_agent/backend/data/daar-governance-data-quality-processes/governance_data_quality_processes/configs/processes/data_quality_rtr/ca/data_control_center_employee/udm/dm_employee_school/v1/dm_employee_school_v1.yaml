transform:
  name: dm_employee_school
  operations:
  - kind: read_dataio
    name: read_school
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: school
      schema_version: v1

  - kind: add
    name: add_cols_school
    context_name: read_school
    params:
      - column: object_type
        expression: '"Employee"'

  - kind: read_local
    name: read_cim
    params:
      format: excel
      location: {{storage_account}}/locations/rtr_documents/data_control_center/dcc_employee_reference_tables.xlsx
      options:
        header: true
        pathGlobFilter: dcc_employee_reference_tables.xlsx
        sheet_name: country_id_mapping

  - kind: select
    name: select_cim
    context_name: read_cim
    params:
      columns:
        country_id: country_id_cim
        country_iso3_id: country_iso3_id_cim
      distinct: true

  - kind: join
    name: join_school
    context_name: add_cols_school
    params:
      - other:
          select_cim
        how:
          left
        columns:
          country: country_iso3_id_cim

  - kind: cast
    name: cast_cols
    context_name: join_school
    params:
      - column: object_type
        to: string
      - column: country_id_cim
        to: string
      - column: school_name
        to: string
      - column: school_reference_id
        to: string

  - kind: select
    name: select_school_columns
    context_name: cast_cols
    params:
      columns:
        object_type: object_type
        country_id_cim: country
        school_name: school_name
        school_reference_id: school_reference_id
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_school
    context_name: select_school_columns
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_school
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: partition