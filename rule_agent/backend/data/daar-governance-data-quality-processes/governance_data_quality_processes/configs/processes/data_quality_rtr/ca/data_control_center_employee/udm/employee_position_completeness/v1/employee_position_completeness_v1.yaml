transform:
  name: employee_position_completeness
  operations:

# Read data marts

  - kind: read_dataio
    name: read_dm_employee_position
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_position
      schema_version: v1

  - kind: read_dataio
    name: read_dm_employee_organisation
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_organisation
      schema_version: v1

  - kind: select
    name: select_organisation
    context_name: read_dm_employee_organisation
    params:
      columns:
        supervisory_organisation_id: supervisory_organisation_id_org
      distinct: true

  - kind: read_dataio
    name: read_dm_employee_worker
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_worker
      schema_version: v2

  - kind: select
    name: select_worker
    context_name: read_dm_employee_worker
    params:
      columns:
        position_id: position_id_dew
        termination_date: termination_date_dew
      distinct: true

# Join data marts
  - kind: join
    name: join_dep_deo_dew
    context_name: read_dm_employee_position
    params:
      - other:
          select_organisation
        how:
          left
        columns:
          supervisory_organisation_id: supervisory_organisation_id_org
      - other:
          select_worker
        how:
          left
        columns:
          position_id: position_id_dew

#RECOMP_1.2
  - kind: add
    name: add_recomp_1_2
    context_name: join_dep_deo_dew
    params:
      - column: rule_code
        expression: "'RECOMP_1.2'"
      - column: check_status
        expression: if(supervisory_organisation_id IS NULL OR supervisory_organisation_id = '' OR supervisory_organisation_id_org IS NULL OR supervisory_organisation_id_org = '', '0', '1')
      - column: detailed_message
        expression: ''''''

  - kind: select
    name: select_recomp_1_2_final
    context_name: add_recomp_1_2
    params:
      columns:
        rule_code: rule_code
        position_id: object_id
        check_status: check_status
        supervisory_organisation_id: value_checked
        country_id: country_code
        location_id: location_code
        detailed_message: detailed_message
      distinct: true

