transform:
  name: employee_worker_completeness
  operations:

# Read data marts

  - kind: read_dataio
    name: read_dm_employee_education
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_education
      schema_version: v1

  - kind: select
    name: select_dm_employee_education_employee_id
    context_name: read_dm_employee_education
    params:
      columns:
        employee_id: employee_id_dee
      distinct: true

  - kind: select
    name: select_dm_employee_education_school_reference_id
    context_name: read_dm_employee_education
    params:
      columns:
        employee_id: employee_id_dee
        school_reference_id: school_reference_id
      distinct: true

  - kind: select
    name: select_dm_employee_education_field_of_study_ref_id
    context_name: read_dm_employee_education
    params:
      columns:
        employee_id: employee_id_dee
        field_of_study_ref_id: field_of_study_ref_id
      distinct: true

  - kind: read_dataio
    name: read_dm_employee_talent
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_talent
      schema_version: v1

  - kind: select
    name: select_dm_employee_talent
    context_name: read_dm_employee_talent
    params:
      columns:
        global_id: global_id
        performance_rating: performance_rating
      distinct: true

  - kind: read_dataio
    name: read_dm_employee_career_history
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_career_history
      schema_version: v1

  - kind: select
    name: select_dm_employee_career_history
    context_name: read_dm_employee_career_history
    params:
      columns:
        employee_id: employee_id_dech
      distinct: true

  - kind: read_dataio
    name: read_dm_employee_worker
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_worker
      schema_version: v2

  - kind: add
    name: add_dm_employee_worker
    context_name: read_dm_employee_worker
    params:
      - column: upper_currency_id
        expression: upper(currency_id)

  - kind: read_dataio
    name: read_dm_employee_organisation
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_organisation
      schema_version: v1

  - kind: select
    name: select_organisation
    context_name: read_dm_employee_organisation
    params:
      columns:
        supervisory_organisation_id: supervisory_organisation_id_org
      distinct: true

  - kind: read_dataio
    name: read_dm_employee_worker_compensation_plans
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_worker_compensation_plans
      schema_version: v2

  - kind: filter
    name: filter_dewcp_retirement
    context_name: read_dm_employee_worker_compensation_plans
    params:
      - condition:
          plan_name = 'retirement_plan_id'
          
  - kind: select
    name: select_dewcp_retirement
    params:
      columns:
        employee_id: employee_id_dewcp_retirement
        plan_name: plan_name_dewcp_retirement
        plan_value: plan_value_dewcp_retirement
      distinct: true

  - kind: filter
    name: filter_dewcp_insurance
    context_name: read_dm_employee_worker_compensation_plans
    params:
      - condition:
          plan_name = 'insurance_plan_id'

  - kind: select
    name: select_dewcp_insurance
    params:
      columns:
        employee_id: employee_id_dewcp_insurance
        plan_name: plan_name_dewcp_insurance
        plan_value: plan_value_dewcp_insurance
      distinct: true

  - kind: filter
    name: filter_dewcp_healthcare
    context_name: read_dm_employee_worker_compensation_plans
    params:
      - condition:
          plan_name = 'healthcare_plan_id'

  - kind: select
    name: select_dewcp_healthcare
    params:
      columns:
        employee_id: employee_id_dewcp_healthcare
        plan_name: plan_name_dewcp_healthcare
        plan_value: plan_value_dewcp_healthcare
      distinct: true

  - kind: filter
    name: filter_dewcp_additional_benefit
    context_name: read_dm_employee_worker_compensation_plans
    params:
      - condition:
          plan_name = 'additional_benefit_plan_id'

  - kind: select
    name: select_dewcp_additional_benefit
    params:
      columns:
        employee_id: employee_id_dewcp_additional_benefit
        plan_name: plan_name_dewcp_additional_benefit
        plan_value: plan_value_dewcp_additional_benefit
      distinct: true

  - kind: read_local
    name: read_dict_currency
    params:
      format: excel
      location: {{storage_account}}/locations/rtr_documents/data_control_center/dcc_employee_reference_tables.xlsx
      options:
        header: true
        pathGlobFilter: dcc_employee_reference_tables.xlsx
        sheet_name: dict_currency

  - kind: select
    name: select_dict_currency
    context_name: read_dict_currency
    params:
      columns:
        workday_value: workday_value_dc
      distinct: true

  - kind: add
    name: add_dict_currency
    context_name: select_dict_currency
    params:
      - column: upper_workday_value_dc
        expression: upper(workday_value_dc)

  - kind: read_local
    name: read_dict_address_component
    params:
      format: excel
      location: {{storage_account}}/locations/rtr_documents/data_control_center/dcc_employee_reference_tables.xlsx
      options:
        header: true
        pathGlobFilter: dcc_employee_reference_tables.xlsx
        sheet_name: dict_address_component

# Join data marts
  - kind: join
    name: join_dew_dac
    context_name: read_dm_employee_worker
    params:
      - other:
          read_dict_address_component
        how:
          left
        columns:
          country_id: country_code

  # - kind: add
  #   name: add_organisation
  #   context_name: select_organisation
  #   params:
  #     - column: supervisory_organisation_id_org
        # expression: regexp_extract(supervisory_organisation_id_o, '\\d+', 0)

# Join data marts
  - kind: join
    name: join_dew_deo
    context_name: add_dm_employee_worker
    params:
      - other:
          select_organisation
        how:
          left
        columns:
          supervisory_organisation_id: supervisory_organisation_id_org
          
# Join data marts
  - kind: join
    name: join_dew_dewcp
    context_name: add_dm_employee_worker
    params:
      - other:
          select_dewcp_retirement
        how:
          left
        columns:
          employee_id: employee_id_dewcp_retirement
      - other:
          select_dewcp_insurance
        how:
          left
        columns:
          employee_id: employee_id_dewcp_insurance
      - other:
          select_dewcp_healthcare
        how:
          left
        columns:
          employee_id: employee_id_dewcp_healthcare
      - other:
          select_dewcp_additional_benefit
        how:
          left
        columns:
          employee_id: employee_id_dewcp_additional_benefit
          
# Join data marts
  - kind: join
    name: join_dew_dd
    context_name: add_dm_employee_worker
    params:
      - other:
          add_dict_currency
        how:
          left
        columns:
          upper_currency_id: upper_workday_value_dc

#RECOMP_1.1
  - kind: add
    name: add_recomp_1_1
    context_name: join_dew_deo
    params:
      - column: rule_code
        expression: "'RECOMP_1.1'"
      - column: check_status
        expression: if(supervisory_organisation_id IS NULL OR supervisory_organisation_id = '' OR supervisory_organisation_id_org IS NULL OR supervisory_organisation_id_org = '', '0', '1')
      - column: detailed_message
        expression: ''''''

  - kind: select
    name: select_recomp_1_1_final
    context_name: add_recomp_1_1
    params:
      columns:
        rule_code: rule_code
        employee_id: object_id
        check_status: check_status
        supervisory_organisation_id_org: value_checked
        country_id: country_code
        location_id: location_code
        detailed_message: detailed_message
      distinct: true

#RECOMP_2.1
  - kind: add
