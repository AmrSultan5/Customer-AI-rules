transform:
  name: dm_employee_company
  operations:
  - kind: read_dataio
    name: read_company
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: company
      schema_version: v1

  - kind: add
    name: add_cols
    context_name: read_company
    params:
      - column: object_type
        expression: '"Employee"'

  - kind: cast
    name: cast_cols
    context_name: add_cols
    params:
      - column: object_type
        to: string
      - column: industry
        to: string
      - column: previous_company_name
        to: string
      - column: previous_company_ref_id
        to: string
      - column: location
        to: string

  - kind: select
    name: select_company_columns
    context_name: cast_cols
    params:
      columns:
        object_type: object_type
        industry: industry
        previous_company_name: previous_company_name
        previous_company_ref_id: previous_company_ref_id
        location: location
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_company
    context_name: select_company_columns
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_company
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: partition