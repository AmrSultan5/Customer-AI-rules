transform:
  name: dm_employee_worker_compensation_plans
  operations:

  - kind: read_dataio
    name: read_worker
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: worker
      schema_version: v1

  - kind: read_dataio
    name: read_worker_eligibility
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: worker_eligibility
      schema_version: v1

  - kind: filter
    name: filter_worker
    context_name: read_worker
    params:
      - condition:
          worker_type = 'Employee' AND employee_id IS NOT NULL

  - kind: filter
    name: filter_worker_eligibility
    context_name: read_worker_eligibility
    params:
      - condition:
          worker_type = 'Employee' AND employee_id IS NOT NULL

########################## PERIOD SALARY PLAN ID #########################################

  - kind: select
    name: select_wor_pspi
    context_name: filter_worker
    params:
      columns:
        employee_id: employee_id_wor
        prd_salary_plan: plan_value_wor
      distinct: true

  - kind: add
    name: add_null_wor_pspi
    context_name: select_wor_pspi
    params:
      - column: plan_value_wor
        expression: if(plan_value_wor is NULL, 'null', plan_value_wor)
        overwrite: true

  - kind: select
    name: select_wel_pspi
    context_name: filter_worker_eligibility
    params:
      columns:
        employee_id: employee_id_wel
        prd_salary_plan_id: plan_value_wel
      distinct: true

  - kind: add
    name: add_null_wel_pspi
    context_name: select_wel_pspi
    params:
      - column: plan_value_wel
        expression: if(plan_value_wel is NULL, 'null', plan_value_wel)
        overwrite: true

  - kind: join
    name: join_pspi
    context_name: add_null_wor_pspi
    params:
      - other:
          add_null_wel_pspi
        how:
          outer
        columns:
          employee_id_wor: employee_id_wel
          plan_value_wor: plan_value_wel

  - kind: add
    name: add_flags_pspi
    context_name: join_pspi
    params:
      - column: plan_value_wor
        expression: if(plan_value_wor is NULL, 'null', plan_value_wor)
        overwrite: true
      - column: plan_value_wel
        expression: if(plan_value_wel is NULL, 'null', plan_value_wel)
        overwrite: true
      - column: is_eligible_flag
        expression: if(plan_value_wor = 'null', '',
                    if(plan_value_wor = plan_value_wel, '1', '0'))
      - column: is_redundant_flag
        expression: if((plan_value_wor = 'null' AND plan_value_wel = 'null') OR (employee_id_wel IS NULL), '',
                    if(plan_value_wor != 'null' AND plan_value_wel != 'null' AND plan_value_wor !=  plan_value_wel, '1',
                    if(plan_value_wor = 'null' AND plan_value_wel != 'null', '1', '0')))
      - column: plan_value_wor
        expression: if(plan_value_wor = 'null', plan_value_wel, plan_value_wor)
        overwrite: true
      - column: employee_id_wor
        expression: if(employee_id_wor IS NULL, employee_id_wel, employee_id_wor)
        overwrite: true
      - column: plan_name
        expression: '"period_salary_plan_id"'
      - column: plan_value_wor
        expression: if(plan_value_wor = 'null', NULL, plan_value_wor)
        overwrite: true
      - column: employee_id_wor
        expression: if(employee_id_wor = 'null', NULL, employee_id_wor)
        overwrite: true

  - kind: select
    name: select_pspi_final
    context_name: add_flags_pspi
    params:
      columns:
        employee_id_wor: employee_id
        plan_value_wor: plan_value
        plan_name: plan_name
        is_eligible_flag: is_eligible_flag
        is_redundant_flag: is_redundant_flag
      distinct: true

########################## CALCULATED PLAN ID #########################################

  - kind: select
    name: select_wor_cpi
    context_name: filter_worker
    params:
      columns:
        employee_id: employee_id_wor
