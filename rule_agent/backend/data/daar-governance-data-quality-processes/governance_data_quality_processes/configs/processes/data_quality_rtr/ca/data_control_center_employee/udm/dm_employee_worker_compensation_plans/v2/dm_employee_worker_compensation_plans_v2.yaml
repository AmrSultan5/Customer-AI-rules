        overwrite: true

  - kind: select
    name: select_wel_cpi
    context_name: filter_worker_eligibility
    params:
      columns:
        employee_id: employee_id_wel
        cal_plan_id: plan_value_wel
      distinct: true

  - kind: add
    name: add_null_wel_cpi
    context_name: select_wel_cpi
    params:
      - column: plan_value_wel
        expression: if(plan_value_wel is NULL, 'null', plan_value_wel)
        overwrite: true

  - kind: join
    name: join_cpi
    context_name: add_null_wor_cpi
