      distinct: true

  - kind: add
    name: add_retirement_plan
    context_name: select_retirement_plan
    params:
      - column: plan_name
        expression: '"retirement_plan_id"'
      - column: is_eligible_flag
        expression: 'NULL'
      - column: is_redundant_flag
        expression: 'NULL'

########################## DEPENDENTS #########################################

  - kind: select
    name: select_dependents
    context_name: filter_worker
    params:
      columns:
        employee_id: employee_id
        dependents: plan_value
      distinct: true

  - kind: add
    name: add_dependents
    context_name: select_dependents
    params:
      - column: plan_name
        expression: '"dependents"'
      - column: is_eligible_flag
        expression: 'NULL'
      - column: is_redundant_flag
        expression: 'NULL'

###################################################################
  - kind: union
    name: union_data
    context_name: select_pspi_final
    params:
      allow_missing: false
      by_name: true
      other: select_cpi_final

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: select_api_final
      
  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_insurance_plan
      
  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_additional_benefit_plan

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_healthcare_plan

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: select_bpi_final

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_retirement_plan

  - kind: union
    name: union_data
    params:
      allow_missing: false
      by_name: true
      other: add_dependents

  - kind: add
    name: add_object_type
    params:
      - column: object_type
        expression: '"Employee"'

  - kind: cast
    name: cast_to_string
    context_name: add_object_type
    params:
      - column: employee_id
        to: string

  - kind: select
    name: select_worker_final
    context_name: cast_to_string
    params:
      columns:
        object_type: object_type
        employee_id: employee_id
        plan_name: plan_name
        plan_value: plan_value
        is_eligible_flag: is_eligible_flag
        is_redundant_flag: is_redundant_flag
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_worker_compensation_plans
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_worker_compensation_plans
      process_run_id: '{{process_run_id}}'
      schema_version: v2
      refresh_mode: full