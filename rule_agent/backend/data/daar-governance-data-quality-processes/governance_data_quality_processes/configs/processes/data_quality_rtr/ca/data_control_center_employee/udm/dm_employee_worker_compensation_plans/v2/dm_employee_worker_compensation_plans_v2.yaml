  - kind: add
    name: add_flags_cpi
    context_name: join_cpi
    params:
      - column: plan_value_wor
        expression: if(plan_value_wor is NULL, 'null', plan_value_wor)
        overwrite: true
      - column: plan_value_wel
        expression: if(plan_value_wel is NULL, 'null', plan_value_wel)
        overwrite: true
      - column: is_eligible_flag
        expression: if(plan_value_wor = 'null', '',
                    if(plan_value_wor = plan_value_wel, '1', '0'))
      - column: is_redundant_flag
        expression: if((plan_value_wor = 'null' AND plan_value_wel = 'null') OR (employee_id_wel IS NULL), '',
                    if(plan_value_wor != 'null' AND plan_value_wel != 'null' AND plan_value_wor !=  plan_value_wel, '1',
                    if(plan_value_wor = 'null' AND plan_value_wel != 'null', '1', '0')))
      - column: plan_value_wor
        expression: if(plan_value_wor = 'null', plan_value_wel, plan_value_wor)
        overwrite: true
      - column: employee_id_wor
        expression: if(employee_id_wor IS NULL, employee_id_wel, employee_id_wor)
        overwrite: true
      - column: plan_name
        expression: '"calculated_plan_id"'
      - column: plan_value_wor
        expression: if(plan_value_wor = 'null', NULL, plan_value_wor)
        overwrite: true
      - column: employee_id_wor
        expression: if(employee_id_wor = 'null', NULL, employee_id_wor)
        overwrite: true

  - kind: select
    name: select_cpi_final
    context_name: add_flags_cpi
    params:
      columns:
        employee_id_wor: employee_id
        plan_value_wor: plan_value
        plan_name: plan_name
        is_eligible_flag: is_eligible_flag
        is_redundant_flag: is_redundant_flag
      distinct: true

