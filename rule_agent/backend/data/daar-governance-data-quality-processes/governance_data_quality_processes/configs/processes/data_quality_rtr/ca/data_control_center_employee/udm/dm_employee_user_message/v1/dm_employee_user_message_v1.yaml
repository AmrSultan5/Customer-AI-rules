transform:
  name: dm_employee_user_message
  operations:

  - kind: read_local
    name: read_dm_employee_user_message
    params:
      format: csv
      location: {{storage_account}}/locations/rtr_documents/data_control_center/user_message/
      options:
        header: true

  - kind: read_dataio
    name: read_dim_user_message_code
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: golden
      object_name: dim_user_message_code
      schema_version: v1

  - kind: join
    name: join_message_code
    context_name: read_dm_employee_user_message
    params:
      - other:
          read_dim_user_message_code
        how:
          left
        columns:
          status_code: user_message_description

  - kind: add
    name: add_cast_date
    context_name: join_message_code
    params:
      - column: status_added_when
        expression: "TO_DATE(status_added_when, 'M/d/yyyy H:mm')"
        overwrite: true

  - kind: select
    name: select_final
    context_name: add_cast_date
    params:
      columns:
        rule_code: rule_code
        object_id: object_id
        status_code: user_message_code
        user_message_description: user_message_name
        status_added_by: message_added_by
        status_added_when: message_added_when
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_user_message
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_user_message
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: full