transform:
  name: dm_employee_education
  operations:
  - kind: read_dataio
    name: read_education
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: education
      schema_version: v1

  - kind: add
    name: add_cols_education
    context_name: read_education
    params:
      - column: object_type
        expression: '"Employee"'

  - kind: filter
    name: filter_education
    context_name: add_cols_education
    params:
      - condition:
          school IS NOT NULL OR degree IS NOT NULL OR field_of_study IS NOT NULL

  - kind: read_local
    name: read_cim
    params:
      format: excel
      location: {{storage_account}}/locations/rtr_documents/data_control_center/dcc_employee_reference_tables.xlsx
      options:
        header: true
        pathGlobFilter: dcc_employee_reference_tables.xlsx
        sheet_name: country_id_mapping

  - kind: select
    name: select_cim
    context_name: read_cim
    params:
      columns:
        country_id: country_id_cim
        country_iso3_id: country_iso3_id_cim
      distinct: true

  - kind: join
    name: join_education
    context_name: filter_education
    params:
      - other:
          select_cim
        how:
          left
        columns:
          country_ref_id: country_iso3_id_cim

  - kind: cast
    name: cast_cols
    context_name: join_education
    params:
      - column: object_type
        to: string
      - column: business_unit
        to: string
      - column: business_unit_ref_id
        to: string
      - column: company_id
        to: string
      - column: company_ref_id
        to: string
      - column: employee_id
        to: string
      - column: worker
        to: string
      - column: country_id_cim
        to: string
      - column: country_ref_id
        to: string
      - column: degree
        to: string
      - column: degree_received
        to: string
      - column: degree_ref_id
        to: string
      - column: education_attachment
        to: string
      - column: entered_by
        to: string
      - column: field_of_study
        to: string
      - column: field_of_study_ref_id
        to: string
      - column: school
        to: string
      - column: school_reference_id
        to: string
      - column: source
        to: string
      - column: year_degree_received
        to: date

  - kind: select
    name: select_education_columns
    context_name: cast_cols
    params:
      columns:
        object_type: object_type
        business_unit: business_unit
        business_unit_ref_id: business_unit_ref_id
        company_id: company_id
        company_ref_id: company_ref_id
        employee_id: employee_id
        worker: worker
        country_id_cim: country
        country_ref_id: country_ref_id
        degree: degree
        degree_received: degree_received
        degree_ref_id: degree_ref_id
        education_attachment: education_attachment
        entered_by: entered_by
        field_of_study: field_of_study
        field_of_study_ref_id: field_of_study_ref_id
        school: school
        school_reference_id: school_reference_id
        source: source
        year_degree_received: year_degree_received
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_education
    context_name: select_education_columns
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_education
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: partition