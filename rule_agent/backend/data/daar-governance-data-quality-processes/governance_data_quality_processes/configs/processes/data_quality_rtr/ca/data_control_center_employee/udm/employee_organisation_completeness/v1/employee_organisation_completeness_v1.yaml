transform:
  name: employee_organisation_completeness
  operations:

# Read data marts

  - kind: read_dataio
    name: read_dm_employee_organisation
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_organisation
      schema_version: v1

##### RULES
# RECOMP_16.3
  - kind: add
    name: add_recomp_16_3
    context_name: read_dm_employee_organisation
    params:
      - column: rule_code
        expression: "'RECOMP_16.3'"
      - column: check_status
        expression: IF(sub_department_name IS NULL OR sub_department_name = '', '0', '1')
      - column: object_id
        expression: supervisory_organisation_id
      - column: detailed_message
        expression: ''''''

  - kind: select
    name: select_recomp_16_3_final
    context_name: add_recomp_16_3
    params:
      columns:
        rule_code: rule_code
        object_id: object_id
        check_status: check_status
        sub_department_name: value_checked
        country_id: country_code
        location_id: location_code
        detailed_message: detailed_message
      distinct: true

  - kind: add
    name: add_final
    params:
      - column: check_date
        expression: current_timestamp()

  - kind: select
    name: select_final
    params:
      columns:
        rule_code: rule_code
        object_id: object_id
        check_status: check_status
        value_checked: value_checked
        check_date: check_date
        country_code: country_code
        location_code: location_code
        detailed_message: detailed_message
      distinct: true  

  - kind: write_dataio
    name: write_employee_organisation_completeness
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: employee_organisation_completeness
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: full