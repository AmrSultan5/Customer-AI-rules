transform:
  name: dm_employee_career_history
  operations:
  - kind: read_dataio
    name: read_ch
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: career_history
      schema_version: v1

  - kind: select
    name: select_ch
    context_name: read_ch
    params:
      columns:
        global_id: global_id_ch
        employer: employer_ch
        end_date: end_date_ch
        location: location_ch
        position_name: position_name_ch
        start_date: start_date_ch
      distinct: true

  - kind: read_dataio
    name: read_wpjh
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: curated
        storage_id: '{{dataio.storage_id}}'
      source: workday
      namespace: dcc
      object_name: workers_previous_job_history
      schema_version: v1

  - kind: select
    name: select_wpjh
    context_name: read_wpjh
    params:
      columns:
        business_unit: business_unit_wpjh
        business_unit_ref_id: business_unit_ref_id_wpjh
        company_id: company_id_wpjh
        company_ref_id: company_ref_id_wpjh
        employee_id: employee_id_wpjh
        worker: worker_wpjh
        end_date: end_date_wpjh
        job_history_company: job_history_company_wpjh
        job_history_company_ref_id: job_history_company_ref_id_wpjh
        job_title: job_title_wpjh
        location: location_wpjh
        start_date: start_date_wpjh
      distinct: true

  - kind: join
    name: join_ch_wpjh
    context_name: select_ch
    params:
      - other:
          select_wpjh
        how:
          full_outer
        columns:
          global_id_ch: employee_id_wpjh

  - kind: add
    name: add_final_cols
    context_name: join_ch_wpjh
    params:
      - column: object_type
        expression: '"Employee"'
      - column: worker
        expression: worker_wpjh
      - column: employee_id
        expression: coalesce(employee_id_wpjh,global_id_ch)
      - column: business_unit
        expression: business_unit_wpjh
      - column: business_unit_ref_id
        expression: business_unit_ref_id_wpjh
      - column: company_id
        expression: company_id_wpjh
      - column: company_ref_id
        expression: company_ref_id_wpjh
      - column: job_history_company
        expression: coalesce(job_history_company_wpjh,employer_ch)
      - column: job_history_company_ref_id
        expression: job_history_company_ref_id_wpjh
      - column: location
        expression: coalesce(location_wpjh,location_ch)
      - column: job_title
        expression: coalesce(job_title_wpjh,position_name_ch)
      - column: start_date
        expression: coalesce(start_date_wpjh,start_date_ch)
      - column: end_date
        expression: coalesce(end_date_wpjh,end_date_ch)

  - kind: cast
    name: cast_cols
    context_name: add_final_cols
    params:
      - column: object_type
        to: string
      - column: worker
        to: string
      - column: employee_id
        to: string
      - column: business_unit
        to: string
      - column: business_unit_ref_id
        to: string
      - column: company_id
        to: string
      - column: company_ref_id
        to: string
      - column: job_history_company
        to: string
      - column: job_history_company_ref_id
        to: string
      - column: location
        to: string
      - column: job_title
        to: string
      - column: start_date
        to: date
        to_format: yyyy-MM-dd
      - column: end_date
        to: date
        to_format: yyyy-MM-dd

  - kind: select
    name: select_career_history_columns
    context_name: cast_cols
    params:
      columns:
        object_type: object_type
        worker: worker
        employee_id: employee_id
        business_unit: business_unit
        business_unit_ref_id: business_unit_ref_id
        company_id: company_id
        company_ref_id: company_ref_id
        job_history_company: job_history_company
        job_history_company_ref_id: job_history_company_ref_id
        location: location
        job_title: job_title
        start_date: start_date
        end_date: end_date
      distinct: true

  - kind: write_dataio
    name: write_dm_employee_career_history
    context_name: select_career_history_columns
    params:
      dataio:
        ad_id: '{{dataio.ad_id}}'
        layer: application
        storage_id: '{{dataio.storage_id}}'
      application_name: data_quality_rtr
      country: ca
      module: data_control_center_employee
      namespace: udm
      object_name: dm_employee_career_history
      process_run_id: '{{process_run_id}}'
      schema_version: v1
      refresh_mode: partition