      - column: case_2
        expression: if(change_job_reason_id = 'CHANGE_JOB_PROMOTION_PROMOTION' AND position_id != position_id_hist AND compensation_grade_value > compensation_grade_value_hist, '1',
                    if(change_job_reason_id = 'CHANGE_JOB_PROMOTION_PROMOTION' AND (position_id = position_id_hist OR compensation_grade_value <= compensation_grade_value_hist), '0', case_1))
      - column: case_3
        expression: if(change_job_reason_id = 'CHANGE_JOB_DEMOTION_DECREASE_IN_RESPONSIBILITY' AND position_id != position_id_hist AND compensation_grade_value < compensation_grade_value_hist, '1',
                    if(change_job_reason_id = 'CHANGE_JOB_DEMOTION_DECREASE_IN_RESPONSIBILITY' AND (position_id = position_id_hist OR compensation_grade_value >= compensation_grade_value_hist), '0', case_2))
      - column: case_4
        expression: if(change_job_reason_id IN ('CHANGE_JOB_TRANSFER_NO_CHANGE_IN_MANAGER', 'CHANGE_JOB_TRANSFER_UNDER_A_NEW_LEGAL_ENTITY','CHANGE_JOB_TRANSFER_UNDER_A_NEW_MANAGER') AND 
                       position_id != position_id_hist AND compensation_grade_value = compensation_grade_value_hist, '1',
                       if(change_job_reason_id IN ('CHANGE_JOB_TRANSFER_NO_CHANGE_IN_MANAGER', 'CHANGE_JOB_TRANSFER_UNDER_A_NEW_LEGAL_ENTITY','CHANGE_JOB_TRANSFER_UNDER_A_NEW_MANAGER') AND 
                         (position_id = position_id_hist OR compensation_grade_value != compensation_grade_value_hist), '0', case_3))
      - column: detailed_message
        expression: '''''' 
 
