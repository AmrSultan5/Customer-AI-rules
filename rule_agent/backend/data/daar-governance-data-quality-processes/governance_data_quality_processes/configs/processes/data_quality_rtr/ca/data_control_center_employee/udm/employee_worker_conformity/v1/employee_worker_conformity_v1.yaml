    context_name: read_dm_employee_worker
    params:
      - column: rule_code
        expression: "'RECONF_51.2'"
      - column: check_latin
        expression: if(REGEXP_LIKE(home_address, '\\p{IsLatin}'), '1', '0')                      
      - column: check_greek
        expression: if(REGEXP_LIKE(home_address, '\\p{IsGreek}'), '1', '0')                     
      - column: check_cyrillic
        expression: if(REGEXP_LIKE(home_address, '\\p{IsCyrillic}'), '1', '0')                  
      - column: check_armenian
        expression: if(REGEXP_LIKE(home_address, '\\p{IsArmenian}'), '1', '0')                  
      - column: check_hebrew
        expression: if(REGEXP_LIKE(home_address, '\\p{IsHebrew}'), '1', '0')                  
      - column: check_arabic
        expression: if(REGEXP_LIKE(home_address, '\\p{IsArabic}'), '1', '0')                  
      - column: check_georgian
        expression: if(REGEXP_LIKE(home_address, '\\p{IsGeorgian}'), '1', '0')                  
      - column: check_devanagari
        expression: if(REGEXP_LIKE(home_address, '\\p{IsDevanagari}'), '1', '0')                
      - column: check_devanagari
        expression: if(REGEXP_LIKE(home_address, '\\p{IsDevanagari}'), '1', '0')                
      - column: check_thai
        expression: if(REGEXP_LIKE(home_address, '\\p{IsThai}'), '1', '0')               
      - column: check_hiragana
        expression: if(REGEXP_LIKE(home_address, '\\p{IsHiragana}'), '1', '0')               
      - column: check_katakana
        expression: if(REGEXP_LIKE(home_address, '\\p{IsKatakana}'), '1', '0')               
      - column: check_han
        expression: if(REGEXP_LIKE(home_address, '\\p{IsHan}'), '1', '0')               
      - column: check_hangul
        expression: if(REGEXP_LIKE(home_address, '\\p{IsHangul}'), '1', '0')               
      - column: check_ethiopic
        expression: if(REGEXP_LIKE(home_address, '\\p{IsEthiopic}'), '1', '0')               
      - column: check_tamil
        expression: if(REGEXP_LIKE(home_address, '\\p{IsTamil}'), '1', '0')
      - column: check_mix_alphabets
        expression: check_latin + check_greek + check_cyrillic + check_armenian + check_hebrew + check_arabic + check_georgian + check_devanagari + check_devanagari + check_thai + check_hiragana + check_katakana + check_han + check_hangul + check_ethiopic + check_tamil
      - column: check_status
        expression: if((worker_type_id != 'Employee' OR worker_type_id IS NULL OR worker_type_id = '') OR country_id IN ('PL') OR home_address IS NULL OR home_address = '', '',
                    if(check_mix_alphabets > 1, '0', '1'))
