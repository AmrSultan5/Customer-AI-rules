#RECONF_95.1
  - kind: add
    name: add_reconf_95_1
    context_name: read_dm_employee_worker
    params:
      - column: rule_code
        expression: "'RECONF_95.1'"
      - column: tpr1
        expression: REPLACE(regexp_extract(element_at(split(total_pay_range, ' - '), 1), '([0-9,]+\.[0-9]+)', 1), ',', '')
      - column: tpr2
        expression: REPLACE(regexp_extract(element_at(split(total_pay_range, ' - '), 2), '([0-9,]+\.[0-9]+)', 1), ',', '')
      - column: tpr3
        expression: REPLACE(regexp_extract(element_at(split(total_pay_range, ' - '), 3), '([0-9,]+\.[0-9]+)', 1), ',', '')
      - column: after_dot_1
        expression: LENGTH(SPLIT(tpr1, '\\.')[1])
      - column: after_dot_2
        expression: LENGTH(SPLIT(tpr2, '\\.')[1])
      - column: after_dot_3
        expression: LENGTH(SPLIT(tpr3, '\\.')[1])
