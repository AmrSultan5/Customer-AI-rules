        how:
          left
        columns:
          employee_id: employee_id

  - kind: add
    name: add_reconf_109_1
    context_name: join_reconf_109_1
    params:
      - column: rule_code
        expression: "'RECONF_109.1'"
      - column: prev_end_date
        expression: LAG(end_date) OVER (PARTITION BY employee_id ORDER BY start_date)
      - column: gapinservice_flag
        expression: if(job_history_company = 'CCHBC' AND prev_end_date IS NOT NULL AND DATEDIFF(day, prev_end_date, start_date) > 1, 1, 0)
