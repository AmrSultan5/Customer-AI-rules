      namespace: udm
      object_name: dm_employee_worker_position_history
      schema_version: v1

  - kind: add
    name: add_period_filter
    context_name: read_dm_employee_worker_position_history
    params:
      - column: days_since_current_friday
        expression: dayofweek(current_date() + 1) % 7
      - column: current_friday
        expression: date_add(current_date(), - days_since_current_friday)
      - column: current_month
        expression: date_format(current_friday, 'MM')
      - column: next_friday
        expression: date_add(current_friday, 7)
      - column: next_friday_month
        expression: date_format(next_friday, 'MM')
      - column: last_friday_of_month
        expression: if(current_month = next_friday_month, '0',
                    if(current_month + 1 = next_friday_month, '1', ''))
      - column: period_filter
        expression: if(last_friday_of_month = '0', date_format(to_date(current_friday), 'yyyy-MM'),
                    if(last_friday_of_month = '1', date_format(add_months(to_date(current_friday), -1), 'yyyy-MM'), ''))
 
  - kind: filter
    name: filter_worker_hist
    context_name: add_period_filter
    params:
      - condition:
           period = period_filter
 
