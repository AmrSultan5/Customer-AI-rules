    params:
      - column: rule_code
        expression: "'RECONF_13.3'"
      - column: cleaned_position_name_1
        expression: TRIM(REGEXP_REPLACE(position_name, r'( \(Overlap\)| \(On Leave\)| - Valser Service| \(Position Vacate:[0-9]{2}/[0-9]{2}/[0-9]{4}\)|BSO_|-OOH| - Out Of Home|-\(channel\))', ''))
      - column: cleaned_position_name_1_dep
        expression: TRIM(REGEXP_REPLACE(position_name_dep, r'( - \(category/partner/area\)| - \(channel/ customer\)|-\(channel/region\)|\(Channel/sub channel\) |BSO_|-OOH|-\(chann/reg\)| \(Acting\)|-\(channel\))', ''))
      - column: cleaned_position_name_2
        expression: TRIM(REGEXP_REPLACE(position_name, r'(- \(specialization\)|- \(specialisation\))', ''))
      - column: cleaned_position_name_2_dep
        expression: TRIM(REGEXP_REPLACE(position_name_dep, r' - .*', ''))
      - column: cleaned_position_name_3
        expression: TRIM(REGEXP_REPLACE(position_name, r' - .*', ''))
      - column: cleaned_position_name_3_dep
        expression: TRIM(REGEXP_REPLACE(position_name_dep, r'(- \(specialization\)|- \(specialisation\))', ''))
      - column: check_status
        expression: IF(position_name IS NULL OR 
                       position_name = '' OR 
                       position_name_dep IS NULL OR position_name_dep = '', '',
                       IF(TRIM(position_name) = TRIM(position_name_dep) OR 
                          cleaned_position_name_1 = cleaned_position_name_1_dep OR 
                          cleaned_position_name_2 = cleaned_position_name_2_dep OR
                          cleaned_position_name_3 = cleaned_position_name_3_dep, '1', '0'))
      - column: value_checked
        expression: position_name || "_" || position_name_dep
      - column: detailed_message
        expression: ''''''

  - kind: select
