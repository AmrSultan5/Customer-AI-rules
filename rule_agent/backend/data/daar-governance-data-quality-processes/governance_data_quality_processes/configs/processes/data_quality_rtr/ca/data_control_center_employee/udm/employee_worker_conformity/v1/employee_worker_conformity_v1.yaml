      - column: check_status
        expression: if(worker_type_id != 'Employee' OR worker_type_id IS NULL OR employee_id IS NULL, '',
                    if(total_gaps > 0, '0', '1'))
      - column: value_checked
        expression: CAST(start_date AS STRING)
      - column: detailed_message
        expression: ''''''

  - kind: select
    name: select_reconf_109_1_final
    context_name: add_reconf_109_1
    params:
      columns:
        rule_code: rule_code
        employee_id: object_id
