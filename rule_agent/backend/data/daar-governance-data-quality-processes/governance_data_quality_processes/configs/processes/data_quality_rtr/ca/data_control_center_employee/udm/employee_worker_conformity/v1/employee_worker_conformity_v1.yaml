#RECONF_17.1
  - kind: add
    name: add_reconf_17_1
    context_name: read_dm_employee_worker
    params:
      - column: rule_code
        expression: "'RECONF_17.1'"
      - column: check_latin
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsLatin}'), '1', '0')                      
      - column: check_greek
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsGreek}'), '1', '0')                    
      - column: check_cyrillic
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsCyrillic}'), '1', '0')                  
      - column: check_armenian
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsArmenian}'), '1', '0')                  
      - column: check_hebrew
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsHebrew}'), '1', '0')                  
      - column: check_arabic
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsArabic}'), '1', '0')                  
      - column: check_georgian
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsGeorgian}'), '1', '0')                  
      - column: check_devanagari
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsDevanagari}'), '1', '0')                
      - column: check_devanagari
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsDevanagari}'), '1', '0')                
      - column: check_thai
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsThai}'), '1', '0')              
      - column: check_hiragana
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsHiragana}'), '1', '0')              
      - column: check_katakana
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsKatakana}'), '1', '0')              
      - column: check_han
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsHan}'), '1', '0')              
      - column: check_hangul
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsHangul}'), '1', '0')              
      - column: check_ethiopic
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsEthiopic}'), '1', '0')              
      - column: check_tamil
        expression: if(REGEXP_LIKE(position_title_local, '\\p{IsTamil}'), '1', '0')
      - column: check_mix_alphabets
        expression: check_latin + check_greek + check_cyrillic + check_armenian + check_hebrew + check_arabic + check_georgian + check_devanagari + check_devanagari + check_thai + check_hiragana + check_katakana + check_han + check_hangul + check_ethiopic + check_tamil              
      - column: not_allowed_chars
        expression: REGEXP_REPLACE(position_title_local, '[\u0041-\u005A\u0061-\u007A\u00C0-\u00FF\u0100-\u017F\u0180-\u024F0-9 \^\._&\*\(\)\u0400-\u04FF\u0370-\u03FF\u0590-\u05FF\u0600-\u06FF\u0900-\u097F\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF\uAC00-\uD7AF\u0530-\u058F]', '')
      - column: check_status
        expression: if(country_id NOT IN ('GR', 'CZ', 'SK', 'EG', 'AM', 'UA', 'MK') OR position_title_local IS NULL OR position_title_local = '', '',
                    if(position_title_local LIKE ' %' OR position_title_local LIKE '% ' OR
                       REGEXP_LIKE(position_title_local, '\\s{2,}') OR
                       LEN(not_allowed_chars) > 0 OR
                       check_mix_alphabets > 1, '0', '1'))
      - column: detailed_message
        expression: ''''''

  - kind: select
    name: select_reconf_17_1_final
    context_name: add_reconf_17_1
    params:
      columns:
        rule_code: rule_code
        employee_id: object_id
        check_status: check_status
        position_title_local: value_checked
        country_id: country_code
        location_id: location_code
